async function renderTickets(container){
  container.innerHTML='<div style="color:#888;padding:40px;text-align:center">Loading…</div>';
  await refreshCache(STATE.activeEvent.id);
  var tickets=await DB.getTickets(STATE.activeEvent.id);
  _cache.tickets=tickets;
  STATE.tickets=tickets;
  buildTicketsView(container,tickets);
}

function buildTicketsView(container,tickets){
  var ev=STATE.activeEvent, checked=tickets.filter(function(t){ return t.checked_in; }).length;
  var filtered=tickets
    .filter(function(t){ if(STATE.ticketFilter==='checked') return t.checked_in&&!t.cancelled; if(STATE.ticketFilter==='pending') return !t.checked_in&&!t.cancelled; if(STATE.ticketFilter==='cancelled') return t.cancelled===true; return true; })
    .filter(function(t){ return !STATE.ticketSearch||(t.code||'').toUpperCase().includes(STATE.ticketSearch.toUpperCase())||(t.holder||'').toUpperCase().includes(STATE.ticketSearch.toUpperCase()); });
  var allEventSeats=(_cache.seats||[]).filter(function(s){ return s.event_id===ev.id; });
  var sectionStats={};
  allEventSeats.forEach(function(s){
    if(!sectionStats[s.section]) sectionStats[s.section]={name:s.section,total:0,sold:0,reserved:0,seatType:s.seat_type};
    sectionStats[s.section].total++;
    if(s.status==='sold') sectionStats[s.section].sold++;
    if(s.status==='reserved') sectionStats[s.section].reserved++;
  });
  var gaTickets=tickets.filter(function(t){ return !t.seat_id; });
  var gaChecked=gaTickets.filter(function(t){ return t.checked_in; }).length;
  var sectionList=Object.values(sectionStats);
  var capacity=ev.capacity||0, seatingMode=ev.seatingMode||'free';
  var showSeatProg=allEventSeats.length>0, showGAProg=gaTickets.length>0||(seatingMode==='free'&&capacity>0);

  var sectionRowsHTML='';
  sectionList.forEach(function(sec){
    var available=sec.total-sec.sold-sec.reserved;
    var soldPct=sec.total>0?(sec.sold/sec.total*100).toFixed(1):0;
    var resPct=sec.total>0?(sec.reserved/sec.total*100).toFixed(1):0;
    var col=(SEATING.TYPES[sec.seatType||'standard']||{}).color||'#3b82f6';
    sectionRowsHTML+='<div class="avail-row"><div class="avail-row-header"><span class="avail-row-name" style="color:'+col+'">'+sec.name+'</span><span class="avail-row-nums">'+sec.sold+' sold &middot; '+sec.reserved+' reserved &middot; '+available+' free / '+sec.total+'</span></div><div class="avail-track"><div class="avail-sold" style="width:'+soldPct+'%;background:var(--accent)"></div><div class="avail-reserved" style="width:'+resPct+'%;background:var(--amber)"></div></div></div>';
  });
  var gaBarW=capacity>0?Math.min(100,(gaTickets.length/capacity*100)).toFixed(1):(gaTickets.length>0?60:0);
  var gaRowHTML=showGAProg?'<div class="avail-row" style="margin-top:'+(showSeatProg?'14px':'0')+'"><div class="avail-row-header"><span class="avail-row-name" style="color:var(--purple)">&#x1F3B5; Free Seating</span><span class="avail-row-nums">'+gaTickets.length+' issued'+(capacity>0?' / '+capacity+' cap':'')+' &middot; '+gaChecked+' checked in</span></div><div class="avail-track"><div class="avail-sold" style="width:'+gaBarW+'%;background:var(--purple)"></div></div></div>':'';

  var ticketRowsHTML='';
  filtered.slice(0,500).forEach(function(t){
    var si=t.seats?[t.seats.section,t.seats.row_label?'Row '+t.seats.row_label:'',t.seats.seat_number?'Seat '+t.seats.seat_number:''].filter(Boolean).join(' · '):'';
    var isCancelled=t.cancelled===true;
    var checkedTime=isCancelled?'CANCELLED':t.checked_in?('&#10003; '+(t.checked_in_at?new Date(t.checked_in_at).toLocaleTimeString():'Just now')):'Pending';
    var dotColor=isCancelled?'#333':t.checked_in?'#22c55e':'#e94560';
    var rowStyle=isCancelled?'opacity:.55;background:#111':'';
    var statusClass=isCancelled?'cancelled':t.checked_in?'checked':'pending';
    ticketRowsHTML+='<div class="ticket-row" style="'+rowStyle+'">';
    ticketRowsHTML+='<div class="ticket-dot" style="background:'+dotColor+'"></div>';
    ticketRowsHTML+='<div style="flex:1;min-width:0">';
    ticketRowsHTML+='<div class="ticket-code" style="'+(isCancelled?'text-decoration:line-through;color:#555':'')+'">'+t.code+'</div>';
    ticketRowsHTML+='<div class="ticket-meta">'+t.holder+(t.phone?' &middot; '+t.phone:'')+(si?' &middot; <span style="color:var(--purple)">'+si+'</span>':'')+' &middot; '+new Date(t.issued_at||Date.now()).toLocaleDateString()+'</div>';
    ticketRowsHTML+='</div>';
    ticketRowsHTML+='<div class="ticket-status '+statusClass+'">'+checkedTime+'</div>';
    // Action buttons
    if(!isCancelled){
      ticketRowsHTML+='<button class="btn-ghost btn-xs btn-purple" data-dl="'+t.id+'" title="Download PNG">&#11015;</button>';
      if(!t.checked_in) ticketRowsHTML+='<button class="btn-ghost btn-xs btn-green" data-ci="'+t.id+'" title="Check in">&#10003; In</button>';
      ticketRowsHTML+='<button class="btn-ghost btn-xs btn-red" data-cancel="'+t.id+'" data-seat="'+(t.seat_id||'')+'" data-code="'+t.code+'" data-holder="'+t.holder+'" title="Cancel ticket">&#x2715; Cancel</button>';
    } else {
      ticketRowsHTML+='<button class="btn-ghost btn-xs" data-reinstate="'+t.id+'" data-seat="'+(t.seat_id||'')+'" data-code="'+t.code+'" title="Reinstate ticket">&#x21BA; Reinstate</button>';
    }
    ticketRowsHTML+='</div>';
  });
  if(filtered.length>500) ticketRowsHTML+='<p style="text-align:center;color:#444;font-size:12px;padding:12px">Showing 500 of '+filtered.length+'</p>';
  var capCard=capacity>0?'<div class="stat-card"><div class="stat-value" style="color:var(--purple)">'+Math.max(0,capacity-tickets.length)+'</div><div class="stat-label">Remaining</div></div>':'';
  var filterBtns=['all','pending','checked','cancelled'].map(function(f){ return '<button class="btn-ghost filter-btn'+(STATE.ticketFilter===f?' active':'')+'" data-filter="'+f+'">'+f[0].toUpperCase()+f.slice(1)+'</button>'; }).join('');
  var dlFilterBtn=(filtered.length>0&&filtered.length<tickets.length)?'<button class="btn-ghost btn-sm btn-purple" id="btn-dl-filt">&#11015; Filtered ('+filtered.length+')</button>':'';

  container.innerHTML=
    '<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F3AB; Issued Tickets</h2><p class="page-subtitle">'+ev.name+'</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-primary" id="btn-gen-tix">+ Generate</button>'+(tickets.length?'<button class="btn-ghost btn-purple" id="btn-dl-all">&#11015; All ('+tickets.length+')</button><button class="btn-ghost" id="btn-dl-csv">&#11015; CSV</button>':'')+' </div></div>'+
    '<div class="stats-row"><div class="stat-card"><div class="stat-value">'+tickets.length+'</div><div class="stat-label">Issued</div></div><div class="stat-card"><div class="stat-value" style="color:var(--green)">'+checked+'</div><div class="stat-label">Checked In</div></div><div class="stat-card"><div class="stat-value" style="color:var(--amber)">'+(tickets.length-checked)+'</div><div class="stat-label">Not Scanned</div></div><div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+(tickets.length?Math.round((checked/tickets.length)*100)+'%':'—')+'</div><div class="stat-label">Rate</div></div>'+capCard+'</div>'+
    '<div class="availability-block"><div class="availability-title">&#x1F4CA; Availability &amp; Progress</div>'+(showSeatProg?sectionRowsHTML:'')+gaRowHTML+(!showSeatProg&&!showGAProg?'<p style="color:#444;font-size:13px;text-align:center;padding:12px 0">No tickets issued yet.</p>':'')+' </div>'+
    '<div class="filter-row"><input type="text" id="tix-search" class="form-input" style="width:220px" placeholder="Search code or name…" value="'+STATE.ticketSearch+'">'+filterBtns+dlFilterBtn+'</div>'+
    (filtered.length===0?'<div class="empty-state" style="padding:50px 0"><div class="empty-icon" style="font-size:44px">&#x1F3AB;</div><div class="empty-title">'+(tickets.length===0?'No tickets yet. Click + Generate.':'No tickets match filter.')+'</div></div>':'<div class="ticket-list">'+ticketRowsHTML+'</div>');

  getEl('btn-gen-tix').onclick=function(){ showGenerateModal(null); };
  var dlA=getEl('btn-dl-all'); if(dlA) dlA.onclick=function(){ handleDLBatch(tickets); };
  var dlC=getEl('btn-dl-csv'); if(dlC) dlC.onclick=function(){ RENDERER.downloadCSV(tickets,ev.name); };
  var dlF=getEl('btn-dl-filt'); if(dlF) dlF.onclick=function(){ handleDLBatch(filtered); };
  var sch=getEl('tix-search'); if(sch) sch.oninput=function(){ STATE.ticketSearch=sch.value; buildTicketsView(container,tickets); };
  container.querySelectorAll('[data-filter]').forEach(function(btn){ btn.onclick=function(){ STATE.ticketFilter=btn.dataset.filter; buildTicketsView(container,tickets); }; });
  container.querySelectorAll('[data-dl]').forEach(function(btn){ btn.onclick=function(){ var t=tickets.find(function(x){ return x.id===btn.dataset.dl; }); if(t) handleDLSingle(t); }; });
  container.querySelectorAll('[data-ci]').forEach(function(btn){ btn.onclick=async function(){ var at=await DB.checkInTicket(btn.dataset.ci); var t=tickets.find(function(x){ return x.id===btn.dataset.ci; }); if(t){ t.checked_in=true; t.checked_in_at=at; } buildTicketsView(container,tickets); toast('Checked in ✓'); }; });
  container.querySelectorAll('[data-cancel]').forEach(function(btn){
    btn.onclick=async function(){
      var code=btn.dataset.code||'this ticket';
      var holder=btn.dataset.holder||'';
      // Explicit confirmation modal — must type YES or click confirm
      if(!confirm(
        'CANCEL TICKET — are you sure?\n\n'+
        'Code: '+code+(holder?'\nHolder: '+holder:'')+
        '\n\nThis will:\n• Mark the ticket as CANCELLED\n• Release the seat back to available\n• The ticket QR code will no longer scan as valid\n\n'+
        'This action can be reversed (Reinstate) only if the seat has not been reassigned.'
      )) return;
      var tId=btn.dataset.cancel, seatId=btn.dataset.seat||null;
      btn.disabled=true; btn.textContent='Cancelling…';
      try {
        await DB.cancelTicket(tId, seatId||null);
        var t=tickets.find(function(x){ return x.id===tId; });
        if(t){ t.cancelled=true; t.checked_in=false; }
        buildTicketsView(container,tickets);
        var sess=AUTH.session();
        await DB.logActivity(STATE.activeEvent?STATE.activeEvent.id:null,'Ticket cancelled','Code: '+code+(holder?' | '+holder:''),sess?sess.userId:null);
        toast('Ticket cancelled — seat released ✓');
      } catch(err){ toast('Error: '+err.message,5000); btn.disabled=false; btn.textContent='✕ Cancel'; }
    };
  });

  container.querySelectorAll('[data-reinstate]').forEach(function(btn){
    btn.onclick=async function(){
      var tId=btn.dataset.reinstate;
      var seatId=btn.dataset.seat||null;
      var code=btn.dataset.code||'this ticket';
      var t=tickets.find(function(x){ return x.id===tId; });
      if(!t) return;
      var ev=STATE.activeEvent;
      btn.disabled=true; btn.textContent='Checking…';
      try {
        // If allocated seating, check seat isn't taken by another active ticket
        if(seatId){
          var currentTix=await DB.getTickets(ev.id);
          var seatTaken=currentTix.some(function(x){ return x.seat_id===seatId && !x.cancelled && x.id!==tId; });
          if(seatTaken){
            toast('Cannot reinstate — seat has been allocated to another ticket.',5000);
            btn.disabled=false; btn.textContent='↺ Reinstate';
            return;
          }
          // Also check current seat status
          var seatData=(_cache.seats||[]).find(function(s){ return s.id===seatId; });
          if(seatData&&seatData.status!=='available'){
            var proceed=confirm(
              'Reinstate ticket for code: '+code+'?\n\n'+
              'Note: The seat is currently marked as "'+seatData.status+'" — reinstating will set it back to "sold".\n\n'+
              'Proceed?'
            );
            if(!proceed){ btn.disabled=false; btn.textContent='↺ Reinstate'; return; }
          } else {
            if(!confirm('Reinstate ticket '+code+'? The ticket will become valid again and the seat will be marked as sold.')) {
              btn.disabled=false; btn.textContent='↺ Reinstate'; return;
            }
          }
          // Restore seat to sold
          await _supa.from('seats').update({status:'sold'}).eq('id',seatId);
        } else {
          // Free seating — just confirm and reinstate
          if(!confirm('Reinstate ticket '+code+'? The ticket will become valid again.')) {
            btn.disabled=false; btn.textContent='↺ Reinstate'; return;
          }
        }
        // Mark ticket as not cancelled
        await _supa.from('tickets').update({cancelled:false}).eq('id',tId);
        if(t){ t.cancelled=false; }
        // Update cache
        var s=(_cache.seats||[]).find(function(x){ return x.id===seatId; });
        if(s) s.status='sold';
        buildTicketsView(container,tickets);
        var sess=AUTH.session();
        await DB.logActivity(ev.id,'Ticket reinstated','Code: '+code,sess?sess.userId:null);
        toast('Ticket reinstated ✓');
      } catch(err){ toast('Error: '+err.message,5000); btn.disabled=false; btn.textContent='↺ Reinstate'; }
    };
  });
}

// TICKET PREVIEW MODAL (before download)
// ═══════════════════════════════════════════════════════════════════════════════
function showTicketPreviewModal(selectedSeats){
  var ev=STATE.activeEvent;
  if(!evTicketsUnlocked(ev)){ toast('⚠️ Event must be approved before tickets can be generated.', 4000); return; }
  var maxSeats=ev.maxSeatsPerReservation||4;
  if(selectedSeats.length>maxSeats){ toast('Max '+maxSeats+' seats per batch (set on event).',4000); return; }

  // Build a draft ticket for each seat
  var drafts=selectedSeats.map(function(seat){
    return { _id:genUID(), seat:seat, holder:'', phone:'', code:'', note:'' };
  });

  var overlay=document.createElement('div'); overlay.className='modal-overlay'; document.body.appendChild(overlay);

  function buildPreviewHTML(){
    var html='<div class="modal-box" style="max-width:700px;width:100%">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 class="modal-title" style="margin:0">&#x1F3AB; Preview & Generate ('+drafts.length+' ticket'+(drafts.length>1?'s':'')+')</h3><button class="btn-ghost btn-xs" id="prev-close">&#x2715;</button></div>';
    // Batch fields
    html+='<div style="background:#141414;border:1px solid #252525;border-radius:10px;padding:16px;margin-bottom:16px">';
    html+='<div style="font-size:11px;color:var(--accent);letter-spacing:2px;font-weight:700;margin-bottom:12px">BATCH DETAILS (applies to all tickets)</div>';
    html+='<div class="form-grid">';
    html+='<label class="form-label">Holder Name<input type="text" class="form-input" id="batch-holder" placeholder="e.g. Ali Hassan" value="'+(drafts[0].holder||'')+'"></label>';
    html+='<label class="form-label">Phone Number<input type="text" class="form-input" id="batch-phone" placeholder="e.g. +960 7771234" value="'+(drafts[0].phone||'')+'"></label>';
    html+='</div>';
    html+='<div style="margin-top:10px;display:flex;gap:10px;align-items:center">';
    html+='<label class="form-label" style="flex:1">Code Prefix <span style="opacity:.5">(up to 6)</span><input type="text" class="form-input" id="batch-prefix" value="'+(ev.name||'TKT').slice(0,3).toUpperCase()+'" maxlength="6"></label>';
    html+='<button class="btn-ghost btn-sm" id="btn-apply-batch" style="margin-top:20px">Apply to All &#8595;</button>';
    html+='</div></div>';
    // Per-ticket list
    html+='<div style="font-size:11px;color:#555;letter-spacing:2px;font-weight:700;margin-bottom:10px">PER-TICKET DETAILS</div>';
    html+='<div class="preview-ticket-grid">';
    drafts.forEach(function(d,i){
      var typeInfo=SEATING.TYPES[d.seat.seat_type||'standard']||{};
      html+='<div class="preview-ticket-card">';
      html+='<div class="preview-ticket-header"><div><div style="font-weight:700;font-size:14px">Ticket #'+(i+1)+'</div><div class="preview-ticket-seat" style="color:'+(typeInfo.color||'#888')+'">'+d.seat.section+' &middot; Row '+d.seat.row_label+' &middot; Seat '+d.seat.seat_number+' &middot; $'+d.seat.price+'</div></div>';
      html+='<span style="font-size:11px;color:'+(typeInfo.color||'#888')+'">'+( typeInfo.label||'')+'</span></div>';
      html+='<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">';
      html+='<label class="form-label">Name<input type="text" class="form-input pt-holder" data-i="'+i+'" value="'+d.holder+'" placeholder="Holder name"></label>';
      html+='<label class="form-label">Phone<input type="text" class="form-input pt-phone" data-i="'+i+'" value="'+d.phone+'" placeholder="+960 …"></label>';
      html+='</div></div>';
    });
    html+='</div>';
    var total=drafts.reduce(function(s,d){ return s+d.seat.price; },0);
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">';
    html+='<span style="font-size:14px;color:#888">Total: <strong style="color:var(--text)">$'+total+'</strong></span>';
    html+='<div style="display:flex;gap:10px"><button class="btn-ghost" id="prev-cancel">Cancel</button><button class="btn-primary" id="prev-confirm">&#x2713; Confirm &amp; Download</button></div>';
    html+='</div></div>';
    return html;
  }

  function renderPreview(){
    overlay.innerHTML=buildPreviewHTML();
    overlay.querySelector('#prev-close').onclick=function(){ overlay.remove(); };
    overlay.querySelector('#prev-cancel').onclick=function(){ overlay.remove(); };

    // Live-bind per-ticket fields
    overlay.querySelectorAll('.pt-holder').forEach(function(inp){
      inp.oninput=function(){ drafts[parseInt(inp.dataset.i)].holder=inp.value; };
    });
    overlay.querySelectorAll('.pt-phone').forEach(function(inp){
      inp.oninput=function(){ drafts[parseInt(inp.dataset.i)].phone=inp.value; };
    });

    // Apply batch to all
    overlay.querySelector('#btn-apply-batch').onclick=function(){
      var bh=overlay.querySelector('#batch-holder').value;
      var bp=overlay.querySelector('#batch-phone').value;
      drafts.forEach(function(d){ d.holder=bh; d.phone=bp; });
      renderPreview();
    };

    overlay.querySelector('#prev-confirm').onclick=async function(){
      var prefix=(overlay.querySelector('#batch-prefix').value||'TKT').toUpperCase().slice(0,6);
      // Fill any still-empty holder/phone from batch fields
      var bh=overlay.querySelector('#batch-holder').value||'General Admission';
      var bp=overlay.querySelector('#batch-phone').value||'';
      // Read per-ticket fields one last time
      overlay.querySelectorAll('.pt-holder').forEach(function(inp){ drafts[parseInt(inp.dataset.i)].holder=inp.value||bh; });
      overlay.querySelectorAll('.pt-phone').forEach(function(inp){ drafts[parseInt(inp.dataset.i)].phone=inp.value||bp; });
      overlay.remove();
      // Generate tickets
      var tickets=drafts.map(function(d){
        var code=prefix+'-'+genUID();
        return { id:genUID(), event_id:ev.id, seat_id:d.seat.id, code:code, qr_data:'TKT:'+ev.id+':'+code, holder:d.holder||bh, phone:d.phone||bp, checked_in:false, checked_in_at:null, issued_at:nowISO() };
      });
      await DB.saveTickets(tickets);
      await DB.updateSeatsStatus(selectedSeats.map(function(s){ return s.id; }),'sold');
      toast(tickets.length+' ticket'+(tickets.length>1?'s':'')+' generated ✓');
      // Enrich tickets with full seat objects for renderer (so seat/row prints on image)
      var enrichedTickets=tickets.map(function(t){
        return Object.assign({},t,{seats:selectedSeats.find(function(s){ return s.id===t.seat_id; })||null});
      });
      // Download — must await so the render loop completes before navigate() tears down the DOM
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js');
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
      await handleDLBatch(enrichedTickets);
      navigate('tickets');
    };
  }
  renderPreview();
}

// GENERATE MODAL (from Designer / Tickets tab — not from map)
// ═══════════════════════════════════════════════════════════════════════════════
async function showGenerateModal(pickedSeats){
  var ev=STATE.activeEvent;
  if(!evTicketsUnlocked(ev)){ toast('⚠️ Event must be approved before tickets can be generated.', 4000); return; }
  var allSeats=(_cache.seats||[]).filter(function(s){ return s.event_id===ev.id; });
  var availSeats=allSeats.filter(function(s){ return s.status==='available'; });
  var issuedCount=(_cache.tickets||[]).filter(function(t){ return t.event_id===ev.id; }).length;
  var capacity=ev.capacity||0, seatingMode=ev.seatingMode||'free';
  var fromMap=!!(pickedSeats&&pickedSeats.length>0);

  // If from map, go straight to preview modal
  if(fromMap){ showTicketPreviewModal(pickedSeats); return; }

  var tierMap={};
  allSeats.forEach(function(s){ if(!tierMap[s.section]) tierMap[s.section]={name:s.section,total:0,sold:0,seatType:s.seat_type}; tierMap[s.section].total++; if(s.status==='sold'||s.status==='reserved') tierMap[s.section].sold++; });
  var tiers=Object.values(tierMap);

  var overlay=document.createElement('div'); overlay.className='modal-overlay'; document.body.appendChild(overlay);
  var currentMode=seatingMode==='allocated'&&availSeats.length>0?'allocated':'free';

  function buildHTML(mode){
    var isFree=mode==='free';
    var gaRem=capacity>0?Math.max(0,capacity-issuedCount):null;
    var html='<div class="modal-box" style="max-width:520px;width:100%">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 class="modal-title" style="margin:0">Generate Tickets</h3><button class="btn-ghost btn-xs" id="gen-close">&#x2715;</button></div>';
    html+='<p style="color:#888;font-size:13px;margin-bottom:16px">Event: <strong style="color:var(--accent)">'+ev.name+'</strong>'+(capacity>0?' &nbsp;<span style="color:var(--purple)">'+issuedCount+'/'+capacity+'</span>':'')+'</p>';
    html+='<div class="mode-toggle"><button class="mode-btn '+(isFree?'active':'')+'" data-mode="free">&#x1F3B5; Free Seating</button><button class="mode-btn '+(!isFree?'active':'')+'" data-mode="allocated">&#x1F4BA; Allocated</button></div>';
    if(isFree){
      html+='<p style="font-size:12px;color:#666;margin-bottom:14px">Generate tickets without seat assignment. Good for standing/GA events.</p>';
      html+='<div class="form-grid" style="margin-bottom:14px"><label class="form-label">Number of Tickets<input type="number" class="form-input" id="gen-count" min="1" max="50000" value="'+(gaRem!==null?Math.min(50,gaRem):50)+'"></label>';
      html+='<label class="form-label">Code Prefix<input type="text" class="form-input" id="gen-prefix" value="'+(ev.name||'TKT').slice(0,3).toUpperCase()+'" maxlength="6"></label></div>';
      html+='<div class="form-grid" style="margin-bottom:14px"><label class="form-label">Holder Name<input type="text" class="form-input" id="gen-holder" placeholder="General Admission"></label><label class="form-label">Phone<input type="text" class="form-input" id="gen-phone" placeholder="+960 …"></label></div>';
      if(capacity>0){ var capPct=Math.min(100,(issuedCount/capacity*100)).toFixed(1); var rem=Math.max(0,capacity-issuedCount); html+='<div style="background:#141414;border:1px solid #252525;border-radius:8px;padding:12px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--purple)">'+issuedCount+' issued</span><span style="color:#666">'+capacity+' max &nbsp;&bull;&nbsp; <span style="color:var(--green)">'+rem+' remaining</span></span></div><div class="avail-track"><div class="avail-sold" style="width:'+capPct+'%;background:var(--purple)"></div></div></div>'; }
      if(tiers.length>0){ html+='<div style="font-size:11px;color:#555;letter-spacing:2px;font-weight:700;margin-bottom:10px">SECTION FILL</div><div class="tier-capacity-grid">'; tiers.forEach(function(t){ var avail=t.total-t.sold,pct=t.total>0?Math.round(t.sold/t.total*100):0,col=(SEATING.TYPES[t.seatType||'standard']||{}).color||'#3b82f6'; html+='<div class="tier-capacity-card"><div class="tier-capacity-title" style="color:'+col+'">'+t.name+'</div><div class="tier-bar-label"><span style="color:var(--accent)">'+t.sold+' sold</span><span style="color:var(--green)">'+avail+' free</span></div><div class="tier-bar-track"><div class="tier-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>'; }); html+='</div>'; }
    } else {
      html+='<p style="font-size:12px;color:#666;margin-bottom:14px">Assign tickets to specific seats.</p>';
      html+='<label class="form-label" style="margin-bottom:14px">Seat Assignment<select class="form-input" id="gen-alloc-method"><option value="all">All available ('+availSeats.length+')</option><option value="count">First N seats</option></select></label>';
      html+='<div id="gen-alloc-count-wrap" style="display:none;margin-bottom:14px"><label class="form-label">Number<input type="number" class="form-input" id="gen-alloc-count" min="1" max="'+availSeats.length+'" value="'+Math.min(10,availSeats.length)+'"></label></div>';
      html+='<div class="form-grid" style="margin-bottom:14px"><label class="form-label">Code Prefix<input type="text" class="form-input" id="gen-prefix" value="'+(ev.name||'TKT').slice(0,3).toUpperCase()+'" maxlength="6"></label><label class="form-label">Holder Name<input type="text" class="form-input" id="gen-holder" placeholder="General Admission"></label></div>';
      html+='<div class="form-grid" style="margin-bottom:14px"><label class="form-label">Phone<input type="text" class="form-input" id="gen-phone" placeholder="+960 …"></label></div>';
    }
    html+='<div id="gen-prog" style="display:none;margin-top:14px"><div class="dl-progress"><div class="dl-progress-fill" id="gen-fill" style="width:0%"></div></div><p style="font-size:12px;color:#888;margin-top:6px" id="gen-lbl">Generating…</p></div>';
    html+='<div class="form-actions"><button class="btn-ghost" id="gen-cancel">Cancel</button><button class="btn-primary" id="gen-go">&#x1F3AB; Generate</button></div></div>';
    return html;
  }

  overlay.innerHTML=buildHTML(currentMode);

  function bindModal(){
    var closeEl=overlay.querySelector('#gen-close'), cancelEl=overlay.querySelector('#gen-cancel'), goEl=overlay.querySelector('#gen-go');
    if(closeEl) closeEl.onclick=function(){ overlay.remove(); };
    if(cancelEl) cancelEl.onclick=function(){ overlay.remove(); };
    overlay.querySelectorAll('.mode-btn').forEach(function(btn){ btn.onclick=function(){ currentMode=btn.dataset.mode; overlay.innerHTML=buildHTML(currentMode); bindModal(); }; });
    var methodEl=overlay.querySelector('#gen-alloc-method'), countWrap=overlay.querySelector('#gen-alloc-count-wrap');
    if(methodEl) methodEl.onchange=function(){ if(countWrap) countWrap.style.display=methodEl.value==='count'?'':'none'; };
    if(!goEl) return;
    goEl.onclick=async function(){
      var prefix=((overlay.querySelector('#gen-prefix')||{}).value||'TKT').toUpperCase().slice(0,6);
      var holder=((overlay.querySelector('#gen-holder')||{}).value||'').trim()||'General Admission';
      var phone=((overlay.querySelector('#gen-phone')||{}).value||'').trim();
      var prog=overlay.querySelector('#gen-prog'), fill=overlay.querySelector('#gen-fill'), lbl=overlay.querySelector('#gen-lbl');
      var seatsToAssign=[];
      if(currentMode==='free'){
        var count=Math.max(1,parseInt((overlay.querySelector('#gen-count')||{}).value)||1);
        if(capacity>0){ var rem=capacity-issuedCount; if(rem<=0){ alert('Capacity reached.'); return; } if(count>rem){ if(!confirm('Only '+rem+' remaining. Generate '+rem+'?')) return; count=rem; } }
        goEl.disabled=true; goEl.textContent='Generating…'; prog.style.display='';
        var tickets=[];
        for(var i=0;i<count;i++){ var code=prefix+'-'+genUID(); tickets.push({id:genUID(),event_id:ev.id,seat_id:null,code:code,qr_data:'TKT:'+ev.id+':'+code,holder:holder,phone:phone,checked_in:false,checked_in_at:null,issued_at:nowISO()}); fill.style.width=Math.round(((i+1)/count)*100)+'%'; lbl.textContent='Creating…'+Math.round(((i+1)/count)*100)+'%'; if(i%30===0) await new Promise(function(r){ setTimeout(r,0); }); }
        try{ await DB.saveTickets(tickets); overlay.remove(); toast(tickets.length+' tickets generated ✓'); navigate('tickets'); } catch(e){ alert('Error: '+e.message); goEl.disabled=false; goEl.textContent='Generate'; prog.style.display='none'; }
      } else {
        var method=((overlay.querySelector('#gen-alloc-method')||{}).value)||'all';
        if(method==='count'){ var n=Math.min(parseInt((overlay.querySelector('#gen-alloc-count')||{}).value)||1,availSeats.length); seatsToAssign=availSeats.slice(0,n); } else seatsToAssign=availSeats;
        if(!seatsToAssign.length){ alert('No available seats.'); return; }
        var total=seatsToAssign.length; goEl.disabled=true; goEl.textContent='Generating…'; prog.style.display='';
        var tickets=[];
        for(var i=0;i<total;i++){ var code=prefix+'-'+genUID(); tickets.push({id:genUID(),event_id:ev.id,seat_id:seatsToAssign[i].id,code:code,qr_data:'TKT:'+ev.id+':'+code,holder:holder,phone:phone,checked_in:false,checked_in_at:null,issued_at:nowISO()}); fill.style.width=Math.round(((i+1)/total)*100)+'%'; lbl.textContent='Assigning…'+Math.round(((i+1)/total)*100)+'%'; if(i%20===0) await new Promise(function(r){ setTimeout(r,0); }); }
        try{ await DB.saveTickets(tickets); await Promise.all(seatsToAssign.map(function(s){ return DB.updateSeatStatus(s.id,'sold'); })); overlay.remove(); toast(tickets.length+' seated tickets generated ✓'); navigate('tickets'); } catch(e){ alert('Error: '+e.message); goEl.disabled=false; goEl.textContent='Generate'; prog.style.display='none'; }
      }
    };
  }
  bindModal();
}

// Download helpers
async function handleDLSingle(ticket){
  showDLModal(10,'Rendering '+ticket.code+'…');
  try{ await loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js'); await RENDERER.downloadSingle(STATE.activeEvent.design,STATE.activeEvent,ticket); showDLModal(100,'Download ready!'); } catch(e){ hideDLModal(); alert('Download failed: '+e.message); }
}
async function handleDLBatch(tickets){
  if(!tickets.length) return;
  if(tickets.length===1){ return handleDLSingle(tickets[0]); }
  showDLModal(0,'Preparing '+tickets.length+' tickets…');
  try{
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js');
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
    await RENDERER.downloadZIP(STATE.activeEvent.design,STATE.activeEvent,tickets,function(pct){ showDLModal(pct,'Rendering… '+pct+'%'); });
    showDLModal(100,'ZIP ready!');
  } catch(e){ hideDLModal(); alert('Download failed: '+e.message); }
}
var dlModalEl=null;
function showDLModal(pct,label){
  if(!dlModalEl){ dlModalEl=document.createElement('div'); dlModalEl.className='modal-overlay'; dlModalEl.innerHTML='<div class="modal-box" style="text-align:center"><div style="font-size:40px;margin-bottom:12px">&#11015;&#65039;</div><div id="dl-label" style="font-size:15px;margin-bottom:4px"></div><div class="dl-progress"><div class="dl-progress-fill" id="dl-fill"></div></div><div id="dl-pct" style="color:#888;font-size:13px"></div><p id="dl-done" style="color:var(--green);font-size:13px;display:none;margin-top:8px">&#10003; Done! Check your downloads.</p><button class="btn-primary" id="dl-close" style="display:none;margin-top:14px">Close</button></div>'; document.body.appendChild(dlModalEl); dlModalEl.querySelector('#dl-close').onclick=hideDLModal; }
  dlModalEl.querySelector('#dl-label').textContent=label; dlModalEl.querySelector('#dl-fill').style.width=pct+'%'; dlModalEl.querySelector('#dl-pct').textContent=pct+'%';
  if(pct>=100){ dlModalEl.querySelector('#dl-done').style.display=''; dlModalEl.querySelector('#dl-close').style.display=''; }
}
function hideDLModal(){ if(dlModalEl){ dlModalEl.remove(); dlModalEl=null; } }

// ═══════════════════════════════════════════════════════════════════════════════
// RESERVATIONS VIEW (admin)
// ═══════════════════════════════════════════════════════════════════════════════
async function renderReservations(container){
  var session=AUTH.session();
  var evId=STATE.activeEvent?STATE.activeEvent.id:null;
  if(evId) await refreshCache(evId); else { _cache.events=await DB.getEvents(null); }
  var rsvs=await DB.getReservations(evId);
  // For admin without active event, show all
  if(!evId&&session.role!=='admin'){ container.innerHTML='<p style="color:#666;padding:40px">Select an event first.</p>'; return; }
  if(!evId&&session.role==='admin'){
    // Filter to organiser's events
    var orgEvents=_cache.events||[]; rsvs=await DB.getReservations(null);
  }
  var pending=rsvs.filter(function(r){ return r.status==='pending'; });
  var approved=rsvs.filter(function(r){ return r.status==='approved'; });
  var rejected=rsvs.filter(function(r){ return r.status==='rejected'; });

  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F4CB; Reservations</h2><p class="page-subtitle">'+(STATE.activeEvent?STATE.activeEvent.name:'All Events')+'</p></div></div>';
  html+='<div class="stats-row">';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--amber)">'+pending.length+'</div><div class="stat-label">Pending</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--green)">'+approved.length+'</div><div class="stat-label">Approved</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:#555">'+rejected.length+'</div><div class="stat-label">Rejected</div></div>';
  html+='</div>';
  if(!rsvs.length){ html+='<div class="empty-state"><div class="empty-icon">&#x1F4CB;</div><div class="empty-title">No reservations yet</div><p style="color:#444;font-size:13px;margin-top:4px">Reservations appear here when customers request seats via the public booking page.</p></div>'; container.innerHTML=html; return; }
  html+='<div id="res-list"></div>';
  container.innerHTML=html;
  // Waitlist panel — show at bottom of reservations
  var wlPanel=document.createElement('div');
  wlPanel.innerHTML='<div class="panel" style="margin-top:24px"><div class="panel-title">&#x23F3; WAITLIST</div><div id="wl-panel-inner"><div style="color:#555;font-size:13px;padding:8px">Loading…</div></div></div>';
  container.appendChild(wlPanel);
  renderWaitlistPanel(STATE.activeEvent,getEl('wl-panel-inner'));

  function renderList(){
    var listEl=getEl('res-list'); if(!listEl) return;
    var list='';
    rsvs.forEach(function(r){
      var ev=(_cache.events||[]).find(function(e){ return e.id===r.event_id; })||{};
      list+='<div class="res-card '+r.status+'">';
      list+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px">';
      list+='<div><div style="font-weight:700;font-size:15px">'+r.name+' &nbsp;<span style="font-weight:400;color:#666;font-size:13px">'+r.phone+'</span></div>';
      list+='<div style="font-size:12px;color:#666;margin-top:2px">'+r.email+'</div>';
      list+='<div style="font-size:12px;color:#888;margin-top:4px">Ref: <span style="font-family:monospace;color:var(--text)">'+r.ref+'</span></div>';
      if(r.notes) list+='<div style="font-size:12px;color:var(--amber);margin-top:3px">&#x1F4DD; '+r.notes+'</div>';
      if(r.payment_slip) list+='<button class="btn-ghost btn-xs btn-purple" data-slip="'+r.id+'" style="margin-top:6px">&#x1F4F7; View Transfer Slip</button>';
      else list+='<span style="font-size:11px;color:#444;margin-top:6px;display:inline-block">No slip uploaded</span>';
      if(!evId) list+='<div style="font-size:11px;color:var(--blue);margin-top:2px">&#x1F4C5; '+ev.name+'</div>';
      list+='</div>';
      list+='<span class="res-status-badge '+r.status+'">'+r.status.toUpperCase()+'</span>';
      list+='</div>';
      list+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
      (r.seatObjects||[]).forEach(function(s){ if(s) list+='<span style="background:#1a1a2e;border:1px solid #3b82f633;border-radius:6px;padding:3px 10px;font-size:12px;color:#3b82f6">'+s.section+' R'+s.row_label+' #'+s.seat_number+' ($'+s.price+')</span>'; });
      list+='</div>';
      list+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
      list+='<div style="font-size:13px">Total: <strong style="color:var(--accent)">$'+r.total_amount+'</strong> &nbsp;&nbsp; Requested: <span style="color:#666">'+new Date(r.requested_at).toLocaleString()+'</span></div>';
      list+='<div style="display:flex;gap:8px">';
      if(r.status==='pending'){
        list+='<button class="btn-primary btn-sm btn-approve" data-id="'+r.id+'">&#x2713; Approve &amp; Generate</button>';
        list+='<button class="btn-ghost btn-sm btn-red btn-reject" data-id="'+r.id+'">&#x2715; Reject</button>';
      }
      list+='<button class="btn-ghost btn-xs" data-note-res="'+r.id+'" title="Add private note">&#x1F4DD; Note</button>';
      if(r.status==='approved'&&r.ticket_ids&&r.ticket_ids.length){
        list+='<button class="btn-ghost btn-sm btn-purple btn-dl-res" data-id="'+r.id+'">&#11015; Download Tickets</button>';
      }
      if(r.status==='rejected'){
        if(r.rejection_reason) list+='<span style="font-size:12px;color:#555">Reason: '+r.rejection_reason+'</span>';
        list+='<button class="btn-ghost btn-sm btn-green btn-reopen" data-id="'+r.id+'">&#x21BA; Reopen</button>';
      }
      list+='</div></div></div>';
    });
    listEl.innerHTML=list;
    listEl.querySelectorAll('[data-slip]').forEach(function(btn){
      btn.onclick=function(){
        var r=rsvs.find(function(x){ return x.id===btn.dataset.slip; });
        if(!r||!r.payment_slip) return;
        var w=window.open('','_blank','width=900,height=700,resizable=yes');
        w.document.write('<html><head><title>Transfer Slip — '+r.ref+'</title></head><body style="margin:0;background:#111;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:sans-serif"><div style="padding:16px;color:#888;font-size:13px">'+r.ref+' &mdash; '+r.name+'</div><img src="'+r.payment_slip+'" style="max-width:100%;max-height:calc(100vh - 60px);object-fit:contain"></body></html>');
      };
    });
    listEl.querySelectorAll('.btn-approve').forEach(function(btn){
      btn.onclick=async function(){
        var res=rsvs.find(function(r){ return r.id===btn.dataset.id; }); if(!res) return;

        // ── Guard: prevent duplicate approval ────────────────────────────────
        if(res.status==='approved'||(res.ticket_ids&&res.ticket_ids.length>0)){
          toast('Already approved — tickets already generated.',4000); return;
        }

        var approveBtn=btn; approveBtn.disabled=true; approveBtn.textContent='Processing…';
        var ev=(_cache.events||[]).find(function(e){ return e.id===res.event_id; })||STATE.activeEvent;
        var isFreeSeating = !res.seat_ids || res.seat_ids.length===0;

        try {
          var prefix=(ev&&ev.name||'TKT').slice(0,3).toUpperCase();
          var tickets=[];

          if(isFreeSeating){
            // Free seating — generate one GA ticket (no seat assignment)
            var code=prefix+'-'+genUID();
            tickets=[{
              id:genUID(), event_id:res.event_id, seat_id:null,
              code:code, qr_data:'TKT:'+res.event_id+':'+code,
              holder:res.name, phone:res.phone,
              checked_in:false, checked_in_at:null, issued_at:nowISO()
            }];
          } else {
            // Allocated seating — one ticket per seat, guard against duplicates
            var existingTix=await DB.getTickets(res.event_id);
            var usedSeatIds=new Set(existingTix
              .filter(function(t){ return !t.cancelled; })
              .map(function(t){ return t.seat_id; }).filter(Boolean));
            var seatsToIssue=(res.seatObjects||[]).filter(function(s){ return s&&!usedSeatIds.has(s.id); });
            if(seatsToIssue.length===0){
              toast('Tickets for these seats already exist.',4000);
              approveBtn.disabled=false; approveBtn.textContent='✓ Approve & Generate';
              return;
            }
            tickets=seatsToIssue.map(function(seat){
              var code=prefix+'-'+genUID();
              return {id:genUID(),event_id:res.event_id,seat_id:seat.id,
                code:code,qr_data:'TKT:'+res.event_id+':'+code,
                holder:res.name,phone:res.phone,
                checked_in:false,checked_in_at:null,issued_at:nowISO()};
            });
            // Mark seats as sold
            await DB.updateSeatsStatus(res.seat_ids,'sold');
          }

          await DB.saveTickets(tickets);
          res.status='approved';
          res.ticket_ids=tickets.map(function(t){ return t.id; });
          await DB.saveReservation(res);
          var session2=AUTH.session();
          await DB.logActivity(res.event_id,'Reservation approved','Ref: '+res.ref+' | '+res.name+' | $'+res.total_amount,session2?session2.userId:null);
          toast('Approved ✓ — downloading tickets…');

          // Immediate download
          var savedActiveEvent=STATE.activeEvent;
          STATE.activeEvent=ev;
          var ticketsWithSeats=tickets.map(function(t){
            var seat=isFreeSeating?null:(res.seatObjects||[]).find(function(s){ return s&&s.id===t.seat_id; })||null;
            return Object.assign({},t,{seats:seat});
          });
          await handleDLBatch(ticketsWithSeats);
          STATE.activeEvent=savedActiveEvent;

          // Refresh list in place
          rsvs=await DB.getReservations(evId||null);
          renderList();
        } catch(err){
          toast('Error: '+err.message, 5000);
          approveBtn.disabled=false; approveBtn.textContent='✓ Approve & Generate';
        }
      };
    });
    listEl.querySelectorAll('.btn-reject').forEach(function(btn){
      btn.onclick=async function(){
        var reason=prompt('Rejection reason (shown to customer):'); if(reason===null) return;
        var res=rsvs.find(function(r){ return r.id===btn.dataset.id; }); if(!res) return;
        btn.disabled=true; btn.textContent='Rejecting…';
        try {
          res.status='rejected'; res.rejection_reason=reason||'Request rejected.';
          await DB.saveReservation(res);
          await _supa.rpc('release_held_seats',{p_seat_ids:res.seat_ids||[]}).catch(function(){});
          var session3=AUTH.session();
          await DB.logActivity(res.event_id,'Reservation rejected','Ref: '+res.ref+' | '+res.name+' | Reason: '+res.rejection_reason,session3?session3.userId:null);
          toast('Reservation rejected, seats released ✓');
          rsvs=await DB.getReservations(evId||null);
          renderList();
        } catch(err){
          toast('Error: '+err.message, 5000);
          btn.disabled=false; btn.textContent='✕ Reject';
        }
      };
    });
    listEl.querySelectorAll('.btn-reopen').forEach(function(btn){
      btn.onclick=async function(){
        if(!confirm('Reopen this reservation and set it back to pending?')) return;
        var res=rsvs.find(function(r){ return r.id===btn.dataset.id; }); if(!res) return;
        btn.disabled=true;
        try {
          res.status='pending'; res.rejection_reason='';
          await DB.saveReservation(res);
          toast('Reservation reopened ✓');
          rsvs=await DB.getReservations(evId||null);
          renderList();
        } catch(err){ toast('Error: '+err.message,5000); btn.disabled=false; }
      };
    });
    listEl.querySelectorAll('[data-note-res]').forEach(function(btn){
      btn.onclick=function(){
        var res=rsvs.find(function(r){ return r.id===btn.dataset.noteRes; }); if(!res) return;
        var note=prompt('Private note (only visible to you and admins):',res.notes||'');
        if(note===null) return;
        res.notes=note;
        DB.saveReservation(res).then(function(){ renderList(); toast('Note saved ✓'); }).catch(function(e){ toast('Error: '+e.message,5000); });
      };
    });
    listEl.querySelectorAll('.btn-dl-res').forEach(function(btn){
      btn.onclick=async function(){
        var res=rsvs.find(function(r){ return r.id===btn.dataset.id; }); if(!res) return;
        var ev=(_cache.events||[]).find(function(e){ return e.id===res.event_id; })||STATE.activeEvent; if(!ev) return;
        var allTix=await DB.getTickets(res.event_id).then(function(ts){
          return ts.filter(function(t){ return (res.ticket_ids||[]).includes(t.id); });
        });
        var seats=_cache.seats||[];
        var tixWithSeats=allTix.map(function(t){ return Object.assign({},t,{seats:t.seat_id?seats.find(function(s){ return s.id===t.seat_id; })||null:null}); });
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        STATE.activeEvent=ev; // temp for renderer
        handleDLBatch(tixWithSeats);
      };
    });
  }
  renderList();
}

// USERS VIEW (super-admin only)
// ═══════════════════════════════════════════════════════════════════════════════
async function renderUsers(container){
  if(!AUTH.isAdmin()){ container.innerHTML='<p style="color:#666;padding:40px">Access denied.</p>'; return; }
  var users=await DB.getUsers();
  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F465; Users</h2><p class="page-subtitle">Manage organiser accounts</p></div><button class="btn-primary" id="btn-new-user">+ New Organiser</button></div>';
  html+='<div id="user-form-area"></div><div id="user-list">';
  users.forEach(function(u){
    html+='<div class="user-card">';
    html+='<div class="user-avatar">'+u.name[0].toUpperCase()+'</div>';
    html+='<div style="flex:1"><div style="font-weight:700">'+u.name+' <span style="font-weight:400;color:#666;font-size:12px">@'+u.username+'</span> <span style="font-size:11px;padding:2px 8px;border-radius:12px;background:'+(u.role==='admin'?'#1a0a12':'#0d1a2e')+';color:'+(u.role==='admin'?'var(--accent)':'var(--blue)')+'">'+u.role+'</span></div>';
    if(u.bank_name) html+='<div style="font-size:12px;color:#666;margin-top:3px">&#x1F3E6; '+u.bank_holder+' &middot; '+u.bank_name+' &middot; '+u.bank_account+'</div>';
    html+='</div>';
    if(u.role!=='admin') html+='<button class="btn-ghost btn-sm" data-edit-user="'+u.id+'">Edit</button><button class="btn-ghost btn-sm btn-red" data-del-user="'+u.id+'">&#x2715;</button>';
    html+='</div>';
  });
  html+='</div>';
  container.innerHTML=html;
  getEl('btn-new-user').onclick=function(){ showUserForm(null); };
  container.querySelectorAll('[data-edit-user]').forEach(function(btn){ btn.onclick=function(){ var u=users.find(function(x){ return x.id===btn.dataset.editUser; }); if(u) showUserForm(u); }; });
  container.querySelectorAll('[data-del-user]').forEach(function(btn){ btn.onclick=async function(){ if(!confirm('Delete this organiser? Their events and data will remain but they cannot log in.')) return;
    try {
      var sess = await _supa.auth.getSession();
      var token = sess.data.session.access_token;
      var res = await fetch('/api/delete-user', { method:'DELETE', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body:JSON.stringify({userId:btn.dataset.delUser}) });
      var data = await res.json();
      if(data.error){ alert('Error: '+data.error); return; }
      renderUsers(container); toast('Organiser deleted.');
    } catch(e){ alert('Error: '+e.message); }
  }; });
}

function showUserForm(user){
  var area=getEl('user-form-area'); if(!area) return;
  var isEdit=!!user;
  var html='<div class="panel"><div class="panel-title">'+(isEdit?'EDIT ORGANISER':'NEW ORGANISER')+'</div>';
  html+='<div class="form-grid">';
  html+='<label class="form-label">Full Name<input type="text" class="form-input" id="uf-name" value="'+(user?user.name:'')+'" placeholder="Display name"></label>';
  html+='<label class="form-label">Username / Handle<input type="text" class="form-input" id="uf-uname" value="'+(user?user.username:'')+'" placeholder="e.g. ali_events"></label>';
  if(!isEdit){
    html+='<label class="form-label">Email Address<input type="email" class="form-input" id="uf-email" placeholder="organiser@email.com"></label>';
    html+='<label class="form-label">Password<input type="password" class="form-input" id="uf-pass" placeholder="Min 8 characters"></label>';
  }
  html+='</div>';
  html+='<div style="margin-top:18px;padding-top:18px;border-top:1px solid var(--border)"><div class="panel-title">PAYMENT DETAILS</div>';
  html+='<div class="form-grid">';
  html+='<label class="form-label">Bank Name<input type="text" class="form-input" id="uf-bank" value="'+(user?user.bank_name||'':'')+'" placeholder="e.g. Bank of Maldives"></label>';
  html+='<label class="form-label">Account Number<input type="text" class="form-input" id="uf-acct" value="'+(user?user.bank_account||'':'')+'" placeholder="Account number"></label>';
  html+='<label class="form-label">Account Holder Name<input type="text" class="form-input" id="uf-holder" value="'+(user?user.bank_holder||'':'')+'" placeholder="Name on account"></label>';
  html+='</div></div>';
  html+='<div class="form-actions"><button class="btn-ghost" id="uf-cancel">Cancel</button><button class="btn-primary" id="uf-save">'+(isEdit?'Update':'Create Organiser')+'</button></div></div>';
  area.innerHTML=html;
  getEl('uf-cancel').onclick=function(){ area.innerHTML=''; };
  getEl('uf-save').onclick=async function(){
    var name  = getEl('uf-name').value.trim();
    var uname = getEl('uf-uname').value.trim();
    var btn   = getEl('uf-save'); btn.textContent='Saving…'; btn.disabled=true;
    if(!name){ alert('Name required.'); btn.textContent='Create Organiser'; btn.disabled=false; return; }
    try {
      if(isEdit){
        // Update profile fields only (password change handled separately by Supabase dashboard)
        await DB.saveUser({
          id: user.id, name: name, username: uname,
          bank_name:    getEl('uf-bank').value.trim(),
          bank_account: getEl('uf-acct').value.trim(),
          bank_holder:  getEl('uf-holder').value.trim()
        });
      } else {
        var email = getEl('uf-email').value.trim();
        var pass  = getEl('uf-pass').value;
        if(!email||!pass){ alert('Email and password required.'); btn.textContent='Create Organiser'; btn.disabled=false; return; }
        if(pass.length<8){ alert('Password must be at least 8 characters.'); btn.textContent='Create Organiser'; btn.disabled=false; return; }
        // Create Supabase auth user via server-side API route
        var res = await DB.createAuthUser(email, pass, {
          username:     uname || email.split('@')[0],
          name:         name,
          role:         'organiser',
          bank_name:    getEl('uf-bank').value.trim(),
          bank_account: getEl('uf-acct').value.trim(),
          bank_holder:  getEl('uf-holder').value.trim()
        });
        if(res.error){ alert('Error: ' + res.error); btn.textContent='Create Organiser'; btn.disabled=false; return; }
      }
      area.innerHTML='';
      renderUsers(document.getElementById('main'));
      toast(isEdit ? 'Organiser updated ✓' : 'Organiser created ✓');
    } catch(e) {
      alert('Error: ' + e.message);
      btn.textContent = isEdit ? 'Update' : 'Create Organiser';
      btn.disabled = false;
    }
  };
}

// SCANNER VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function renderScanner(container){
  container.innerHTML='<div class="scanner-wrap"><h2 style="color:#fff;margin-bottom:6px;font-size:22px">&#x1F50D; Ticket Scanner</h2><p style="color:#888;font-size:13px;margin-bottom:24px">Scan QR code or enter ticket code manually.</p><div id="scan-content"></div></div>';
  showScanInput(getEl('scan-content'));
}

var _activeScannerInstance = null; // track html5-qrcode instance for clean restarts

function _destroyScanner(){
  if(_activeScannerInstance){
    try { _activeScannerInstance.stop().catch(function(){}); } catch(e){}
    try { _activeScannerInstance.clear(); } catch(e){}
    _activeScannerInstance = null;
  }
}

function showScanInput(container){
  // html5-qrcode: battle-tested universal mobile scanner
  // Handles all browsers including Samsung Browser, Chrome Android, Safari, Firefox
  var SCAN_LIB = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';

  container.innerHTML =
    '<div id="qr-reader" style="width:100%;border-radius:12px;overflow:hidden;background:#111;min-height:220px"></div>' +
    '<div id="qr-status" style="text-align:center;padding:12px;font-size:13px;color:#888">Loading scanner…</div>' +
    '<div style="margin-top:12px">' +
      '<div style="font-size:11px;color:#555;letter-spacing:1px;text-align:center;margin-bottom:10px">— OR ENTER CODE MANUALLY —</div>' +
      '<div style="display:flex;gap:8px">' +
        '<input type="text" id="manual-code" class="form-input" style="flex:1;font-family:monospace;letter-spacing:2px;text-transform:uppercase" placeholder="e.g. FEST-ABCD1234">' +
        '<button class="btn-primary" id="btn-manual-check">Check</button>' +
      '</div>' +
    '</div>';

  var scanner = null;
  var handled = false; // prevent double-fire

  function startScanner(){
    var statusEl = document.getElementById('qr-status');
    if(!statusEl) return;
    statusEl.textContent = 'Starting camera…';

    // Config for html5-qrcode — works universally
    var config = {
      fps: 10,                  // frames per second to analyse
      qrbox: { width: 220, height: 220 },  // scan area size
      aspectRatio: 1.0,
      rememberLastUsedCamera: true,
      supportedScanTypes: [0]   // 0 = SCAN_TYPE_CAMERA only
    };

    _destroyScanner(); // clean up any previous instance
    scanner = new Html5Qrcode('qr-reader', { verbose: false });
    _activeScannerInstance = scanner;

    Html5Qrcode.getCameras().then(function(cameras){
      if(!cameras || !cameras.length){
        if(statusEl) statusEl.textContent = 'No camera found.';
        return;
      }
      // Prefer rear camera
      var cam = cameras.find(function(c){ return /back|rear|environment/i.test(c.label); }) || cameras[cameras.length-1];

      scanner.start(
        cam.id,
        config,
        async function onSuccess(decodedText){
          if(handled) return;
          handled = true;
          try { await scanner.stop(); } catch(e){}
          if(statusEl) statusEl.textContent = '✓ QR detected!';
          await handleScanCode(decodedText, container);
        },
        function onError(){ /* scanning, ignore per-frame failures */ }
      ).then(function(){
        if(statusEl) statusEl.textContent = 'Point camera at QR code on the ticket';
      }).catch(function(err){
        if(statusEl) statusEl.textContent = 'Camera error: ' + err;
      });
    }).catch(function(err){
      if(statusEl) statusEl.textContent = 'Could not access camera. Check permissions.';
    });
  }

  // Clean up scanner when navigating away
  function stopScanner(){
    if(scanner){ try{ scanner.stop().catch(function(){}); }catch(e){} scanner=null; _activeScannerInstance=null; }
  }
  // Attach cleanup to nav buttons so scanner stops when user leaves
  document.querySelectorAll('.nav-tab, #nav-events, #nav-logout').forEach(function(btn){
    var orig = btn.onclick;
    btn.onclick = function(e){ stopScanner(); if(orig) orig.call(this,e); };
  });

  loadScript(SCAN_LIB).then(function(){
    if(typeof Html5Qrcode === 'undefined'){
      var statusEl = document.getElementById('qr-status');
      if(statusEl) statusEl.textContent = 'Failed to load scanner library. Check connection.';
      return;
    }
    startScanner();
  }).catch(function(){
    var statusEl = document.getElementById('qr-status');
    if(statusEl) statusEl.textContent = 'Failed to load scanner. Try entering code manually.';
  });

  // Manual entry
  var manualBtn = document.getElementById('btn-manual-check');
  var manualInp = document.getElementById('manual-code');
  if(manualBtn) manualBtn.onclick = async function(){
    var code = (manualInp ? manualInp.value : '').trim().toUpperCase();
    if(!code) return;
    stopScanner();
    await handleScanCode(code, container);
  };
  if(manualInp) manualInp.onkeydown = function(e){
    if(e.key === 'Enter'){ var btn = document.getElementById('btn-manual-check'); if(btn) btn.click(); }
  };
}

async function handleScanCode(code,container){
  // Trim and normalise — URLs often have extra chars
  var cleanCode = code.trim();
  // Extract ticket code if the QR contains a full URL (e.g. scanned from our ticket)
  var urlMatch = cleanCode.match(/[?&]code=([^&]+)/);
  if(urlMatch) cleanCode = urlMatch[1];
  // Also handle our internal format TKT:EVTID:CODE
  var tktMatch = cleanCode.match(/^TKT:[^:]+:(.+)$/);
  if(tktMatch) cleanCode = tktMatch[1];

  var ticket = null;
  try {
    ticket = await DB.findTicketByCode(cleanCode);
  } catch(e) {
    // Network error or Supabase error — treat as invalid but show specific message
    showScanResult(container, null, cleanCode, 'Network error — check connection and try again.');
    return;
  }
  showScanResult(container, ticket, cleanCode);
}
function showScanResult(container,ticket,rawCode,errorMsg){
  var invalid=!ticket, alreadyUsed=ticket&&ticket.checked_in;
  var borderCol=invalid?'#e94560':alreadyUsed?'#f59e0b':'#22c55e';
  var bgCol=invalid?'#1a0a0a':alreadyUsed?'#1a150a':'#0a1a0e';
  var icon=invalid?'&#x274C;':alreadyUsed?'&#x26A0;&#xFE0F;':'&#x2705;';
  var title=invalid?(errorMsg?'SCAN ERROR':'NOT A VALID TICKET'):alreadyUsed?'ALREADY SCANNED':'VALID TICKET';
  var titleColor=invalid?'#e94560':alreadyUsed?'#f59e0b':'#22c55e';
  var seatInfo=ticket&&ticket.seats?[ticket.seats.section,ticket.seats.row_label?'Row '+ticket.seats.row_label:'',ticket.seats.seat_number?'Seat '+ticket.seats.seat_number:''].filter(Boolean).join(' · '):'';
  var html='<div class="result-card" style="background:'+bgCol+';border:1px solid '+borderCol+'33">';
  html+='<div class="result-icon">'+icon+'</div><div class="result-title" style="color:'+titleColor+'">'+title+'</div>';
  if(alreadyUsed) html+='<p style="color:#888;font-size:12px;margin-bottom:8px">Checked in: '+(ticket.checked_in_at?new Date(ticket.checked_in_at).toLocaleString():'Previously')+'</p>';
  html+='<div class="result-data-box">';
  if(errorMsg){
    html+='<div style="font-size:13px;color:var(--accent);margin-bottom:8px">'+errorMsg+'</div>';
  } else if(invalid){
    html+='<div style="font-size:13px;color:#888;margin-bottom:8px">This QR code is not registered to any ticket in the system.</div>';
  }
  html+='<div class="result-data-label">SCANNED VALUE</div><div class="result-data-val" style="font-size:11px;word-break:break-all">'+(ticket?ticket.code:rawCode.slice(0,60)+(rawCode.length>60?'…':''))+'</div>';
  if(ticket&&ticket.holder) html+='<div class="result-data-label" style="margin-top:8px">HOLDER</div><div style="font-size:13px;color:var(--text2)">'+ticket.holder+(ticket.phone?' &middot; '+ticket.phone:'')+'</div>';
  if(ticket&&ticket.events) html+='<div class="result-data-label" style="margin-top:8px">EVENT</div><div style="font-size:13px;color:var(--text2)">'+ticket.events.name+'</div>';
  if(seatInfo) html+='<div class="result-data-label" style="margin-top:8px">SEAT</div><div style="font-size:13px;color:var(--text2)">'+seatInfo+'</div>';
  if(ticket) html+='<div class="result-data-label" style="margin-top:8px">ISSUED</div><div style="font-size:12px;color:#888">'+new Date(ticket.issued_at||Date.now()).toLocaleString()+'</div>';
  html+='</div>';
  if(!invalid&&!alreadyUsed) html+='<div class="swipe-wrap"><div class="swipe-hint">Swipe right to Check In</div><div class="swipe-track" id="swipe-track"><div class="swipe-fill" id="swipe-fill" style="width:56px"></div><div class="swipe-thumb" id="swipe-thumb" style="left:2px;background:var(--accent)">&#8594;</div><div class="swipe-text" id="swipe-text">SWIPE &#8594;</div></div></div>';
  html+='<button class="btn-ghost" id="btn-scan-again" style="margin-top:16px">&#8592; Scan Another</button></div>';
  container.innerHTML=html;
  getEl('btn-scan-again').onclick=function(){ _destroyScanner(); showScanInput(container); };
  if(!invalid&&!alreadyUsed){
    var track=getEl('swipe-track'),thumb=getEl('swipe-thumb'),fill=getEl('swipe-fill'),text=getEl('swipe-text');
    var maxPos=280-56-4, startX=null, pos=0, done=false;
    var onStart=function(e){ startX=e.touches?e.touches[0].clientX:e.clientX; };
    var onMove=function(e){ if(startX===null||done) return; pos=Math.max(0,Math.min(maxPos,(e.touches?e.touches[0].clientX:e.clientX)-startX)); thumb.style.left=(pos+2)+'px'; fill.style.width=(pos+56)+'px'; };
    var onEnd=async function(){
      if(done) return;
      if(pos>maxPos*0.75){ done=true; thumb.textContent='&#10003;'; thumb.style.background='#22c55e'; text.textContent='CHECKED IN'; text.style.color='#22c55e'; var checkedInAt = await DB.checkInTicket(ticket.id);
        if(checkedInAt){
          toast('Checked in ✓');
        } else {
          toast('⚠️ Check-in may not have saved — check connection.', 4000);
        }
        // Destroy old scanner cleanly before reinitialising
        _destroyScanner();
        setTimeout(function(){ showScanInput(container); }, 1200); }
      else { pos=0; thumb.style.left='2px'; fill.style.width='56px'; }
      startX=null;
    };
    track.addEventListener('mousedown',onStart); track.addEventListener('mousemove',onMove); track.addEventListener('mouseup',onEnd); track.addEventListener('mouseleave',onEnd);
    track.addEventListener('touchstart',onStart,{passive:true}); track.addEventListener('touchmove',onMove,{passive:true}); track.addEventListener('touchend',onEnd);
  }
}

// APPROVALS VIEW — admin only, review pending event submissions
// ═══════════════════════════════════════════════════════════════════════════════
function renderApprovals(container){
  if(!AUTH.isAdmin()){ container.innerHTML='<p style="color:#666;padding:40px">Access denied.</p>'; return; }

  async function rebuild(){
    // Reload all events fresh from Supabase for accurate approval status
    _cache.events = await DB.getEvents(null);
    _cache.users  = await DB.getUsers();
    var allEvents=_cache.events||[];
    var pending=allEvents.filter(function(e){ return e.approval_status==='pending'; });
    var approvedPaid=allEvents.filter(function(e){ return e.approval_status==='approved'&&e.fee_paid===true; });
    var approvedUnpaid=allEvents.filter(function(e){ return e.approval_status==='approved'&&!e.fee_paid; });
    var rejected=allEvents.filter(function(e){ return e.approval_status==='rejected'; });
    var users=_cache.users||[];

    var html='<div class="page-header"><div><h1 class="page-title">&#x2714; Approvals</h1><p class="page-subtitle">Review event submissions from organisers</p></div></div>';

    if(!pending.length&&!approvedPaid.length&&!approvedUnpaid.length&&!rejected.length){
      html+='<div class="empty-state"><div class="empty-icon">&#x2714;</div><div class="empty-title">No submissions yet</div></div>';
      container.innerHTML=html; return;
    }

    function section(title, evList, sectionId){
      if(!evList.length) return '';
      var s='<div style="font-size:11px;color:var(--text4);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin:24px 0 12px">'+title+' ('+evList.length+')</div>';
      evList.forEach(function(ev){
        var org=users.find(function(u){ return u.id===ev.org_id; })||{};
        var ac=(ev.design||{}).accentColor||'#e94560';
        s+='<div class="approval-card" id="apv-'+ev.id+'">';
        s+='<div style="height:4px;background:'+(ev.approval_status==='approved'?ac:ev.approval_status==='rejected'?'#333':'#f59e0b')+'"></div>';
        s+='<div class="approval-card-header">';
        s+='<div style="flex:1;min-width:0">';
        s+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">';
        s+='<span style="font-size:16px;font-weight:700">'+ev.name+'</span>';
        s+='<span class="ev-status-badge '+ev.approval_status+'">'+(ev.approval_status||'draft').toUpperCase()+'</span>';
        if(ev.approval_fee>0) s+='<span style="font-size:12px;color:var(--green);font-weight:700">Fee: $'+ev.approval_fee+'</span>';
        s+='</div>';
        s+='<div style="font-size:12px;color:#666;margin-bottom:6px">Organiser: <strong style="color:#aaa">'+org.name+'</strong> (@'+org.username+')'+(org.email?' &middot; '+org.email:'')+'</div>';
        s+='<div style="font-size:12px;color:#666">'+(ev.date?'&#x1F4C5; '+new Date(ev.date).toLocaleString():'No date')+' &nbsp;&bull;&nbsp; '+(ev.venue||'No venue')+' &nbsp;&bull;&nbsp; '+(ev.category||'')+' &nbsp;&bull;&nbsp; '+(ev.seatingMode==='free'?'Free Seating':'Allocated Seating')+(ev.capacity>0?' &middot; Cap: '+ev.capacity:'')+'</div>';
        if(ev.description) s+='<div style="font-size:12px;color:#555;margin-top:6px">'+ev.description+'</div>';
        if(ev.approval_status==='rejected'&&ev.rejection_reason) s+='<div style="font-size:12px;color:var(--accent);margin-top:6px">Rejection reason: '+ev.rejection_reason+'</div>';
        s+='</div>';
        s+='<div style="text-align:right;flex-shrink:0;font-size:11px;color:#555">Submitted:<br>'+new Date(ev.submitted_at||ev.created_at||Date.now()).toLocaleDateString()+'</div>';
        s+='</div>';
        s+='<div class="approval-card-actions">';
        if(ev.approval_status==='pending'){
          s+='<input type="number" class="form-input" id="fee-'+ev.id+'" placeholder="Fee ($)" value="'+(ev.approval_fee||'')+'" min="0" style="width:110px;padding:6px 10px;font-size:12px">';
          s+='<button class="btn-primary btn-sm" data-approve="'+ev.id+'">&#x2714; Approve</button>';
          s+='<button class="btn-ghost btn-sm btn-red" data-show-reject="'+ev.id+'">&#x2715; Reject</button>';
          s+='<div id="reject-form-'+ev.id+'" style="display:none;width:100%;margin-top:8px;display:none">';
          s+='<input type="text" class="form-input reject-reason-input" id="rr-'+ev.id+'" placeholder="Reason for rejection (required)" style="margin-bottom:8px">';
          s+='<button class="btn-ghost btn-sm btn-red" data-confirm-reject="'+ev.id+'">Confirm Rejection</button>';
          s+='</div>';
        } else if(ev.approval_status==='approved'){
          if(!ev.fee_paid){
            s+='<div style="font-size:12px;color:var(--amber);flex:1">&#x1F4B3; Awaiting fee payment'+(ev.approval_fee>0?' — $'+ev.approval_fee+' due':'')+'</div>';
            s+='<button class="btn-primary btn-sm btn-green" data-mark-paid="'+ev.id+'">&#x2714; Mark Fee Paid</button>';
            s+='<button class="btn-ghost btn-sm" data-edit-fee="'+ev.id+'">Edit Fee</button>';
          } else {
            s+='<span style="font-size:12px;color:var(--green)">&#x2714; Fee paid &mdash; tickets fully unlocked</span>';
            s+='<button class="btn-ghost btn-sm" data-mark-unpaid="'+ev.id+'">Mark Unpaid</button>';
          }
          s+='<button class="btn-ghost btn-sm btn-red" data-revoke="'+ev.id+'">Revoke Approval</button>';
        } else if(ev.approval_status==='rejected'){
          s+='<span style="font-size:12px;color:#555">&#x274C; Rejected</span>';
          s+='<button class="btn-ghost btn-sm btn-green" data-approve="'+ev.id+'">&#x2714; Approve Instead</button>';
        }
        s+='</div></div>';
      });
      return s;
    }

    html+=section('Pending Review', pending, 'pending');
    html+=section('Approved — Awaiting Payment', approvedUnpaid, 'approved-unpaid');
    html+=section('Active (Fee Paid)', approvedPaid, 'approved-paid');
    html+=section('Rejected', rejected, 'rejected');
    container.innerHTML=html;

    // Approve
    container.querySelectorAll('[data-approve]').forEach(function(btn){
      btn.onclick=async function(){
        var ev=(_cache.events||[]).find(function(e){ return e.id===btn.dataset.approve; }); if(!ev) return;
        var feeEl=getEl('fee-'+ev.id);
        var fee=feeEl?parseFloat(feeEl.value)||0:ev.approval_fee||0;
        if(!confirm('Approve "'+ev.name+'"?'+(fee>0?' Fee of $'+fee+' will be recorded.':''))) return;
        ev.approval_status='approved'; ev.approval_fee=fee; ev.fee_paid=false; ev.rejection_reason=''; ev.approved_at=nowISO();
        await DB.saveEvent(ev); _cache.events=(_cache.events||[]).map(function(e){return e.id===ev.id?ev:e;});
        toast('"'+ev.name+'" approved ✓'); rebuild();
      };
    });

    // Show reject form
    container.querySelectorAll('[data-show-reject]').forEach(function(btn){
      btn.onclick=function(){
        var f=getEl('reject-form-'+btn.dataset.showReject);
        if(f) f.style.display=f.style.display==='none'?'block':'none';
      };
    });

    // Confirm reject
    container.querySelectorAll('[data-confirm-reject]').forEach(function(btn){
      btn.onclick=async function(){
        var reason=(getEl('rr-'+btn.dataset.confirmReject)||{}).value||'';
        if(!reason.trim()){ toast('Please enter a rejection reason.', 3000); return; }
        var ev=(_cache.events||[]).find(function(e){ return e.id===btn.dataset.confirmReject; }); if(!ev) return;
        ev.approval_status='rejected'; ev.rejection_reason=reason; ev.rejected_at=nowISO();
        await DB.saveEvent(ev); _cache.events=(_cache.events||[]).map(function(e){return e.id===ev.id?ev:e;});
        toast('"'+ev.name+'" rejected.'); rebuild();
      };
    });

    // Revoke
    container.querySelectorAll('[data-revoke]').forEach(function(btn){
      btn.onclick=async function(){
        if(!confirm('Revoke approval? The organiser will no longer be able to generate tickets.')) return;
        var ev=(_cache.events||[]).find(function(e){ return e.id===btn.dataset.revoke; }); if(!ev) return;
        ev.approval_status='draft'; ev.fee_paid=false;
        await DB.saveEvent(ev); _cache.events=(_cache.events||[]).map(function(e){return e.id===ev.id?ev:e;});
        toast('Approval revoked.'); rebuild();
      };
    });

    // Mark fee paid
    container.querySelectorAll('[data-mark-paid]').forEach(function(btn){
      btn.onclick=async function(){
        var ev=(_cache.events||[]).find(function(e){ return e.id===btn.dataset.markPaid; }); if(!ev) return;
        var feeLabel=ev.approval_fee>0?'$'+ev.approval_fee+' ':'';
        if(!confirm('Confirm fee '+feeLabel+'has been received from "'+ev.name+'"? This will unlock ticket generation for the organiser.')) return;
        ev.fee_paid=true; ev.fee_paid_at=nowISO();
        await DB.saveEvent(ev); _cache.events=(_cache.events||[]).map(function(e){return e.id===ev.id?ev:e;});
        toast('Fee marked paid — tickets unlocked ✓'); rebuild();
      };
    });

    // Mark fee unpaid (undo)
    container.querySelectorAll('[data-mark-unpaid]').forEach(function(btn){
      btn.onclick=async function(){
        if(!confirm('Mark this fee as unpaid? Ticket generation will be locked again.')) return;
        var ev=(_cache.events||[]).find(function(e){ return e.id===btn.dataset.markUnpaid; }); if(!ev) return;
        ev.fee_paid=false; delete ev.fee_paid_at;
        await DB.saveEvent(ev); _cache.events=(_cache.events||[]).map(function(e){return e.id===ev.id?ev:e;});
        toast('Marked as fee unpaid.'); rebuild();
      };
    });

    // Edit fee (inline, for already-approved events)
    container.querySelectorAll('[data-edit-fee]').forEach(function(btn){
      btn.onclick=async function(){
        var ev=(_cache.events||[]).find(function(e){ return e.id===btn.dataset.editFee; }); if(!ev) return;
        var newFee=prompt('Enter new fee amount ($):', ev.approval_fee||0);
        if(newFee===null) return;
        var fee=parseFloat(newFee)||0;
        ev.approval_fee=fee;
        await DB.saveEvent(ev); _cache.events=(_cache.events||[]).map(function(e){return e.id===ev.id?ev:e;});
        toast('Fee updated to $'+fee); rebuild();
      };
    });
  }
  rebuild();
}
