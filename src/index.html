<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◆ TICKR — Event Ticketing</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">

<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"
  onerror="document.body.innerHTML='<div style=font-family:sans-serif;padding:60px;text-align:center;color:#e94560><h2>Failed to load Supabase</h2><p style=color:#888;margin-top:12px>Check your internet connection and reload.</p></div>'">
</script>

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg1:#111;--bg2:#141414;--bg3:#1a1a1a;
  --border:#1e1e1e;--border2:#252525;--border3:#2a2a2a;
  --text:#fff;--text2:#ccc;--text3:#888;--text4:#555;--text5:#333;
  --accent:#e94560;--green:#22c55e;--amber:#f59e0b;--purple:#a78bfa;--blue:#3b82f6;
  --font:'Trebuchet MS',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
/* ── NAV ── */
#nav{background:var(--bg1);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Impact,sans-serif;font-size:20px;color:var(--accent);letter-spacing:3px;margin-right:32px;cursor:pointer;user-select:none}
.nav-tab{height:54px;padding:0 18px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text3);font-family:var(--font);font-size:13px;cursor:pointer;transition:color .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text2)}.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg3)}
.nav-spacer{flex:1}.nav-user{font-size:12px;color:var(--text4);margin-right:12px}
.nav-event-name{font-size:11px;color:var(--text5);margin-right:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ── BUTTONS ── */
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s;white-space:nowrap}
.btn-primary:hover{opacity:.85}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border3);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:var(--font);transition:border-color .15s;white-space:nowrap}
.btn-ghost:hover{border-color:#555}
.btn-sm{padding:6px 14px;font-size:12px}.btn-xs{padding:3px 9px;font-size:11px}
.btn-purple{color:var(--purple);border-color:#a78bfa44}.btn-green{color:var(--green);border-color:#22c55e33}.btn-red{color:var(--accent);border-color:#e9456033}
/* ── FORMS ── */
.form-label{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--text3);letter-spacing:.5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 12px;font-size:13px;font-family:var(--font)}
.form-input:focus{outline:none;border-color:#444}
select.form-input option{background:#222}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* ── LAYOUT ── */
#main{padding:28px 24px;max-width:1100px;margin:0 auto}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.page-title{font-size:28px;font-weight:900;margin:0}.page-subtitle{font-size:13px;color:var(--text4);margin:4px 0 0}
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;margin-bottom:24px}
.panel-title{font-size:13px;color:var(--accent);letter-spacing:2px;font-weight:700;margin-bottom:18px}
.section-heading{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--accent)}.card-accent-bar{height:5px}.card-body{padding:18px}
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* ── STATS ── */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;min-width:90px}
.stat-value{font-size:22px;font-weight:900}.stat-label{font-size:11px;color:var(--text4);margin-top:2px}
.stat-badge{background:var(--bg3);border:1px solid var(--border3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--blue)}
.stat-badge span{color:var(--text4);font-size:11px;margin-left:3px}.stat-badge.sold{color:var(--accent)}.stat-badge.reserved{color:var(--amber)}
/* ── PROGRESS ── */
.progress-bar{background:var(--bg3);border-radius:3px;height:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);transition:width .4s}
.avail-track{background:#1e1e1e;border-radius:4px;height:10px;overflow:hidden;display:flex}
.avail-sold{height:100%;transition:width .4s}.avail-reserved{height:100%;transition:width .4s;opacity:.7}
.availability-block{background:#141414;border:1px solid #1e1e1e;border-radius:12px;padding:18px;margin-bottom:20px}
.availability-title{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;font-weight:700}
.avail-row{margin-bottom:12px}.avail-row:last-child{margin-bottom:0}
.avail-row-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.avail-row-name{font-size:13px;font-weight:600}.avail-row-nums{font-size:11px;color:#666}
/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:#161616;border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;color:var(--text);margin-bottom:20px}
.dl-progress{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;margin:16px 0}
.dl-progress-fill{height:100%;background:var(--purple);transition:width .2s}
/* ── TICKETS LIST ── */
.ticket-list{display:flex;flex-direction:column;gap:6px;max-height:56vh;overflow-y:auto;padding-right:4px}
.ticket-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.ticket-row.checked{border-color:#22c55e22}
.ticket-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ticket-code{font-family:monospace;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket-meta{font-size:10px;color:var(--text4);margin-top:2px}
.ticket-status{font-size:11px;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.ticket-status.checked{color:var(--green);background:#22c55e0d}.ticket-status.pending{color:var(--amber);background:#f59e0b0d}
/* ── FILTERS ── */
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;font-size:12px}.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* ── DESIGNER ── */
.designer-layout{display:flex;gap:28px;flex-wrap:wrap}
.designer-sidebar{width:260px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;overflow-y:auto;max-height:calc(100vh - 180px)}
.designer-preview{flex:1;min-width:300px}
.preview-label{font-size:10px;color:var(--text5);letter-spacing:2px;margin-bottom:12px;text-transform:uppercase}
.preview-box{padding:20px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow-x:auto}
.color-pickers{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.color-picker-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
.color-picker-item input[type=color]{width:40px;height:32px;border:none;cursor:pointer;border-radius:6px}
.range-with-label{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--text3)}
.range-with-label input[type=range]{width:100%;accent-color:var(--accent)}
.check-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text2)}
.check-toggle input{accent-color:var(--accent)}
.mini-batch{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
/* ── TICKET CARD ── */
.ticket-card-outer{display:inline-flex;position:relative;flex-shrink:0}
.ticket-card{display:flex;overflow:hidden;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);position:relative;transform-origin:top left}
.ticket-main{flex:1;padding:14px 16px;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:space-between}
.ticket-stub{width:120px;flex-shrink:0;padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;position:relative;z-index:1}
.ticket-event-name{font-weight:bold;line-height:1.2}.ticket-event-sub{opacity:.6;margin-top:2px}
.ticket-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.ticket-holder-label{opacity:.5;letter-spacing:1px;text-transform:uppercase}
.ticket-code-label{opacity:.4;letter-spacing:2px}.ticket-code-val{font-weight:bold;letter-spacing:3px;font-family:monospace}
.ticket-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;z-index:0}
.ticket-accent-bar{position:absolute;top:0;height:4px;z-index:2}
.ticket-scan-label{font-size:10px;opacity:.5;text-align:center;letter-spacing:1px}
/* ── SEATING ── */
.layout-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;margin-bottom:12px}
.layout-card:hover{border-color:var(--accent)}.layout-card-accent{height:5px;background:var(--blue)}
.layout-card-body{padding:16px}.layout-card-title{font-size:16px;font-weight:700;margin-bottom:3px}
.layout-card-meta{font-size:12px;color:var(--text4);margin-bottom:10px}
.section-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.section-tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.layout-card-actions{display:flex;gap:8px}
.layout-form-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;margin-bottom:24px}
.section-editor{border:1px solid var(--border3);border-radius:10px;padding:16px;margin-bottom:12px}
.section-editor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.seat-map-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.seat-type-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--text3)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stage-label{text-align:center;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px;font-size:12px;color:var(--text4);letter-spacing:3px;margin-bottom:24px}
.seat-map-grid{overflow-x:auto;padding-bottom:12px}
.map-section{margin-bottom:28px}.map-section-title{font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
.map-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.row-label{font-size:11px;color:var(--text4);width:24px;flex-shrink:0;text-align:center;font-weight:700}
.row-seats{display:flex;gap:4px}
.seat-btn{width:28px;height:28px;border-radius:5px;border:1px solid transparent;font-size:9px;cursor:pointer;font-family:monospace;font-weight:700;transition:transform .1s}
.seat-btn:hover{transform:scale(1.15)}
.seat-btn.seat-standard{background:#1d3a6e;color:#3b82f6;border-color:#3b82f633}
.seat-btn.seat-vip{background:#4a3010;color:#f59e0b;border-color:#f59e0b44}
.seat-btn.seat-accessible{background:#0d3320;color:#22c55e;border-color:#22c55e44}
.seat-btn.seat-blocked{background:#1a1a1a;color:#444;border-color:#33333344;cursor:not-allowed}
.seat-btn.status-sold{background:#3a0d18;color:#e94560;border-color:#e9456044}
.seat-btn.status-reserved{background:#3a2a05;color:#f59e0b;border-color:#f59e0b44}
.seat-btn.status-held{background:#1a0d3a;color:#a78bfa;border-color:#a78bfa44}
.seat-btn.status-blocked{background:#1a1a1a;color:#444;border-color:#33333344}
.seat-btn.selected{outline:2px solid #fff;outline-offset:1px;transform:scale(1.2);z-index:2;position:relative}
.seat-detail-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:20px;margin-top:20px}
.status-change-btn{background:transparent;border:1px solid var(--border3);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--font);color:var(--text3)}
.map-selection-bar{display:flex;align-items:center;gap:12px;background:#1a1a2e;border:1px solid #3b82f644;border-radius:10px;padding:12px 18px;margin-bottom:18px;flex-wrap:wrap}
.map-sel-count{font-size:13px;color:#3b82f6;font-weight:700}.map-sel-hint{font-size:12px;color:#555;flex:1}
/* ── TIERS ── */
.tier-bar-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px}
.tier-bar-track{background:#1e1e1e;border-radius:4px;height:8px;overflow:hidden}
.tier-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.tier-capacity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
.tier-capacity-card{background:#141414;border:1px solid #252525;border-radius:10px;padding:14px}
.tier-capacity-title{font-size:13px;font-weight:700;margin-bottom:10px}
/* ── MODE TOGGLE ── */
.mode-toggle{display:flex;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;margin-bottom:20px}
.mode-btn{flex:1;padding:10px 14px;border:none;background:transparent;color:#888;font-family:var(--font);font-size:13px;cursor:pointer;transition:.15s;text-align:center}
.mode-btn.active{background:var(--accent);color:#fff;font-weight:700}
/* ── SCANNER ── */
.scanner-wrap{max-width:420px;margin:0 auto}
.scanner-video-box{border-radius:12px;overflow:hidden;background:#111;margin-bottom:16px;position:relative;min-height:220px}
.scanner-video-box video{width:100%;display:none}.scanner-video-box video.active{display:block}
.scan-placeholder{display:flex;align-items:center;justify-content:center;height:220px;flex-direction:column;gap:12px}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;height:160px;border:2px solid var(--accent);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,.4)}
.result-card{border-radius:16px;padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center}
.result-icon{font-size:56px;margin-bottom:10px}.result-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-data-box{margin-top:16px;padding:12px 16px;background:rgba(255,255,255,.04);border-radius:8px;width:100%;text-align:left}
.result-data-label{font-size:11px;color:var(--text4);letter-spacing:1px}.result-data-val{font-size:14px;font-weight:700;color:var(--text);font-family:monospace}
.swipe-wrap{margin-top:20px;user-select:none;text-align:center}.swipe-hint{font-size:12px;color:var(--text3);margin-bottom:8px}
.swipe-track{width:280px;height:56px;border-radius:28px;position:relative;overflow:hidden;cursor:ew-resize;display:inline-block;border:2px solid #2a3a2a;background:#1a2a1a}
.swipe-fill{position:absolute;left:0;top:0;height:100%;background:#22c55e18;pointer-events:none}
.swipe-thumb{position:absolute;top:2px;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.swipe-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;letter-spacing:2px;pointer-events:none;color:#22c55e88}
/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.login-logo{font-family:Impact,sans-serif;font-size:36px;color:var(--accent);letter-spacing:6px;margin-bottom:8px}
.login-sub{font-size:13px;color:var(--text4);margin-bottom:40px}
.login-error{background:#1a0a0a;border:1px solid #e9456033;border-radius:8px;padding:10px;font-size:13px;color:var(--accent);margin-bottom:16px}
/* ── RESERVATIONS ── */
.res-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color .2s}
.res-card.pending{border-left:3px solid var(--amber)}.res-card.approved{border-left:3px solid var(--green)}.res-card.rejected{border-left:3px solid #555}
.res-status-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
.res-status-badge.pending{color:var(--amber);background:#f59e0b11}.res-status-badge.approved{color:var(--green);background:#22c55e11}.res-status-badge.rejected{color:#555;background:#22222299}
/* ── USERS ── */
.user-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
/* ── PUBLIC PAGE ── */
.public-wrap{max-width:860px;margin:0 auto;padding:32px 24px}
.public-hero{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:28px}
.public-event-title{font-size:32px;font-weight:900;margin-bottom:8px}
.public-meta{display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:var(--text4);margin-bottom:20px}
.booking-ref-box{background:#0d1a0d;border:1px solid #22c55e44;border-radius:12px;padding:24px;margin-bottom:20px;text-align:center}
.booking-ref-code{font-family:monospace;font-size:28px;font-weight:900;color:var(--green);letter-spacing:4px;margin:12px 0}
.payment-box{background:#14140a;border:1px solid #f59e0b33;border-radius:12px;padding:20px;margin-bottom:16px}
.payment-label{font-size:11px;color:#f59e0b88;letter-spacing:1px;margin-bottom:3px}
.payment-val{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;font-family:monospace}
/* ── PREVIEW GRID ── */
.preview-ticket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:20px;max-height:55vh;overflow-y:auto;padding-right:4px}
.preview-ticket-card{background:#141414;border:1px solid #252525;border-radius:10px;padding:14px}
.preview-ticket-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.preview-ticket-seat{font-size:12px;color:var(--purple);margin-top:4px}
/* ── html5-qrcode dark theme overrides ── */
#qr-reader{ background:#111 !important; border:none !important; }
#qr-reader video{ border-radius:8px; }
#qr-reader img{ display:none; }  /* hide their logo */
#qr-reader__dashboard{ display:none !important; } /* hide their controls — we handle UI */
#qr-reader__scan_region{ border-radius:8px; }
#qr-reader__scan_region img{ display:none !important; }
#qr-reader__status_span{ display:none !important; }
/* ── MISC ── */
.empty-state{text-align:center;padding:80px 0}.empty-icon{font-size:56px;margin-bottom:16px}.empty-title{font-size:18px;color:var(--text4);margin-bottom:6px}
#toast{position:fixed;bottom:24px;right:24px;background:#222;border:1px solid #333;border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9999;transition:opacity .3s;pointer-events:none}
#toast.hidden{opacity:0}
.dev-banner{background:#0d1a2e;border-bottom:1px solid #3b82f644;padding:8px 24px;font-size:12px;color:#3b82f6;text-align:center;display:flex;align-items:center;justify-content:center;gap:12px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}

<script>
// ═══════════════════════════════════════════════════════════════════════════════

var _SUPABASE_URL      = 'https://yxxukojxjxwamhdxdlet.supabase.co';
var _SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4eHVrb2p4anh3YW1oZHhkbGV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjA5MzAsImV4cCI6MjA5MzY5NjkzMH0.LWeCb9bHUuaHC2SqnWIq2-x6DDvrRi7IvdyrQgF1wjI';

if (!_SUPABASE_URL || !_SUPABASE_ANON_KEY) {
  document.body.innerHTML = '<div style="font-family:sans-serif;padding:60px;text-align:center;color:#e94560"><h2>Configuration Error</h2><p style="color:#888;margin-top:12px">Supabase environment variables are not set. Check your Vercel environment variables.</p></div>';

var _supa = window.supabase.createClient(_SUPABASE_URL, _SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════════════════════════════════════════
// AUTH — wraps Supabase Auth
// ═══════════════════════════════════════════════════════════════════════════════
var AUTH = {
  currentProfile: null,

  loadProfile: async function(userId){
    var { data, error } = await _supa
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();
    if(error || !data) return null;
    AUTH.currentProfile = data;
    return data;
  },

  session: function(){
    // Synchronous check — returns cached profile as session-like object
    if(!AUTH.currentProfile) return null;
    return {
      userId:   AUTH.currentProfile.id,
      username: AUTH.currentProfile.username,
      name:     AUTH.currentProfile.name,
      role:     AUTH.currentProfile.role
    };
  },

  login: async function(email, password){
    var { data, error } = await _supa.auth.signInWithPassword({ email, password });
    if(error) return { error: error.message };
    var profile = await AUTH.loadProfile(data.user.id);
    if(!profile) return { error: 'Profile not found. Contact admin.' };
    return { session: { userId:profile.id, username:profile.username, name:profile.name, role:profile.role } };
  },

  logout: async function(){
    AUTH.currentProfile = null;
    await _supa.auth.signOut();
  },

  isAdmin: function(){
    return AUTH.currentProfile && AUTH.currentProfile.role === 'admin';
  },

  canSeeEvent: function(evOrgId){
    if(!AUTH.currentProfile) return false;
    if(AUTH.currentProfile.role === 'admin') return true;
    return AUTH.currentProfile.id === evOrgId;
  }
};

// ═══════════════════════════════════════════════════════════════════════════════
// DB — wraps Supabase data operations (mirrors localStorage DB interface)
// ═══════════════════════════════════════════════════════════════════════════════
var DB = {
  // ── Users / Profiles ─────────────────────────────────────────────────────────
  getUsers: async function(){
    var { data } = await _supa.from('profiles').select('*').order('created_at');
    return data || [];
  },
  saveUser: async function(u){
    var { data, error } = await _supa.from('profiles').upsert(u).select().single();
    if(error) throw new Error(error.message);
    return data;
  },
  deleteUser: async function(id){
    // Delete Supabase auth user via Admin API — handled server-side
    // For RLS safety: just delete profile row; auth.users cleanup via cascade
    await _supa.from('profiles').delete().eq('id', id);
  },
  createAuthUser: async function(email, password, meta){
    // Uses Supabase Admin API via Edge Function (see /api/create-user)
    var res = await fetch('/api/create-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (await _supa.auth.getSession()).data.session.access_token },
      body: JSON.stringify({ email, password, meta })
    });
    return res.json();
  },

  // ── Events ───────────────────────────────────────────────────────────────────
  getEvents: async function(orgId){
    var q = _supa.from('events').select('*').order('created_at', { ascending: false });
    if(orgId) q = q.eq('org_id', orgId);
    var { data, error } = await q;
    if(error){
      // For authenticated users, surface the error. For public (no orgId, no session), log and return empty.
      var session = AUTH.currentProfile;
      if(session) throw new Error(error.message);
      console.warn('getEvents public error (RLS?):', error.message);
      return [];
    }
    return (data||[]).map(DB._normEvent);
  },
  saveEvent: async function(ev){
    var row = DB._denormEvent(ev);
    var { data, error } = await _supa.from('events').upsert(row).select().single();
    if(error) throw new Error(error.message);
    return DB._normEvent(data);
  },
  deleteEvent: async function(id){
    await _supa.from('events').delete().eq('id', id);
    // Cascade handles tickets/seats/layouts/reservations
  },

  // ── Seating Layouts ──────────────────────────────────────────────────────────
  getLayouts: async function(evId){
    var { data } = await _supa.from('seating_layouts').select('*').eq('event_id', evId);
    return (data||[]).map(function(l){ return Object.assign({}, l, { sections: l.sections || [] }); });
  },
  saveLayout: async function(layout){
    var { data, error } = await _supa.from('seating_layouts').upsert(layout).select().single();
    if(error) throw new Error(error.message);
    return data;
  },
  deleteLayout: async function(id){
    await _supa.from('seating_layouts').delete().eq('id', id);
    // seats deleted by cascade
  },

  // ── Seats ────────────────────────────────────────────────────────────────────
  getSeats: async function(layoutId){
    var { data } = await _supa.from('seats').select('*').eq('layout_id', layoutId).order('section').order('row_label').order('seat_number');
    return data || [];
  },
  saveSeats: async function(seats){
    if(!seats.length) return seats;
    var { data, error } = await _supa.from('seats').upsert(seats).select();
    if(error) throw new Error(error.message);
    return data || seats;
  },
  deleteSeats: async function(layoutId){
    await _supa.from('seats').delete().eq('layout_id', layoutId);
  },
  updateSeatStatus: async function(seatId, status){
    await _supa.from('seats').update({ status }).eq('id', seatId);
  },
  updateSeatsStatus: async function(ids, status){
    if(!ids.length) return;
    await _supa.from('seats').update({ status }).in('id', ids);
  },

  // ── Tickets ──────────────────────────────────────────────────────────────────
  getTickets: async function(evId){
    var { data } = await _supa
      .from('tickets')
      .select('*, seats(*)')
      .eq('event_id', evId)
      .order('issued_at', { ascending: false });
    return (data||[]).map(function(t){
      // Flatten seats join to match local app shape
      return Object.assign({}, t, { seats: t.seats || null });
    });
  },
  saveTickets: async function(tickets){
    if(!tickets.length) return tickets;
    // Strip virtual fields — only send real DB columns
    var rows = tickets.map(function(t){
      return {
        id:            t.id,
        event_id:      t.event_id,
        seat_id:       t.seat_id    || null,
        code:          t.code,
        qr_data:       t.qr_data,
        holder:        t.holder     || 'General Admission',
        phone:         t.phone      || '',
        checked_in:    t.checked_in || false,
        checked_in_at: t.checked_in_at || null,
        issued_at:     t.issued_at  || new Date().toISOString()
      };
    });
    var { data, error } = await _supa.from('tickets').insert(rows).select();
    if(error) throw new Error(error.message);
    return data || tickets;
  },
  checkInTicket: async function(id){
    // Use security-definer RPC so scanner (no auth session) can still check in
    var { data, error } = await _supa.rpc('checkin_ticket', { p_ticket_id: id });
    if(error){ console.error('Check-in error:', error); }
    var now = (data && data.checked_in_at) ? data.checked_in_at : new Date().toISOString();
    return now;
  },
  findTicketByCode: async function(code){
    var { data } = await _supa.rpc('scan_ticket', { p_code: code });
    if(!data || !data.found) return null;
    // Return in the shape the app expects
    return {
      id:           data.id,
      code:         data.code,
      holder:       data.holder,
      phone:        data.phone,
      checked_in:   data.checked_in,
      checked_in_at: data.checked_in_at,
      issued_at:    data.issued_at,
      events:       { name: data.event_name },
      seats:        data.seat_section ? { section: data.seat_section, row_label: data.seat_row, seat_number: data.seat_number } : null
    };
  },

  // ── Reservations ─────────────────────────────────────────────────────────────
  getReservations: async function(evId){
    var q = _supa.from('reservations').select('*').order('requested_at', { ascending: false });
    if(evId) q = q.eq('event_id', evId);
    var { data } = await q;
    if(!data) return [];
    // Attach seatObjects
    var seatIds = [...new Set(data.flatMap(function(r){ return r.seat_ids||[]; }))];
    var seatMap = {};
    if(seatIds.length){
      var { data: seatsData } = await _supa.from('seats').select('*').in('id', seatIds);
      (seatsData||[]).forEach(function(s){ seatMap[s.id]=s; });
    }
    return data.map(function(r){
      return Object.assign({}, r, {
        seatObjects: (r.seat_ids||[]).map(function(id){ return seatMap[id]||null; }).filter(Boolean)
      });
    });
  },
  saveReservation: async function(res){
    // Strip virtual/joined fields that don't exist as DB columns
    var row = {
      id:               res.id,
      ref:              res.ref,
      event_id:         res.event_id,
      name:             res.name,
      phone:            res.phone,
      email:            res.email,
      seat_ids:         res.seat_ids   || [],
      ticket_ids:       res.ticket_ids || [],
      status:           res.status,
      total_amount:     res.total_amount || 0,
      rejection_reason: res.rejection_reason || '',
      notes:            res.notes || null,
      payment_slip:     res.payment_slip || null,
      requested_at:     res.requested_at || new Date().toISOString()
    };
    var { data, error } = await _supa.from('reservations').upsert(row).select().single();
    if(error) throw new Error(error.message);
    return data;
  },
  getReservationByRef: async function(ref){
    var { data } = await _supa.from('reservations').select('*, events(*)').eq('ref', ref).single();
    if(!data) return null;
    var seatIds = data.seat_ids || [];
    var seatMap = {};
    if(seatIds.length){
      var { data: seatsData } = await _supa.from('seats').select('*').in('id', seatIds);
      (seatsData||[]).forEach(function(s){ seatMap[s.id]=s; });
    }
    return Object.assign({}, data, {
      event: data.events,
      seatObjects: seatIds.map(function(id){ return seatMap[id]||null; }).filter(Boolean)
    });
  },
  approveReservation: async function(resId){
    var { data } = await _supa.rpc('approve_reservation', { p_res_id: resId });
    return data;
  },
  // ── Waitlist ────────────────────────────────────────────────────────────────
  getWaitlist: async function(evId){
    var {data}=await _supa.from('waitlist').select('*').eq('event_id',evId).order('created_at');
    return data||[];
  },
  addToWaitlist: async function(entry){
    var row={id:entry.id,event_id:entry.event_id,name:entry.name,phone:entry.phone,email:entry.email,created_at:entry.created_at||nowISO(),notified:false};
    var {data,error}=await _supa.from('waitlist').upsert(row).select().single();
    if(error) throw new Error(error.message);
    return data;
  },
  removeFromWaitlist: async function(id){
    await _supa.from('waitlist').delete().eq('id',id);
  },
  markWaitlistNotified: async function(id){
    await _supa.from('waitlist').update({notified:true,notified_at:nowISO()}).eq('id',id);
  },

  // ── Discount codes ───────────────────────────────────────────────────────────
  getDiscountCodes: async function(evId){
    var {data}=await _supa.from('discount_codes').select('*').eq('event_id',evId).order('created_at',{ascending:false});
    return data||[];
  },
  saveDiscountCode: async function(code){
    var row={id:code.id,event_id:code.event_id,code:code.code,type:code.type,value:code.value,max_uses:code.max_uses||0,uses:code.uses||0,expires_at:code.expires_at||null,active:code.active!==false};
    var {data,error}=await _supa.from('discount_codes').upsert(row).select().single();
    if(error) throw new Error(error.message);
    return data;
  },
  deleteDiscountCode: async function(id){
    await _supa.from('discount_codes').delete().eq('id',id);
  },
  validateDiscountCode: async function(evId,codeStr){
    var {data}=await _supa.from('discount_codes').select('*').eq('event_id',evId).eq('code',codeStr.toUpperCase()).eq('active',true).single();
    if(!data) return null;
    if(data.max_uses>0&&data.uses>=data.max_uses) return null;
    if(data.expires_at&&new Date(data.expires_at)<new Date()) return null;
    return data;
  },
  incrementDiscountUse: async function(id){
    await _supa.from('discount_codes').update({uses:_supa.rpc('increment',{row_id:id})}).eq('id',id);
    // Simple increment workaround since rpc might not exist:
    var {data}=await _supa.from('discount_codes').select('uses').eq('id',id).single();
    if(data) await _supa.from('discount_codes').update({uses:(data.uses||0)+1}).eq('id',id);
  },

  // ── Activity log ─────────────────────────────────────────────────────────────
  logActivity: async function(evId,action,detail,userId){
    try {
      var row={id:genUID(),event_id:evId||null,user_id:userId||null,action:action,detail:detail||'',created_at:nowISO()};
      await _supa.from('activity_log').insert(row);
    } catch(e){ /* never block on logging failures */ }
  },
  getActivityLog: async function(evId){
    var q=_supa.from('activity_log').select('*').order('created_at',{ascending:false}).limit(200);
    if(evId) q=q.eq('event_id',evId);
    var {data}=await q;
    return data||[];
  },

  cancelTicket: async function(ticketId, seatId){
    var { error } = await _supa.from('tickets')
      .update({ cancelled: true, checked_in: false })
      .eq('id', ticketId);
    if(error) throw new Error(error.message);
    if(seatId){
      var { error: se } = await _supa.from('seats').update({ status: 'available' }).eq('id', seatId);
      if(se) throw new Error(se.message);
    }
  },

  getAvailableSeats: async function(evId){
    var { data } = await _supa.from('seats').select('*').eq('event_id', evId).eq('status', 'available');
    return data || [];
  },

  // ── Field normalisers (DB snake_case ↔ app camelCase) ────────────────────────
  _normEvent: function(e){
    return {
      id:                   e.id,
      org_id:               e.org_id,
      name:                 e.name,
      category:             e.category,
      date:                 e.date,
      venue:                e.venue,
      description:          e.description,
      seatingMode:          e.seating_mode,
      capacity:             e.capacity,
      maxSeatsPerReservation: e.max_seats_per_res,
      scanner_code:         e.scanner_code,
      approval_status:      e.approval_status,
      approval_fee:         parseFloat(e.approval_fee)||0,
      fee_paid:             e.fee_paid,
      fee_paid_at:          e.fee_paid_at,
      approved_at:          e.approved_at,
      submitted_at:         e.submitted_at,
      rejected_at:          e.rejected_at,
      rejection_reason:     e.rejection_reason,
      booking_message:      e.booking_message||'',
      payment_override:     e.payment_override||null,
      design:               e.design || {},
      created_at:           e.created_at
    };
  },
  _denormEvent: function(ev){
    return {
      id:                 ev.id,
      org_id:             ev.org_id,
      name:               ev.name,
      category:           ev.category,
      date:               ev.date || null,
      venue:              ev.venue,
      description:        ev.description,
      seating_mode:       ev.seatingMode,
      capacity:           ev.capacity,
      max_seats_per_res:  ev.maxSeatsPerReservation,
      scanner_code:       ev.scanner_code,
      approval_status:    ev.approval_status,
      approval_fee:       ev.approval_fee,
      fee_paid:           ev.fee_paid,
      fee_paid_at:        ev.fee_paid_at || null,
      approved_at:        ev.approved_at || null,
      submitted_at:       ev.submitted_at || null,
      rejected_at:        ev.rejected_at || null,
      rejection_reason:   ev.rejection_reason,
      booking_message:    ev.booking_message||null,
      payment_override:   ev.payment_override||null,
      design:             ev.design || {}
    };
  }
};


// ═══════════════════════════════════════════════════════════════════════════════
// STATE CACHE + LS SHIM
// The app was built with LS.get/LS.set calls throughout.
// In the Supabase version, LS reads from an in-memory cache (STATE.cache)
// that is populated whenever DB functions return data.
// LS.set writes back to cache AND persists via DB.saveEvent etc where needed.
// ═══════════════════════════════════════════════════════════════════════════════
var _cache = {
  events: [], users: [], seats: [], tickets: [],
  seating_layouts: [], reservations: []
};

var LS = {
  get: function(k){ return _cache[k] || []; },
  set: function(k, v){ _cache[k] = v; },
  getObj: function(k){ return _cache[k] || {}; },
  setObj: function(k, v){ _cache[k] = v; }
};

// Populate cache from DB after every major data load
async function refreshCache(evId){
  try {
    var session = AUTH.session();
    if(!session) return;
    var orgId = AUTH.isAdmin() ? null : session.userId;
    _cache.events = await DB.getEvents(orgId);
    _cache.users  = await DB.getUsers();
    if(evId){
      var layouts = await DB.getLayouts(evId);
      _cache.seating_layouts = (_cache.seating_layouts||[]).filter(function(l){ return l.event_id!==evId; }).concat(layouts);
      var allSeats = [];
      for(var li=0; li<layouts.length; li++){
        var ls = await DB.getSeats(layouts[li].id);
        allSeats = allSeats.concat(ls);
      }
      _cache.seats = (_cache.seats||[]).filter(function(s){ return s.event_id!==evId; }).concat(allSeats);
      _cache.tickets = await DB.getTickets(evId);
      _cache.reservations = (_cache.reservations||[]).filter(function(r){ return r.event_id!==evId; }).concat(await DB.getReservations(evId));
    }
  } catch(e){ console.warn('Cache refresh failed:', e); }
}

// SS shim — session now lives in AUTH.currentProfile
var SS = {
  get: function(k){ if(k==='session') return AUTH.session(); return null; },
  set: function(k,v){},
  clear: function(){}
};

// ═══════════════════════════════════════════════════════════════════════════════
// APP — all UI logic (verbatim from tickr-local.html from genUID onwards)
// ═══════════════════════════════════════════════════════════════════════════════

function genUID(){ return Math.random().toString(36).slice(2,10).toUpperCase(); }
function nowISO(){ return new Date().toISOString(); }
function compressImage(file,maxW,maxH,quality){
  return new Promise(function(resolve){
    var url=URL.createObjectURL(file);
    var img=new Image();
    img.onload=function(){
      var scale=Math.min(maxW/img.width,maxH/img.height,1);
      var c=document.createElement('canvas');
      c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=function(){ URL.revokeObjectURL(url); resolve(null); };
    img.src=url;
  });
}
function getEl(id){ return document.getElementById(id); }
function fmtDate(d){ return d ? new Date(d).toLocaleString() : ''; }
function fmtTime(d){ return d ? new Date(d).toLocaleTimeString() : 'Just now'; }
function toast(msg,dur){
  var t=getEl('toast'); t.textContent=msg; t.classList.remove('hidden');
  clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.add('hidden'); },dur||2800);
}
function loadScript(src){
  return new Promise(function(res,rej){
    if(document.querySelector('script[src="'+src+'"]')) return res();
    var s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// QR + TICKET RENDERER

function makeQRImg(text,size){
  return loadScript('https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js').then(function(){
    return new Promise(function(resolve){
      var wrap=document.createElement('div');
      Object.assign(wrap.style,{position:'absolute',left:'-9999px',top:'-9999px'});
      document.body.appendChild(wrap);
      new window.QRCode(wrap,{text:text,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:window.QRCode.CorrectLevel.H});
      setTimeout(function(){
        var img=wrap.querySelector('img'),cnv=wrap.querySelector('canvas');
        var src=img?img.src:(cnv?cnv.toDataURL():'');
        document.body.removeChild(wrap); resolve(src);
      },350);
    });
  });
}

function buildTicketHTML(design,event,ticket,scale){
  scale=scale||1;
  var d=design||{}, ac=d.accentColor||'#e94560', bg=d.bgColor||'#1a1a2e', tc=d.textColor||'#ffffff';
  var fs=d.fontSize||13, W=520, H=200, stubW=120;
  return makeQRImg(ticket.qr_data||ticket.code||'PREVIEW',d.qrSize||80).then(function(qrSrc){
    var seatInfo='';
    if(ticket.seats){ seatInfo=[ticket.seats.section, ticket.seats.row_label?'Row '+ticket.seats.row_label:'', ticket.seats.seat_number?'Seat '+ticket.seats.seat_number:''].filter(Boolean).join(' · '); }
    var html='<div class="ticket-card-outer" style="width:'+(W*scale)+'px;height:'+(H*scale)+'px">';
    html+='<div class="ticket-card" style="width:'+W+'px;height:'+H+'px;transform:scale('+scale+');transform-origin:top left;background:'+bg+';font-family:'+(d.fontFamily||'Trebuchet MS,sans-serif')+';color:'+tc+'">';
    if(d.bgImage) html+='<img class="ticket-bg-img" src="'+d.bgImage+'" style="opacity:'+(d.bgOpacity||.35)+'" alt="">';
    html+='<div class="ticket-accent-bar" style="background:'+ac+';left:0;right:'+stubW+'px"></div>';
    html+='<div class="ticket-main">';
    html+='<div style="display:flex;align-items:flex-start;gap:8px">';
    if(d.logoImage) html+='<img src="'+d.logoImage+'" style="height:34px;width:34px;object-fit:contain;border-radius:4px;flex-shrink:0" alt="">';
    html+='<div>';
    html+='<div class="ticket-event-name" style="font-size:'+(fs+5)+'px">'+(event?event.name:'Event Name')+'</div>';
    html+='<div class="ticket-event-sub" style="font-size:'+(fs-1)+'px">'+(event&&event.date?new Date(event.date).toLocaleDateString():'')+''+(event&&event.venue?' · '+event.venue:'')+'</div>';
    html+='</div></div>';
    html+='<div class="ticket-bottom">';
    html+='<div>';
    html+='<div class="ticket-holder-label" style="font-size:'+(fs-3)+'px">TICKET HOLDER</div>';
    html+='<div style="font-size:'+fs+'px;font-weight:600">'+(ticket.holder||'General Admission')+'</div>';
    if(ticket.phone) html+='<div style="font-size:'+(fs-2)+'px;opacity:.6">'+(ticket.phone)+'</div>';
    if(seatInfo) html+='<div style="font-size:'+(fs-1)+'px;color:'+ac+'">'+seatInfo+'</div>';
    html+='</div>';
    if(d.showCode!==false) html+='<div style="text-align:right"><div class="ticket-code-label" style="font-size:'+(fs-3)+'px">CODE</div><div class="ticket-code-val" style="font-size:'+fs+'px;color:'+ac+'">'+(ticket.code||'XXXXXXXX')+'</div></div>';
    html+='</div></div>';
    html+='<div class="ticket-stub" style="border-left:2px dashed '+ac+'44">';
    if(d.showQR!==false&&qrSrc) html+='<img src="'+qrSrc+'" style="width:'+(d.qrSize||80)+'px;height:'+(d.qrSize||80)+'px;display:block" alt="QR">';
    html+='<div class="ticket-scan-label" style="font-size:'+(fs-3)+'px">'+(ticket.checked_in?'✓ USED':'SCAN ME')+'</div>';
    html+='</div></div></div>';
    return html;
  });
}

// Canvas renderer for PNG download
var RENDERER=(function(){
  function rr(ctx,x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath(); }
  function clip(ctx,text,maxW){ if(!text) return ''; if(ctx.measureText(text).width<=maxW) return text; while(text.length>1&&ctx.measureText(text+'…').width>maxW) text=text.slice(0,-1); return text+'…'; }
  function loadImg(src){ return new Promise(function(res){ if(!src) return res(null); var i=new Image(); i.crossOrigin='anonymous'; i.onload=function(){ res(i); }; i.onerror=function(){ res(null); }; i.src=src; }); }
  function makeQR(text,size){
    return new Promise(function(resolve){
      var w=document.createElement('div'); Object.assign(w.style,{position:'absolute',left:'-9999px',top:'-9999px'}); document.body.appendChild(w);
      new window.QRCode(w,{text:text,width:size,height:size,colorDark:'#000000',colorLight:'#ffffff',correctLevel:window.QRCode.CorrectLevel.H});
      setTimeout(function(){ var img=w.querySelector('img'),cnv=w.querySelector('canvas'); var url=img?img.src:(cnv?cnv.toDataURL():''); document.body.removeChild(w); resolve(url); },350);
    });
  }
  async function render(design,event,ticket){
    var W=800,H=300,STUB=190,d=design||{};
    var canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
    var ctx=canvas.getContext('2d');
    var ac=d.accentColor||'#e94560',bg=d.bgColor||'#1a1a2e',tc=d.textColor||'#ffffff',fs=Math.max(14,(d.fontSize||13)*1.5);
    ctx.fillStyle=bg; rr(ctx,0,0,W,H,18); ctx.fill();
    if(d.bgImage){ var bi=await loadImg(d.bgImage); if(bi){ ctx.save();ctx.globalAlpha=d.bgOpacity||.35;rr(ctx,0,0,W,H,18);ctx.clip();ctx.drawImage(bi,0,0,W,H);ctx.restore(); } }
    ctx.save();ctx.setLineDash([7,5]);ctx.strokeStyle=ac+'77';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W-STUB,16);ctx.lineTo(W-STUB,H-16);ctx.stroke();ctx.restore();
    ctx.fillStyle=ac; ctx.fillRect(0,0,W-STUB,5);
    var tx=26;
    if(d.logoImage){ var lo=await loadImg(d.logoImage); if(lo){ ctx.drawImage(lo,24,20,54,54); tx=90; } }
    ctx.fillStyle=tc; ctx.font='900 '+(fs+8)+'px Trebuchet MS,sans-serif'; ctx.fillText(clip(ctx,event?event.name:'Event',W-STUB-tx-20),tx,55);
    ctx.fillStyle=tc+'88'; ctx.font=(fs-3)+'px Trebuchet MS,sans-serif';
    var ds=event&&event.date?new Date(event.date).toLocaleString():'';
    ctx.fillText(clip(ctx,[ds,event?event.venue:''].filter(Boolean).join('  ·  '),W-STUB-tx-20),tx,82);
    ctx.strokeStyle=tc+'18';ctx.lineWidth=1;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(26,100);ctx.lineTo(W-STUB-20,100);ctx.stroke();
    ctx.fillStyle=tc+'55'; ctx.font=(fs-5)+'px Trebuchet MS,sans-serif'; ctx.fillText('TICKET HOLDER',26,126);
    ctx.fillStyle=tc; ctx.font='700 '+(fs+1)+'px Trebuchet MS,sans-serif'; ctx.fillText(ticket.holder||'General Admission',26,155);
    if(ticket.phone){ ctx.fillStyle=tc+'66'; ctx.font=(fs-3)+'px Trebuchet MS,sans-serif'; ctx.fillText(ticket.phone,26,175); }
    var yOff=ticket.phone?18:0;
    var sl=ticket.seats?[ticket.seats.section,ticket.seats.row_label?'Row '+ticket.seats.row_label:'',ticket.seats.seat_number?'Seat '+ticket.seats.seat_number:''].filter(Boolean).join(' · '):'';
    if(sl){ ctx.fillStyle=ac;ctx.font=(fs-2)+'px Trebuchet MS,sans-serif';ctx.fillText(sl,26,177+yOff); }
    if(d.showCode!==false){ ctx.fillStyle=tc+'40';ctx.font=(fs-6)+'px Trebuchet MS,sans-serif';ctx.fillText('CODE',26,222+yOff);ctx.fillStyle=ac;ctx.font='900 '+(fs+3)+'px Courier New,monospace';ctx.fillText(ticket.code||'',26,248+yOff); }
    ctx.fillStyle=tc+'30';ctx.font=(fs-8)+'px Trebuchet MS,sans-serif';ctx.fillText('Issued: '+new Date(ticket.issued_at||Date.now()).toLocaleString(),26,H-14);
    if(d.showQR!==false){
      var qs=Math.round(Math.min((d.qrSize||90)*1.6,STUB-28));
      var qu=await makeQR(ticket.qr_data||ticket.code||'TICKET',qs);
      var qi=await loadImg(qu);
      if(qi){ var qx=W-STUB+Math.round((STUB-qs)/2),qy=Math.round((H-qs)/2)-10; ctx.fillStyle='#ffffff'; ctx.fillRect(qx-7,qy-7,qs+14,qs+14); ctx.drawImage(qi,qx,qy,qs,qs); }
    }
    ctx.fillStyle=ticket.checked_in?'#22c55e':tc+'55';ctx.font='700 '+(fs-5)+'px Trebuchet MS,sans-serif';ctx.textAlign='center';ctx.fillText(ticket.checked_in?'✓  USED':'SCAN  ME',W-STUB/2+2,H-13);ctx.textAlign='left';
    ctx.strokeStyle=ac+'55';ctx.lineWidth=2;rr(ctx,1,1,W-2,H-2,17);ctx.stroke();
    return canvas.toDataURL('image/png');
  }
  async function downloadSingle(design,event,ticket){ var url=await render(design,event,ticket); var a=document.createElement('a'); a.href=url; a.download=(ticket.code||'ticket')+'.png'; a.click(); }
  async function downloadZIP(design,event,tickets,onProgress){
    var zip=new window.JSZip(); var folder=zip.folder((event.name||'tickets').replace(/\s+/g,'_'));
    for(var i=0;i<tickets.length;i++){
      var url=await render(design,event,tickets[i]); folder.file((tickets[i].code||i)+'.png',url.split(',')[1],{base64:true});
      if(onProgress) onProgress(Math.round(((i+1)/tickets.length)*100));
      if(i%5===0) await new Promise(function(r){ setTimeout(r,0); });
    }
    var blob=await zip.generateAsync({type:'blob'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(event.name||'tickets').replace(/\s+/g,'_')+'_tickets.zip'; a.click();
  }
  function downloadCSV(tickets,eventName){
    var rows=[['Code','QR Data','Holder','Phone','Section','Row','Seat','Type','Issued At','Checked In','Checked In At']];
    tickets.forEach(function(t){ var s=t.seats||{}; rows.push([t.code,t.qr_data,t.holder,t.phone||'',s.section||'',s.row_label||'',s.seat_number||'',s.seat_type||'',t.issued_at,t.checked_in?'Yes':'No',t.checked_in_at||'']); });
    var csv=rows.map(function(r){ return r.map(function(c){ return '"'+String(c||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
    var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=(eventName||'tickets').replace(/\s+/g,'_')+'_tickets.csv'; a.click();
  }
  return { render:render, downloadSingle:downloadSingle, downloadZIP:downloadZIP, downloadCSV:downloadCSV };
})();

var SEATING=(function(){
  var TYPES={
    standard:{label:'Standard',color:'#3b82f6',bg:'#1d3a6e'},
    vip:{label:'VIP',color:'#f59e0b',bg:'#4a3010'},
    accessible:{label:'Accessible',color:'#22c55e',bg:'#0d3320'},
    blocked:{label:'Blocked',color:'#555',bg:'#1a1a1a'}
  };
  var STATUS={available:{label:'Available',color:'#3b82f6'},sold:{label:'Sold',color:'#e94560'},reserved:{label:'Reserved',color:'#f59e0b'},held:{label:'Held',color:'#a78bfa'},blocked:{label:'Blocked',color:'#555'}};

  function parseRange(start,end,type){
    var r=[];
    if(type==='alpha'){
      var a=(start||'A').toUpperCase().charCodeAt(0),b=(end||'A').toUpperCase().charCodeAt(0);
      if(a<=b){ for(var i=a;i<=b;i++) r.push(String.fromCharCode(i)); }
      else     { for(var i=a;i>=b;i--) r.push(String.fromCharCode(i)); }
    } else {
      var s=parseInt(start)||1,e2=parseInt(end)||s;
      if(s<=e2){ for(var i=s;i<=e2;i++) r.push(i); }
      else      { for(var i=s;i>=e2;i--) r.push(i); }
    }
    return r;
  }
  function genSeats(section,layoutId,eventId){
    var seats=[],rows=parseRange(section.rowStart,section.rowEnd,section.rowType),cols=parseInt(section.seatsPerRow)||10;
    var aisles=section.aisleAfter?section.aisleAfter.split(',').map(function(s){ return parseInt(s.trim()); }).filter(Boolean):[];
    rows.forEach(function(row){
      var n=parseInt(section.seatStartNum)||1;
      for(var c=1;c<=cols;c++){
        if(!aisles.includes(c-1)){
          seats.push({id:genUID(),layout_id:layoutId,event_id:eventId,section:section.name,row_label:String(row),seat_number:String(n),seat_type:section.seatType||'standard',status:'available',price:parseFloat(section.price)||0});
          n++;
        }
      }
    });
    return seats;
  }

  function renderManager(container,eventId,cb){
    DB.getLayouts(eventId).then(function(layouts){
      var html='<div class="seating-header" style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap;gap:12px">';
      html+='<div><h3 style="margin:0;font-size:18px">&#x1F4BA; Seating Arrangements</h3><p style="margin:4px 0 0;color:#666;font-size:13px">'+layouts.length+' layout'+(layouts.length!==1?'s':'')+'</p></div>';
      html+='<button class="btn-primary" id="btn-new-layout">+ New Layout</button></div>';
      html+='<div id="layout-form-area"></div>';
      if(layouts.length===0) html+='<div class="empty-state"><div class="empty-icon">&#x1F4BA;</div><div class="empty-title">No seating layouts yet</div></div>';
      else layouts.forEach(function(l){ html+=layoutCard(l); });
      container.innerHTML=html;
      getEl('btn-new-layout').onclick=function(){ showForm(container,null,eventId,function(){ renderManager(container,eventId,cb); }); };
      container.querySelectorAll('.btn-edit-layout').forEach(function(btn){
        var l=layouts.find(function(x){ return x.id===btn.dataset.id; });
        if(l) btn.onclick=function(){ showForm(container,l,eventId,function(){ renderManager(container,eventId,cb); }); };
      });
      container.querySelectorAll('.btn-delete-layout').forEach(function(btn){
        btn.onclick=async function(){ if(!confirm('Delete layout and all its seats?')) return; await DB.deleteLayout(btn.dataset.id); renderManager(container,eventId,cb); };
      });
      container.querySelectorAll('.btn-view-map').forEach(function(btn){
        var l=layouts.find(function(x){ return x.id===btn.dataset.id; });
        if(l) btn.onclick=function(){ showMap(container,l,eventId,function(){ renderManager(container,eventId,cb); }); };
      });
    });
  }

  function layoutCard(layout){
    var secs=layout.sections||[],total=secs.reduce(function(s,sec){ return s+parseRange(sec.rowStart,sec.rowEnd,sec.rowType).length*(parseInt(sec.seatsPerRow)||10); },0);
    var html='<div class="layout-card"><div class="layout-card-accent"></div><div class="layout-card-body">';
    html+='<div class="layout-card-title">'+layout.name+'</div>';
    html+='<div class="layout-card-meta">'+secs.length+' section'+(secs.length!==1?'s':'')+' · ~'+total+' seats</div>';
    html+='<div class="section-tags">';
    secs.forEach(function(s){ var t=TYPES[s.seatType||'standard']||TYPES.standard; html+='<span class="section-tag" style="background:'+t.bg+';color:'+t.color+'">'+s.name+'</span>'; });
    html+='</div><div class="layout-card-actions">';
    html+='<button class="btn-primary btn-sm btn-view-map" data-id="'+layout.id+'">&#x1F5FA; View Map</button>';
    html+='<button class="btn-ghost btn-sm btn-edit-layout" data-id="'+layout.id+'">Edit</button>';
    html+='<button class="btn-ghost btn-sm btn-red btn-delete-layout" data-id="'+layout.id+'">&#x2715;</button>';
    html+='</div></div></div>';
    return html;
  }

  function showForm(container,layout,eventId,onDone){
    var isEdit=!!layout, formSecs=layout&&layout.sections?JSON.parse(JSON.stringify(layout.sections)):[];
    var area=container.querySelector('#layout-form-area')||container;
    var html='<div class="layout-form-panel">';
    html+='<h4 style="margin:0 0 16px;color:var(--accent);font-size:13px;letter-spacing:2px">'+(isEdit?'EDIT LAYOUT':'NEW LAYOUT')+'</h4>';
    html+='<label class="form-label">Layout Name<input type="text" id="layout-name" class="form-input" value="'+(layout?layout.name:'')+'" placeholder="e.g. Main Hall"></label>';
    html+='<div style="margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center">';
    html+='<span style="font-size:11px;color:var(--accent);letter-spacing:2px;font-weight:700">SECTIONS</span>';
    html+='<button class="btn-ghost btn-sm" id="btn-add-section">+ Add Section</button></div>';
    html+='<div id="sections-list"></div>';
    html+='<div class="form-actions"><button class="btn-ghost" id="btn-cancel-layout">Cancel</button><button class="btn-primary" id="btn-save-layout">Save Layout</button></div>';
    html+='</div>';
    area.innerHTML=html;

    function renderSecs(){
      var list=area.querySelector('#sections-list');
      if(!formSecs.length){ list.innerHTML='<p style="color:#444;font-size:13px;padding:12px 0">No sections yet. Click "+ Add Section".</p>'; return; }
      var sh='';
      formSecs.forEach(function(s,i){
        var t=TYPES[s.seatType||'standard']||TYPES.standard;
        sh+='<div class="section-editor">';
        sh+='<div class="section-editor-header"><span style="color:'+t.color+';font-weight:700">'+(s.name||'Section '+(i+1))+'</span><button class="btn-ghost btn-xs btn-red btn-rm-sec" data-i="'+i+'">&#x2715;</button></div>';
        sh+='<div class="section-grid">';
        sh+='<label class="form-label">Name<input type="text" class="form-input sf-name" data-i="'+i+'" value="'+(s.name||'')+'"></label>';
        sh+='<label class="form-label">Seat Type<select class="form-input sf-type" data-i="'+i+'">';
        Object.keys(TYPES).forEach(function(k){ sh+='<option value="'+k+'"'+(s.seatType===k?' selected':'')+'>'+TYPES[k].label+'</option>'; });
        sh+='</select></label>';
        sh+='<label class="form-label">Row Labels<select class="form-input sf-rtype" data-i="'+i+'">';
        sh+='<option value="numeric"'+(s.rowType!=='alpha'?' selected':'')+'>Numeric</option>';
        sh+='<option value="alpha"'+(s.rowType==='alpha'?' selected':'')+'>Alpha (A,B,C…)</option>';
        sh+='</select></label>';
        sh+='<label class="form-label">Row Start<input type="text" class="form-input sf-rs" data-i="'+i+'" value="'+(s.rowStart||'1')+'"></label>';
        sh+='<label class="form-label">Row End<input type="text" class="form-input sf-re" data-i="'+i+'" value="'+(s.rowEnd||'10')+'"></label>';
        sh+='<label class="form-label">Seats/Row<input type="number" class="form-input sf-spr" data-i="'+i+'" value="'+(s.seatsPerRow||10)+'" min="1" max="100"></label>';
        sh+='<label class="form-label">First Seat #<input type="number" class="form-input sf-sn" data-i="'+i+'" value="'+(s.seatStartNum||1)+'" min="1"></label>';
        sh+='<label class="form-label">Aisle After (comma)<input type="text" class="form-input sf-aisle" data-i="'+i+'" value="'+(s.aisleAfter||'')+'"></label>';
        sh+='<label class="form-label">Price/Seat<input type="number" class="form-input sf-price" data-i="'+i+'" value="'+(s.price||0)+'" min="0" step="0.01"></label>';
        sh+='</div></div>';
      });
      list.innerHTML=sh;
      list.querySelectorAll('.btn-rm-sec').forEach(function(b){ b.onclick=function(){ formSecs.splice(parseInt(b.dataset.i),1); renderSecs(); }; });
      function bind(cls,prop){ list.querySelectorAll(cls).forEach(function(el){ el.oninput=function(){ formSecs[parseInt(el.dataset.i)][prop]=el.value; }; el.onchange=function(){ formSecs[parseInt(el.dataset.i)][prop]=el.value; renderSecs(); }; }); }
      bind('.sf-name','name');bind('.sf-type','seatType');bind('.sf-rtype','rowType');bind('.sf-rs','rowStart');bind('.sf-re','rowEnd');bind('.sf-spr','seatsPerRow');bind('.sf-sn','seatStartNum');bind('.sf-aisle','aisleAfter');bind('.sf-price','price');
    }
    renderSecs();

    area.querySelector('#btn-add-section').onclick=function(){ formSecs.push({name:'Section '+(formSecs.length+1),seatType:'standard',rowType:'numeric',rowStart:'1',rowEnd:'10',seatsPerRow:10,seatStartNum:1,aisleAfter:'',price:0}); renderSecs(); };
    area.querySelector('#btn-cancel-layout').onclick=function(){ area.innerHTML=''; };
    area.querySelector('#btn-save-layout').onclick=async function(){
      var name=area.querySelector('#layout-name').value.trim();
      if(!name){ alert('Layout name required.'); return; }
      var btn=area.querySelector('#btn-save-layout'); btn.textContent='Saving…'; btn.disabled=true;
      try {
        var saved=await DB.saveLayout({id:layout?layout.id:genUID(),event_id:eventId,name:name,sections:formSecs});
        await DB.deleteSeats(saved.id);
        var allSeats=formSecs.reduce(function(acc,s){ return acc.concat(genSeats(s,saved.id,eventId)); },[]);
        if(allSeats.length) await DB.saveSeats(allSeats);
        area.innerHTML=''; onDone();
      } catch(e){ alert('Error: '+e.message); btn.textContent='Save Layout'; btn.disabled=false; }
    };
  }

  async function showMap(container,layout,eventId,onBack){
    var seats=await DB.getSeats(layout.id);
    var grouped={};
    seats.forEach(function(s){ if(!grouped[s.section]) grouped[s.section]={}; if(!grouped[s.section][s.row_label]) grouped[s.section][s.row_label]=[]; grouped[s.section][s.row_label].push(s); });
    Object.values(grouped).forEach(function(sec){ Object.values(sec).forEach(function(row){ row.sort(function(a,b){ return (parseInt(a.seat_number)||a.seat_number)>(parseInt(b.seat_number)||b.seat_number)?1:-1; }); }); });
    var stats={total:seats.length,available:seats.filter(function(s){ return s.status==='available'; }).length,sold:seats.filter(function(s){ return s.status==='sold'; }).length,reserved:seats.filter(function(s){ return s.status==='reserved'; }).length,held:seats.filter(function(s){ return s.status==='held'; }).length};
    var selectedIds=new Set();

    function renderSelectionBar(){
      var bar=container.querySelector('#map-sel-bar'); if(!bar) return;
      var n=selectedIds.size;
      if(n===0){ bar.innerHTML='<span class="map-sel-hint">Click available seats to select for ticket generation</span>'; return; }

    html+='<span class="legend-item"><span class="legend-dot" style="background:#e94560"></span>Sold</span>';
    html+='<span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span>Held</span>';

    html+='</div>';

    html+='<div class="stage-label">&#x25C6; STAGE / SCREEN</div>';

    Object.keys(grouped).forEach(function(section){

      var sortedRows=Object.keys(rows).sort(function(a,b){ var ai=rowOrder.indexOf(a),bi=rowOrder.indexOf(b); return (ai<0?999:ai)-(bi<0?999:bi); });
      html+='<div class="map-section"><div class="map-section-title" style="color:'+col+'">'+section+'</div>';
      sortedRows.forEach(function(rowLabel){

    panel.querySelector('#btn-close-seat').onclick=function(){ panel.style.display='none'; };

        panel.style.display='none'; toast('Seat status updated ✓');
      };
    });
  }

  return { renderManager:renderManager, TYPES:TYPES, genSeats:genSeats, parseRange:parseRange };
})();

  nav.querySelectorAll('.nav-tab[data-view]').forEach(function(btn){ btn.onclick=function(){ navigate(btn.dataset.view); }; });
}

function renderMain(){
  var main=getEl('main'); main.innerHTML='';
  var v=STATE.view;
  if(v==='events')                           renderEvents(main);
  else if(v==='designer'&&STATE.activeEvent) renderDesigner(main);
  else if(v==='seating'&&STATE.activeEvent)  renderSeating(main);
  else if(v==='tickets'&&STATE.activeEvent)  renderTickets(main);

async function renderEvents(container){
  var session=AUTH.session();
  var orgId=session.role==='admin'?null:session.userId;
  container.innerHTML='<div class="page-header"><div><h1 class="page-title">Events</h1><p class="page-subtitle" id="ev-count">Loading…</p></div><button class="btn-primary" id="btn-new-event">+ New Event</button></div><div id="event-form-area"></div><div id="events-list"></div>';
  getEl('btn-new-event').onclick=function(){ showEventForm(null); };

  _cache.users=await DB.getUsers();

// True when an event is fully unlocked for ticket generation
function evTicketsUnlocked(ev){
  return (ev.approval_status||'draft')==='approved' && ev.fee_paid===true;
}

function renderEventsList(events){
  var list=getEl('events-list'); if(!list) return;
  var session=AUTH.session();
  if(!events.length){ list.innerHTML='<div class="empty-state"><div class="empty-icon">&#x1F3AA;</div><div class="empty-title">No events yet</div><p style="color:#555;font-size:13px;margin-top:8px">Create your first event to get started</p></div>'; return; }
  var statusLabels={draft:'DRAFT',pending:'PENDING APPROVAL',approved:'APPROVED',rejected:'REJECTED'};
  var html='<div class="events-grid">';
  events.forEach(function(ev){
    var d=ev.design||{}, ac=d.accentColor||'#e94560';
    var st=ev.approval_status||'draft';
    var isApproved=st==='approved';
    var isDraft=st==='draft';
    var isPending=st==='pending';
    var isRejected=st==='rejected';
    html+='<div class="card"><div class="card-accent-bar" style="background:'+(isApproved?ac:'#333')+'"></div><div class="card-body">';
    var badgeClass=st;
    var badgeText=statusLabels[st]||st.toUpperCase();
    if(st==='approved'&&!ev.fee_paid){
      badgeClass='approved-unpaid';
      badgeText='APPROVED — FEE DUE'+(ev.approval_fee>0?' ($'+ev.approval_fee+')':'');
    } else if(st==='approved'&&ev.fee_paid){
      badgeText='APPROVED'+(ev.approval_fee>0?' · Fee: $'+ev.approval_fee:'');
    }
    html+='<span class="ev-status-badge '+badgeClass+'">'+badgeText+'</span>';
    // Show fee notice for organiser when approved but unpaid
    if(st==='approved'&&!ev.fee_paid&&ev.approval_fee>0){
      html+='<div style="font-size:12px;color:var(--amber);background:#141400;border:1px solid #f59e0b33;border-radius:6px;padding:8px 10px;margin-bottom:10px">&#x1F4B3; Fee due: $'+ev.approval_fee+' — waiting for admin to confirm payment before tickets unlock.</div>';
    }
    html+='<div style="font-size:16px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px">'+ev.name+'</div>';
    html+='<div style="font-size:11px;color:#555;margin-bottom:4px">'+(ev.category||'')+(ev.seatingMode?' · '+(ev.seatingMode==='free'?'Free Seating':'Allocated Seating'):'')+'</div>';
    html+='<div style="font-size:12px;color:#666;margin-bottom:10px">'+(ev.date?new Date(ev.date).toLocaleString():'No date set')+(ev.venue?' · '+ev.venue:'')+'</div>';
    // Show rejection reason if rejected
    if(isRejected&&ev.rejection_reason) html+='<div style="font-size:12px;color:var(--accent);background:#1a0a0a;border-radius:6px;padding:8px 10px;margin-bottom:10px">&#x274C; Rejected: '+ev.rejection_reason+'</div>';
    // Stats — only meaningful if approved
    if(evTicketsUnlocked(ev)){
      html+='<div style="display:flex;gap:16px;font-size:13px;margin-bottom:10px">';
      html+='<span><strong style="color:#fff;font-size:16px" id="tc-'+ev.id+'">—</strong> <span style="color:#555;font-size:11px">tickets</span></span>';
      html+='<span><strong style="color:#22c55e;font-size:16px" id="cc-'+ev.id+'">—</strong> <span style="color:#555;font-size:11px">checked in</span></span>';
      html+='<span><strong style="color:#a78bfa;font-size:16px" id="rc-'+ev.id+'">—</strong> <span style="color:#555;font-size:11px">reservations</span></span>';
      html+='</div>';
      html+='<div class="progress-bar" style="margin-bottom:14px"><div class="progress-fill" id="pb-'+ev.id+'" style="width:0%"></div></div>';
    } else {
      html+='<div style="height:24px;margin-bottom:14px"></div>';
    }
    html+='<div style="display:flex;gap:8px">';
    html+='<button class="btn-primary btn-sm" style="flex:1" data-open="'+ev.id+'">Open &#8594;</button>';
    // Submit for approval button (draft or rejected)
    if(isDraft||isRejected) html+='<button class="btn-ghost btn-sm btn-green" data-submit="'+ev.id+'">&#x2197; Submit</button>';
    // Withdraw (pending → draft)
    if(isPending) html+='<button class="btn-ghost btn-sm" data-withdraw="'+ev.id+'">&#x21A9; Withdraw</button>';
    html+='<button class="btn-ghost btn-sm" data-edit="'+ev.id+'">Edit</button>';
    html+='<button class="btn-ghost btn-sm btn-red" data-del="'+ev.id+'">&#x2715;</button>';
    html+='</div></div></div>';
  });
  html+='</div>';
  list.innerHTML=html;
  events.forEach(async function(ev){
    if(!evTicketsUnlocked(ev)) return;
    try {
      var tix=await DB.getTickets(ev.id), ch=tix.filter(function(t){ return t.checked_in; }).length;
      var rsvs=await DB.getReservations(ev.id), pend=rsvs.filter(function(r){ return r.status==='pending'; }).length;
      var tc=getEl('tc-'+ev.id),cc=getEl('cc-'+ev.id),rc=getEl('rc-'+ev.id),pb=getEl('pb-'+ev.id);
      if(tc) tc.textContent=tix.length; if(cc) cc.textContent=ch; if(rc) rc.textContent=pend;
      if(pb) pb.style.width=tix.length?Math.round((ch/tix.length)*100)+'%':'0%';
    } catch(e){}
  });
  list.querySelectorAll('[data-open]').forEach(function(btn){
    btn.onclick=function(){ var ev=STATE.events.find(function(e){ return e.id===btn.dataset.open; }); if(ev){ STATE.activeEvent=ev; navigate('designer'); } };
  });
  list.querySelectorAll('[data-edit]').forEach(function(btn){
    btn.onclick=function(e){ e.stopPropagation(); var ev=STATE.events.find(function(e){ return e.id===btn.dataset.edit; }); if(ev) showEventForm(ev); };
  });
  list.querySelectorAll('[data-del]').forEach(function(btn){
    btn.onclick=async function(e){ e.stopPropagation(); if(!confirm('Delete this event and all its data?')) return; await DB.deleteEvent(btn.dataset.del); if(STATE.activeEvent&&STATE.activeEvent.id===btn.dataset.del) STATE.activeEvent=null; STATE.events=STATE.events.filter(function(ev){ return ev.id!==btn.dataset.del; }); renderEventsList(STATE.events); };
  });
  list.querySelectorAll('[data-submit]').forEach(function(btn){
    btn.onclick=async function(e){ e.stopPropagation();
      if(!confirm('Submit this event for admin approval? You can still edit it while it is pending.')) return;
      var ev=STATE.events.find(function(e){ return e.id===btn.dataset.submit; }); if(!ev) return;
      ev.approval_status='pending'; ev.rejection_reason=''; ev.submitted_at=nowISO();
      await DB.saveEvent(ev);
      var i=STATE.events.findIndex(function(e){ return e.id===ev.id; }); if(i>=0) STATE.events[i]=ev;
      renderEventsList(STATE.events); toast('Submitted for approval ✓');
    };
  });
  list.querySelectorAll('[data-withdraw]').forEach(function(btn){
    btn.onclick=async function(e){ e.stopPropagation();
      if(!confirm('Withdraw this submission and return to draft?')) return;
      var ev=STATE.events.find(function(e){ return e.id===btn.dataset.withdraw; }); if(!ev) return;
      ev.approval_status='draft';
      await DB.saveEvent(ev);
      var i=STATE.events.findIndex(function(e){ return e.id===ev.id; }); if(i>=0) STATE.events[i]=ev;
      renderEventsList(STATE.events); toast('Withdrawn — back to draft.');
    };
  });
}

function showEventForm(event){

  var html='<div class="panel"><div class="panel-title">'+(isEdit?'EDIT EVENT':'NEW EVENT')+'</div>';

  html+='</div>';
  html+='<label class="form-label" style="margin-top:12px">Description<input type="text" class="form-input" id="ef-desc" value="'+(event?event.description:'')+'" placeholder="Optional"></label>';
  html+='<div style="margin-top:18px;padding-top:18px;border-top:1px solid var(--border)">';
  html+='<div class="panel-title">CAPACITY &amp; BOOKING</div>';
  html+='<div class="form-grid">';
  html+='<label class="form-label">Seating Mode<select class="form-input" id="ef-mode">';
  html+='<option value="free"'+((event?event.seatingMode:'free')==='free'?' selected':'')+'>&#x1F3B5; Free Seating</option>';
  html+='<option value="allocated"'+((event?event.seatingMode:'')=='allocated'?' selected':'')+'>&#x1F4BA; Allocated (Seat Map)</option>';
  html+='</select></label>';

function renderDesigner(container){

  // Build approval banner HTML inline (avoids insertBefore timing issues)
  var bannerHtml='';
  if(!unlocked){
    var bannerMsg={
      draft:'&#x1F4DD; This event is a <strong>Draft</strong>. Build your design and seating, then submit for admin approval before tickets can be generated.',
      pending:'&#x23F3; <strong>Pending Approval</strong> — your event is under review. You can still edit it while waiting.',
      rejected:'&#x274C; <strong>Rejected</strong>'+(ev.rejection_reason?' — Reason: '+ev.rejection_reason:'')+'. Edit your event and resubmit.',

    };

      (bannerMsg[st]||'')+
      ((st==='draft'||st==='rejected')?'<button class="btn-ghost btn-sm btn-green" id="btn-submit-approval" style="flex-shrink:0">Submit for Approval</button>':'')+
    '</div>';
  }

  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F3A8; Ticket Designer</h2><p class="page-subtitle">'+ev.name+'</p></div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-primary" id="btn-gen-from-designer">Generate Tickets &#8594;</button></div></div>';
  html+=bannerHtml;
  html+='<div style="background:#0d1a0d;border:1px solid #22c55e33;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">';

  html+='<button class="btn-ghost btn-sm btn-green" id="btn-copy-scan-url">Copy Link</button>';
  html+='<button class="btn-ghost btn-sm" id="btn-regen-scan-code">&#x21BA; Regen</button>';
  html+='</div>';
  html+='<div class="designer-layout"><div class="designer-sidebar" id="ds-sidebar"></div>';
  html+='<div class="designer-preview" id="ds-preview"><div style="color:#888;padding:40px;text-align:center">&#x23F3; Loading preview…</div></div></div>';
  container.innerHTML=html;

  // Wire buttons
  var submitBtn=getEl('btn-submit-approval');
  if(submitBtn){ submitBtn.onclick=async function(){
    if(!confirm('Submit for admin approval?')) return;
    ev.approval_status='pending'; ev.rejection_reason=''; ev.submitted_at=nowISO(); STATE.activeEvent=ev;
    await DB.saveEvent(ev); var i=STATE.events.findIndex(function(e){ return e.id===ev.id; }); if(i>=0) STATE.events[i]=ev;
    renderDesigner(container); toast('Submitted ✓');
  }; }
  getEl('btn-gen-from-designer').onclick=function(){
    if(!evTicketsUnlocked(STATE.activeEvent)){ toast('⚠️ Event must be approved and fee paid before generating tickets.', 4000); return; }
    showGenerateModal(null);
  };
  var copyBtn=getEl('btn-copy-scan-url');
  if(copyBtn){ copyBtn.onclick=function(){ navigator.clipboard&&navigator.clipboard.writeText(scanUrl).then(function(){ toast('Scanner link copied ✓'); }); }; }
  var regenBtn=getEl('btn-regen-scan-code');
  if(regenBtn){ regenBtn.onclick=async function(){
    if(!confirm('Regenerate scanner code? The old code will stop working.')) return;
    ev.scanner_code=genUID().slice(0,6); STATE.activeEvent=ev;
    await DB.saveEvent(ev); renderDesigner(container); toast('Scanner code regenerated ✓');
  }; }
  buildSidebar(getEl('ds-sidebar'),design,async function(newD){
    STATE.activeEvent.design=newD;
    await DB.saveEvent(Object.assign({},STATE.activeEvent));
    updatePreview(getEl('ds-preview'),newD);

}
