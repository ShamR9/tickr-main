    html+='<span>&#x1F4CD; '+(ev.venue||'TBC')+'</span>';
    html+='<span>&#x1F3F7; '+(ev.category||'')+'</span>';
    html+='</div>';
    if(ev.description) html+='<p style="color:#888;font-size:14px">'+ev.description+'</p>';
    if(allSeats.length>0){ html+='<div style="display:flex;gap:16px;margin-top:16px;font-size:13px"><span style="color:var(--green)">&#x25CF; '+available+' available</span><span style="color:var(--accent)">&#x25CF; '+sold+' sold</span><span style="color:var(--purple)">&#x25CF; '+held+' held</span></div>'; }
    html+='</div>';
    // Selection bar
    var n=selectedIds.size;
    html+='<div id="pub-sel-bar" style="background:#1a1a2e;border:1px solid #3b82f644;border-radius:10px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
    if(n===0) html+='<span style="color:#555;font-size:13px">Click available seats on the map below to select them</span>';
    else { html+='<span style="color:#3b82f6;font-weight:700">'+n+' seat'+(n>1?'s':'')+' selected</span><button class="btn-ghost btn-sm" id="btn-pub-clear">Clear</button><button class="btn-primary btn-sm" id="btn-pub-reserve">Reserve '+n+' Seat'+(n>1?'s':'')+' &#8594;</button>'; }
    html+='</div>';
    // Seat map
    if(layouts.length>0&&allSeats.length>0){
      var grouped={};
      allSeats.forEach(function(s){ if(!grouped[s.section]) grouped[s.section]={}; if(!grouped[s.section][s.row_label]) grouped[s.section][s.row_label]=[]; grouped[s.section][s.row_label].push(s); });
      Object.values(grouped).forEach(function(sec){ Object.values(sec).forEach(function(row){ row.sort(function(a,b){ return (parseInt(a.seat_number)||a.seat_number)>(parseInt(b.seat_number)||b.seat_number)?1:-1; }); }); });
      html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px">';
      html+='<div style="font-size:11px;color:#555;letter-spacing:2px;margin-bottom:14px">SELECT YOUR SEATS</div>';
      html+='<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--text3)">';
      html+='<span class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>Standard</span>';
      html+='<span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>VIP</span>';
      html+='<span class="legend-item"><span class="legend-dot" style="background:#e94560"></span>Sold/Held</span>';
      html+='<span class="legend-item"><span class="legend-dot" style="background:#fff;outline:2px solid #3b82f6;outline-offset:1px;border-radius:50%"></span>Selected</span>';
      html+='</div>';
      html+='<div style="text-align:center;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px;font-size:12px;color:var(--text4);letter-spacing:3px;margin-bottom:20px">&#x25C6; STAGE / SCREEN</div>';
      html+='<div style="overflow-x:auto">';
      Object.keys(grouped).forEach(function(section){
        var rows=grouped[section], lay=layouts[0];
        var secDef=lay?(lay.sections||[]).find(function(s){ return s.name===section; }):null;
        var col=(SEATING.TYPES[secDef?secDef.seatType:'standard']||SEATING.TYPES.standard).color;
        var rowOrder=secDef?SEATING.parseRange(secDef.rowStart,secDef.rowEnd,secDef.rowType).map(String):Object.keys(rows);
        var sortedRows=Object.keys(rows).sort(function(a,b){ var ai=rowOrder.indexOf(a),bi=rowOrder.indexOf(b); return (ai<0?999:ai)-(bi<0?999:bi); });
        html+='<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:8px;color:'+col+'">'+section+'</div>';
        sortedRows.forEach(function(rowLabel){
          html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:11px;color:#555;width:20px;text-align:center;font-weight:700">'+rowLabel+'</span><div style="display:flex;gap:4px">';
          rows[rowLabel].forEach(function(seat){
            var isAvail=seat.status==='available';
            var isSelected=selectedIds.has(seat.id);
            var extraClass=isSelected?' selected':'';
            html+='<button class="seat-btn seat-'+(seat.seat_type||'standard')+' status-'+seat.status+extraClass+'" data-pub-seat="'+seat.id+'" title="'+seat.section+' R'+seat.row_label+' #'+seat.seat_number+' $'+seat.price+'" '+(isAvail?'':'disabled')+'>'+seat.seat_number+'</button>';
          });
          html+='</div><span style="font-size:11px;color:#555;width:20px;text-align:center">'+rowLabel+'</span></div>';
        });
        html+='</div>';
      });
      html+='</div></div>';
    } else if(ev.seatingMode==='free'){
      html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;text-align:center">';
      html+='<div style="font-size:40px;margin-bottom:12px">&#x1F3B5;</div>';
      html+='<div style="font-size:16px;font-weight:700;margin-bottom:8px">General Admission</div>';
      html+='<p style="color:#888;font-size:13px">This event uses free seating — no specific seat assignment.</p>';
      html+='<button class="btn-primary" id="btn-pub-ga-reserve" style="margin-top:16px">Reserve a Ticket &#8594;</button>';
      html+='</div>';
    }
    html+='</div>';
    return html;
  }

  // Render page once — wire seat buttons with toggle, only update sel-bar on change
  function updateSelBar(){
    var bar=getEl('pub-sel-bar'); if(!bar) return;
    var n=selectedIds.size;
    if(n===0){
      bar.innerHTML='<span style="color:#555;font-size:13px">Click available seats on the map below to select them</span>';
    } else {
      bar.innerHTML=
        '<span style="color:#3b82f6;font-weight:700">'+n+' seat'+(n>1?'s':'')+' selected</span>'+
        '<button class="btn-ghost btn-sm" id="btn-pub-clear">Clear</button>'+
        '<button class="btn-primary btn-sm" id="btn-pub-reserve">Reserve '+n+' Seat'+(n>1?'s':'')+' &#8594;</button>';
      getEl('btn-pub-clear').onclick=function(){
        selectedIds.forEach(function(id){
          var b=document.querySelector('[data-pub-seat="'+id+'"]');
          if(b) b.classList.remove('selected');
        });
        selectedIds.clear(); updateSelBar();
      };
      getEl('btn-pub-reserve').onclick=function(){
        var picked=allSeats.filter(function(s){ return selectedIds.has(s.id); });
        showPublicReserveForm(ev,picked);
      };
    }
  }

  function renderPage(){
    getEl('main').innerHTML=buildPage();
    // Wire seat buttons — toggle class directly without full re-render
    getEl('main').querySelectorAll('[data-pub-seat]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var seatId=btn.dataset.pubSeat;
        var seat=allSeats.find(function(s){ return s.id===seatId; });
        if(!seat||seat.status!=='available') return;
        var maxSeats=ev.maxSeatsPerReservation||4;
        if(selectedIds.has(seatId)){
          selectedIds.delete(seatId);
          btn.classList.remove('selected');
        } else if(selectedIds.size>=maxSeats){
          toast('Max '+maxSeats+' seats per reservation.',3000); return;
        } else {
          selectedIds.add(seatId);
          btn.classList.add('selected');
        }
        // Only rebuild the selection bar, not the whole page
        updateSelBar();
      });
    });
    // GA reserve button
    var gaBtn=getEl('btn-pub-ga-reserve');
    if(gaBtn) gaBtn.onclick=function(){ showPublicReserveForm(ev,[]); };
    // Initial sel bar state
    updateSelBar();
  }
  renderPage();
}

// Public reservation form
function showPublicReserveForm(ev,selectedSeats){
  var total=selectedSeats.reduce(function(s,seat){ return s+seat.price; },0);
  var html='<div class="public-wrap">';
  html+='<div style="font-family:Impact,sans-serif;font-size:20px;color:'+(ev.design&&ev.design.accentColor?ev.design.accentColor:'#e94560')+';letter-spacing:3px;margin-bottom:20px">&#x25C6; TICKR</div>';
  html+='<div style="font-size:13px;color:#666;margin-bottom:20px"><a href="?event='+ev.id+'" style="color:#3b82f6;text-decoration:none">&#8592; Back to '+ev.name+'</a></div>';
  html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px">';
  html+='<h2 style="margin:0 0 20px;font-size:22px">Complete Your Reservation</h2>';
  if(selectedSeats.length>0){
    html+='<div style="background:#141414;border-radius:8px;padding:14px;margin-bottom:20px">';
    html+='<div style="font-size:11px;color:#555;letter-spacing:1px;margin-bottom:10px">YOUR SEATS</div>';
    selectedSeats.forEach(function(s){ html+='<div style="font-size:13px;color:#ccc;padding:4px 0">&#x1F4BA; '+s.section+' &middot; Row '+s.row_label+' &middot; Seat '+s.seat_number+' &mdash; <strong style="color:var(--accent)">$'+s.price+'</strong></div>'; });
    html+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid #252525;font-size:15px">Total: <strong style="color:var(--text);font-size:18px">$'+total+'</strong></div>';
    html+='</div>';
  }
  html+='<div class="form-grid" style="margin-bottom:14px">';
  html+='<label class="form-label">Full Name *<input type="text" class="form-input" id="pub-name" placeholder="Your full name"></label>';
  html+='<label class="form-label">Phone Number *<input type="text" class="form-input" id="pub-phone" placeholder="+960 …"></label>';
  html+='</div>';
  html+='<label class="form-label" style="margin-bottom:20px">Email Address *<input type="email" class="form-input" id="pub-email" placeholder="your@email.com"></label>';
  // Show organiser's booking message if set
  if(ev.booking_message){
    html+='<div style="background:#1a1a0d;border:1px solid #f59e0b33;border-radius:8px;padding:14px 16px;margin-bottom:16px">';
    html+='<div style="font-size:11px;color:var(--amber);letter-spacing:1px;margin-bottom:6px">&#x1F4AC; MESSAGE FROM ORGANISER</div>';
    html+='<div style="font-size:13px;color:#ccc;line-height:1.6">'+ev.booking_message+'</div>';
    html+='</div>';
  }
  // Payment slip upload
  html+='<div style="margin-bottom:16px">';
  html+='<div style="font-size:11px;color:#555;letter-spacing:1px;margin-bottom:6px">PAYMENT SLIP <span style="color:#444">(optional — upload after transferring)</span></div>';
  html+='<div style="font-size:12px;color:#666;margin-bottom:8px">Upload a screenshot of your bank transfer receipt so the organiser can verify faster.</div>';
  html+='<input type="file" accept="image/*" id="pub-slip" class="form-input" style="padding:6px 0">';
  html+='<div id="slip-preview" style="margin-top:8px"></div>';
  html+='</div>';
  // Discount code input
  html+='<div style="margin-bottom:16px">';
  html+='<div style="font-size:11px;color:#555;letter-spacing:1px;margin-bottom:8px">DISCOUNT CODE (optional)</div>';
  html+='<div style="display:flex;gap:8px">';
  html+='<input type="text" class="form-input" id="pub-discount-code" placeholder="Enter code" style="text-transform:uppercase;letter-spacing:2px;max-width:200px">';
  html+='<button class="btn-ghost btn-sm" id="btn-apply-discount">Apply</button>';
  html+='</div>';
  html+='<div id="discount-result" style="margin-top:8px;font-size:13px"></div>';
  html+='</div>';
  html+='<div id="pub-total-display" style="font-size:16px;font-weight:700;text-align:center;margin-bottom:16px;color:#fff">Total: <span id="pub-total-val" style="color:var(--accent)">$'+total.toFixed(2)+'</span></div>';
  html+='<button class="btn-primary" id="btn-pub-submit" style="width:100%;padding:13px;font-size:15px">Confirm Reservation &#8594;</button>';
  html+='</div></div>';
  getEl('main').innerHTML=html;
  var appliedDiscount=null, discountedTotal=total;

  var applyBtn=getEl('btn-apply-discount');
  if(applyBtn) applyBtn.onclick=async function(){
    var codeStr=(getEl('pub-discount-code').value||'').trim().toUpperCase();
    if(!codeStr){ getEl('discount-result').innerHTML='<span style="color:#555">Enter a code first.</span>'; return; }
    applyBtn.disabled=true; applyBtn.textContent='Checking…';
    var disc=await DB.validateDiscountCode(ev.id,codeStr).catch(function(){return null;});
    applyBtn.disabled=false; applyBtn.textContent='Apply';
    if(!disc){ getEl('discount-result').innerHTML='<span style="color:var(--accent)">&#x274C; Invalid or expired code.</span>'; appliedDiscount=null; discountedTotal=total; }
    else {
      appliedDiscount=disc;
      discountedTotal=disc.type==='percent'?Math.max(0,total*(1-disc.value/100)):Math.max(0,total-disc.value);
      getEl('discount-result').innerHTML='<span style="color:var(--green)">&#x2714; '+disc.value+(disc.type==='percent'?'% off':'$ off')+' applied!</span>';
      var tv=getEl('pub-total-val'); if(tv) tv.textContent='$'+discountedTotal.toFixed(2);
    }
  };

  // Slip preview
  var slipEl=getEl('pub-slip');
  if(slipEl) slipEl.onchange=function(){
    var f=slipEl.files[0]; var prev=getEl('slip-preview'); if(!prev) return;
    if(!f){ prev.innerHTML=''; return; }
    if(f.size>8*1024*1024){ toast('Image too large — max 8 MB.',3000); slipEl.value=''; prev.innerHTML=''; return; }
    var url=URL.createObjectURL(f);
    prev.innerHTML='<img src="'+url+'" style="max-width:100%;max-height:160px;border-radius:6px;border:1px solid #333;object-fit:contain">';
  };

  getEl('btn-pub-submit').onclick=async function(){
    var name=getEl('pub-name').value.trim(), phone=getEl('pub-phone').value.trim(), email=getEl('pub-email').value.trim();
    if(!name||!phone||!email){ toast('Please fill in all fields.',3000); return; }
    var btn=getEl('btn-pub-submit'); btn.disabled=true; btn.textContent='Processing…';

    // Compress slip if provided
    var paymentSlip=null;
    var slipF=getEl('pub-slip'); if(slipF&&slipF.files[0]) paymentSlip=await compressImage(slipF.files[0],1400,1000,0.82);

    // Atomically hold seats via security-definer RPC (bypasses RLS for public users)
    if(selectedSeats.length>0){
      var seatIds=selectedSeats.map(function(s){ return s.id; });
      var hr=await _supa.rpc('hold_seats',{p_seat_ids:seatIds}).catch(function(){ return {data:null}; });
      if(!hr.data||!hr.data.ok){
        toast('Sorry — one or more seats were just taken. Please go back and choose again.',5000);
        btn.disabled=false; btn.textContent='Confirm Reservation →';
        return;
      }
    }

    var ref='BKG-'+genUID().slice(0,6);
    var finalTotal=appliedDiscount?discountedTotal:total;
    var res={ id:genUID(), ref:ref, event_id:ev.id, name:name, phone:phone, email:email, seat_ids:selectedSeats.map(function(s){ return s.id; }), status:'pending', total_amount:finalTotal||0, requested_at:nowISO(), rejection_reason:'', ticket_ids:[], discount_code:appliedDiscount?appliedDiscount.code:null, payment_slip:paymentSlip };
    await DB.saveReservation(res);
    if(appliedDiscount) await DB.incrementDiscountUse(appliedDiscount.id).catch(function(){});
    renderPublicConfirmation(ref,ev,selectedSeats,finalTotal);
  };
}

  html+='<div style="font-size:13px;color:#888;margin-top:4px">Phone: '+res.phone+'</div>';
  if(res.seatObjects&&res.seatObjects.length>0){ html+='<div style="margin-top:12px">'; res.seatObjects.forEach(function(s){ if(s) html+='<div style="font-size:13px;color:#ccc;padding:3px 0">&#x1F4BA; '+s.section+' &middot; Row '+s.row_label+' &middot; Seat '+s.seat_number+'</div>'; }); html+='</div>'; }
  html+='<div style="margin-top:12px;font-size:14px">Total: <strong style="color:var(--accent)">$'+res.total_amount+'</strong></div>';
  html+='</div>';
  if(res.status==='pending'){ html+='<div style="background:#14140a;border:1px solid #f59e0b33;border-radius:10px;padding:16px;text-align:center"><p style="font-size:13px;color:#f59e0b">Your booking is under review. Please complete your bank transfer if you haven\'t already.</p></div>'; }
  if(res.status==='approved'){ html+='<div style="background:#0a1a0e;border:1px solid #22c55e33;border-radius:10px;padding:16px;text-align:center"><p style="font-size:14px;font-weight:700;color:#22c55e;margin-bottom:6px">&#x2705; Booking Approved!</p><p style="font-size:13px;color:#22c55e88">Your tickets have been generated and will be sent to you by the organiser via phone or email. Contact them if you haven\'t received them within 24 hours.</p></div>'; }
  if(res.status==='rejected'){ html+='<div style="background:#1a0a0a;border:1px solid #e9456033;border-radius:10px;padding:16px"><p style="font-size:13px;color:#e94560;margin-bottom:8px">&#x274C; This booking was not approved.</p>'+(res.rejection_reason?'<p style="font-size:13px;color:#888">Reason: '+res.rejection_reason+'</p>':'')+'</div>'; }
  html+='</div>';
  getEl('main').innerHTML=html;
}

// EVENT SETTINGS VIEW — prices, payment details, booking message
// ═══════════════════════════════════════════════════════════════════════════════
async function renderEventSettings(container){
  var ev=STATE.activeEvent;
  var session=AUTH.session();
  // Load organiser profile for defaults
  var profile={};
  try {
    var {data:pd}=await _supa.from('profiles').select('*').eq('id',ev.org_id).single();
    if(pd) profile=pd;
  } catch(e){}

  // Load seat sections for price editing
  var layouts=await DB.getLayouts(ev.id).catch(function(){return [];});
  var allSeats=[];
  for(var li=0;li<layouts.length;li++){
    var ls=await DB.getSeats(layouts[li].id).catch(function(){return [];});
    allSeats=allSeats.concat(ls);
  }
  _cache.seats=(_cache.seats||[]).filter(function(s){return s.event_id!==ev.id;}).concat(allSeats);

  // Group seats by section to edit prices
  var sectionPrices={};
  allSeats.forEach(function(s){
    if(!sectionPrices[s.section]) sectionPrices[s.section]={price:s.price,count:0,ids:[]};
    sectionPrices[s.section].count++;
    sectionPrices[s.section].ids.push(s.id);
  });

  var pay=ev.payment_override||{};
  var ac=(ev.design||{}).accentColor||'#e94560';

  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x2699; Event Settings</h2><p class="page-subtitle">'+ev.name+'</p></div></div>';

  // ── Section 1: Ticket Prices ───────────────────────────────────────────────
  html+='<div class="panel"><div class="panel-title">&#x1F4B0; TICKET PRICES</div>';
  if(ev.seatingMode==='allocated'&&Object.keys(sectionPrices).length>0){
    html+='<p style="font-size:13px;color:#666;margin-bottom:16px">Set the price per seat for each section. Changing a price updates all unsold seats in that section.</p>';
    html+='<div class="form-grid">';
    Object.keys(sectionPrices).forEach(function(sec){
      var sp=sectionPrices[sec];
      html+='<label class="form-label">'+sec+' <span style="color:#555;font-size:10px">('+sp.count+' seats)</span>';
      html+='<div style="display:flex;align-items:center;gap:8px"><span style="color:#888">$</span><input type="number" class="form-input" id="price-sec-'+encodeURIComponent(sec)+'" value="'+sp.price+'" min="0" step="0.01" placeholder="0.00"></div>';
      html+='</label>';
    });
    html+='</div>';
    html+='<div style="margin-top:16px"><button class="btn-primary" id="btn-save-prices">Save Prices</button></div>';
  } else if(ev.seatingMode==='free'){
    html+='<p style="font-size:13px;color:#666;margin-bottom:16px">Set the ticket price for this free seating event.</p>';
    html+='<div style="display:flex;align-items:center;gap:8px;max-width:200px"><span style="color:#888;font-size:16px">$</span>';
    html+='<input type="number" class="form-input" id="price-ga" value="'+(ev.ga_price||0)+'" min="0" step="0.01" placeholder="0.00"></div>';
    html+='<div style="margin-top:16px"><button class="btn-primary" id="btn-save-ga-price">Save Price</button></div>';
  } else {
    html+='<p style="font-size:13px;color:#555">No seating layout found. Build a seat map in the Seating tab first.</p>';
  }
  html+='</div>';

  // ── Section 2: Payment Details ─────────────────────────────────────────────
  html+='<div class="panel"><div class="panel-title">&#x1F3E6; PAYMENT DETAILS</div>';
  html+='<p style="font-size:13px;color:#666;margin-bottom:16px">These details are shown to customers on the booking confirmation page. Leave blank to use your account defaults.</p>';
  html+='<div class="form-grid">';
  html+='<label class="form-label">Bank Name<input type="text" class="form-input" id="es-bank" value="'+(pay.bank_name||profile.bank_name||'')+'" placeholder="e.g. Bank of Maldives"></label>';
  html+='<label class="form-label">Account Number<input type="text" class="form-input" id="es-acct" value="'+(pay.bank_account||profile.bank_account||'')+'" placeholder="Account number"></label>';
  html+='<label class="form-label">Account Holder<input type="text" class="form-input" id="es-holder" value="'+(pay.bank_holder||profile.bank_holder||'')+'" placeholder="Name on account"></label>';
  html+='<label class="form-label">Contact Phone<input type="text" class="form-input" id="es-phone" value="'+(pay.phone||profile.phone||'')+'" placeholder="+960 …"></label>';
  html+='</div>';
  html+='<div style="margin-top:16px"><button class="btn-primary" id="btn-save-payment">Save Payment Details</button></div>';
  html+='</div>';

  // ── Section 3: Booking Message ─────────────────────────────────────────────
  html+='<div class="panel"><div class="panel-title">&#x1F4AC; BOOKING MESSAGE</div>';
  html+='<p style="font-size:13px;color:#666;margin-bottom:16px">This message is shown to customers on the reservation form — use it for instructions, notes about the event, or any important information.</p>';
  html+='<textarea class="form-input" id="es-msg" rows="4" placeholder="e.g. Please bring your payment receipt to the venue. Doors open 30 minutes before the event." style="resize:vertical">'+( ev.booking_message||'')+'</textarea>';
  html+='<div style="margin-top:16px"><button class="btn-primary" id="btn-save-msg">Save Message</button></div>';
  html+='</div>';

  // ── Section 4: Danger zone — basic event edit ─────────────────────────────
  html+='<div class="panel" style="border-color:#e9456033"><div class="panel-title" style="color:var(--accent)">&#x270F;&#xFE0F; EDIT EVENT DETAILS</div>';
  html+='<p style="font-size:13px;color:#666;margin-bottom:16px">Update event name, date, venue, capacity and other basic details.</p>';
  html+='<button class="btn-ghost btn-sm" id="btn-open-event-edit">Edit Event Details &#8594;</button>';
  html+='</div>';

  container.innerHTML=html;

  // Wire: save section prices
  var saveBtn=getEl('btn-save-prices');
  if(saveBtn) saveBtn.onclick=async function(){
    saveBtn.disabled=true; saveBtn.textContent='Saving…';
    try {
      var updates=[];
      Object.keys(sectionPrices).forEach(function(sec){
        var inp=getEl('price-sec-'+encodeURIComponent(sec));
        if(!inp) return;
        var newPrice=parseFloat(inp.value)||0;
        if(newPrice!==sectionPrices[sec].price){
          sectionPrices[sec].ids.forEach(function(sid){
            updates.push(_supa.from('seats').update({price:newPrice}).eq('id',sid).eq('status','available'));
          });
          sectionPrices[sec].price=newPrice;
        }
      });
      await Promise.all(updates);
      toast('Prices updated ✓');
    } catch(err){ toast('Error: '+err.message,5000); }
    saveBtn.disabled=false; saveBtn.textContent='Save Prices';
  };

  // Wire: save GA price
  var gaBtn=getEl('btn-save-ga-price');
  if(gaBtn) gaBtn.onclick=async function(){
    gaBtn.disabled=true; gaBtn.textContent='Saving…';
    try {
      var price=parseFloat(getEl('price-ga').value)||0;
      ev.ga_price=price; STATE.activeEvent=ev;
      await DB.saveEvent(ev); toast('Price updated ✓');
    } catch(err){ toast('Error: '+err.message,5000); }
    gaBtn.disabled=false; gaBtn.textContent='Save Price';
  };

  // Wire: save payment details
  var payBtn=getEl('btn-save-payment');
  if(payBtn) payBtn.onclick=async function(){
    payBtn.disabled=true; payBtn.textContent='Saving…';
    try {
      ev.payment_override={
        bank_name:    getEl('es-bank').value.trim(),
        bank_account: getEl('es-acct').value.trim(),
        bank_holder:  getEl('es-holder').value.trim(),
        phone:        getEl('es-phone').value.trim()
      };
      STATE.activeEvent=ev;
      await DB.saveEvent(ev); toast('Payment details saved ✓');
    } catch(err){ toast('Error: '+err.message,5000); }
    payBtn.disabled=false; payBtn.textContent='Save Payment Details';
  };

  // Wire: save booking message
  var msgBtn=getEl('btn-save-msg');
  if(msgBtn) msgBtn.onclick=async function(){
    msgBtn.disabled=true; msgBtn.textContent='Saving…';
    try {
      ev.booking_message=getEl('es-msg').value.trim();
      STATE.activeEvent=ev;
      await DB.saveEvent(ev); toast('Booking message saved ✓');
    } catch(err){ toast('Error: '+err.message,5000); }
    msgBtn.disabled=false; msgBtn.textContent='Save Message';
  };

  // Wire: open event edit form
  var editBtn=getEl('btn-open-event-edit');
  if(editBtn) editBtn.onclick=function(){
    STATE.view='events'; STATE.activeEvent=null; navigate('events');
    // small delay then trigger edit
    setTimeout(function(){
      var ev2=STATE.events.find(function(e){ return e.id===ev.id; });
      if(ev2) showEventForm(ev2);
    },100);
  };
}

// EVENT ANALYTICS VIEW
// ═══════════════════════════════════════════════════════════════════════════════
async function renderEventAnalytics(container){
  var ev=STATE.activeEvent;
  container.innerHTML='<div style="color:#888;padding:40px;text-align:center">Loading analytics…</div>';

  var [tickets, reservations] = await Promise.all([
    DB.getTickets(ev.id),
    DB.getReservations(ev.id)
  ]);

  var seats=(_cache.seats||[]).filter(function(s){ return s.event_id===ev.id; });
  var activeTickets=tickets.filter(function(t){ return !t.cancelled; });
  var checkedIn=activeTickets.filter(function(t){ return t.checked_in; });
  var pending=reservations.filter(function(r){ return r.status==='pending'; });
  var approved=reservations.filter(function(r){ return r.status==='approved'; });
  var rejected=reservations.filter(function(r){ return r.status==='rejected'; });

  // Revenue
  var totalRevenue=approved.reduce(function(s,r){ return s+(parseFloat(r.total_amount)||0); },0);
  var pendingRevenue=pending.reduce(function(s,r){ return s+(parseFloat(r.total_amount)||0); },0);

  // Check-in by hour
  var byHour={};
  for(var h=0;h<24;h++) byHour[h]=0;
  checkedIn.forEach(function(t){
    if(t.checked_in_at){ var hr=new Date(t.checked_in_at).getHours(); byHour[hr]=(byHour[hr]||0)+1; }
  });
  var peakHour=Object.keys(byHour).reduce(function(a,b){ return byHour[a]>byHour[b]?a:b; },0);
  var maxHourCount=Math.max.apply(null,Object.values(byHour))||1;

  // Conversion: views not tracked server-side; show reservation funnel
  var totalRes=reservations.length;
  var convRate=totalRes>0?Math.round((approved.length/totalRes)*100):0;

  // Seat utilisation
  var totalSeats=seats.length;
  var soldSeats=seats.filter(function(s){ return s.status==='sold'; }).length;
  var heldSeats=seats.filter(function(s){ return s.status==='held'; }).length;
  var availSeats=seats.filter(function(s){ return s.status==='available'; }).length;

  var ac=(ev.design||{}).accentColor||'#e94560';

  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F4CA; Analytics</h2><p class="page-subtitle">'+ev.name+'</p></div></div>';

  // KPI cards
  html+='<div class="stats-row" style="flex-wrap:wrap">';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--green)">$'+totalRevenue.toFixed(2)+'</div><div class="stat-label">Confirmed Revenue</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--amber)">$'+pendingRevenue.toFixed(2)+'</div><div class="stat-label">Pending Revenue</div></div>';
  html+='<div class="stat-card"><div class="stat-value">'+activeTickets.length+'</div><div class="stat-label">Tickets Issued</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--green)">'+checkedIn.length+'</div><div class="stat-label">Checked In</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--purple)">'+convRate+'%</div><div class="stat-label">Approval Rate</div></div>';
  if(totalSeats>0) html+='<div class="stat-card"><div class="stat-value" style="color:'+ac+'">'+Math.round(soldSeats/totalSeats*100)+'%</div><div class="stat-label">Seats Sold</div></div>';
  html+='</div>';

  // Reservation funnel
  html+='<div class="panel"><div class="panel-title">&#x1F4CB; RESERVATION FUNNEL</div>';
  html+='<div style="display:flex;flex-direction:column;gap:10px">';
  function funnelBar(label, count, total, col){
    var pct=total>0?Math.round(count/total*100):0;
    return '<div><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:#aaa">'+label+'</span><span style="color:'+col+';font-weight:700">'+count+' <span style="color:#555;font-weight:400;font-size:11px">('+pct+'%)</span></span></div><div style="background:#1a1a1a;border-radius:4px;height:8px"><div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:4px;transition:width .4s"></div></div></div>';
  }
  html+=funnelBar('Total Reservations',totalRes,totalRes,'#3b82f6');
  html+=funnelBar('Approved',approved.length,totalRes,'#22c55e');
  html+=funnelBar('Pending',pending.length,totalRes,'#f59e0b');
  html+=funnelBar('Rejected',rejected.length,totalRes,'#555');
  html+='</div></div>';

  // Check-in by hour chart
  html+='<div class="panel"><div class="panel-title">&#x23F0; CHECK-INS BY HOUR</div>';
  if(checkedIn.length===0){
    html+='<p style="color:#555;font-size:13px;text-align:center;padding:20px">No check-ins recorded yet.</p>';
  } else {
    html+='<p style="font-size:12px;color:#555;margin-bottom:12px">Peak hour: <strong style="color:#fff">'+(peakHour>11?(peakHour-12||12)+'pm':(peakHour||12)+'am')+'</strong> with '+byHour[peakHour]+' check-ins</p>';
    html+='<div style="display:flex;align-items:flex-end;gap:3px;height:80px;padding-bottom:20px;border-bottom:1px solid #222;position:relative">';
    for(var h2=0;h2<24;h2++){
      var cnt=byHour[h2]||0;
      var pct2=Math.round((cnt/maxHourCount)*100);
      var label2=h2===0?'12a':h2===12?'12p':h2<12?h2+'a':(h2-12)+'p';
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px" title="'+label2+': '+cnt+' check-ins">';
      html+='<div style="width:100%;background:'+(cnt>0?ac:'#1a1a1a')+';border-radius:2px 2px 0 0;height:'+pct2+'%;min-height:'+(cnt>0?'4px':'0')+';transition:height .3s"></div>';
      if(h2%3===0) html+='<div style="font-size:8px;color:#444;position:absolute;bottom:2px">'+label2+'</div>';
      html+='</div>';
    }
    html+='</div>';
  }
  html+='</div>';

  // Seat breakdown
  if(totalSeats>0){
    html+='<div class="panel"><div class="panel-title">&#x1F4BA; SEAT BREAKDOWN</div>';
    html+='<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px">';
    html+='<div><span style="color:var(--accent);font-size:22px;font-weight:900">'+soldSeats+'</span><div style="font-size:11px;color:#555">Sold</div></div>';
    html+='<div><span style="color:var(--amber);font-size:22px;font-weight:900">'+heldSeats+'</span><div style="font-size:11px;color:#555">Held</div></div>';
    html+='<div><span style="color:var(--green);font-size:22px;font-weight:900">'+availSeats+'</span><div style="font-size:11px;color:#555">Available</div></div>';
    html+='</div>';
    var soldPct=Math.round(soldSeats/totalSeats*100);
    var heldPct=Math.round(heldSeats/totalSeats*100);
    html+='<div style="background:#1a1a1a;border-radius:6px;height:16px;overflow:hidden;display:flex">';
    html+='<div style="width:'+soldPct+'%;background:var(--accent);transition:width .4s"></div>';
    html+='<div style="width:'+heldPct+'%;background:var(--amber);transition:width .4s;opacity:.7"></div>';
    html+='</div>';
    html+='<div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:#555">';
    html+='<span><span style="color:var(--accent)">&#x25A0;</span> Sold ('+soldPct+'%)</span>';
    html+='<span><span style="color:var(--amber)">&#x25A0;</span> Held ('+heldPct+'%)</span>';
    html+='<span><span style="color:#22c55e">&#x25A0;</span> Available ('+(100-soldPct-heldPct)+'%)</span>';
    html+='</div></div>';
  }

  // Recent activity
  var log=await DB.getActivityLog(ev.id);
  if(log.length>0){
    html+='<div class="panel"><div class="panel-title">&#x1F4CB; RECENT ACTIVITY</div><div style="display:flex;flex-direction:column;gap:6px">';
    log.slice(0,10).forEach(function(entry){
      html+='<div style="display:flex;gap:12px;align-items:flex-start;padding:8px;background:#111;border-radius:6px">';
      html+='<div style="font-size:10px;color:#444;white-space:nowrap;margin-top:2px">'+new Date(entry.created_at).toLocaleString()+'</div>';
      html+='<div><div style="font-size:13px;color:#ccc">'+entry.action+'</div>';
      if(entry.detail) html+='<div style="font-size:11px;color:#555">'+entry.detail+'</div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  }

  container.innerHTML=html;
}

// DISCOUNT CODES VIEW
// ═══════════════════════════════════════════════════════════════════════════════
async function renderDiscounts(container){
  var ev=STATE.activeEvent;
  var session=AUTH.session();

  async function rebuild(){
    var codes=await DB.getDiscountCodes(ev.id);
    var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x25BA; Discount Codes</h2><p class="page-subtitle">'+ev.name+'</p></div><button class="btn-primary" id="btn-new-code">+ New Code</button></div>';
    html+='<div id="code-form-area"></div>';

    if(!codes.length){
      html+='<div class="empty-state"><div class="empty-icon">&#x25BA;</div><div class="empty-title">No discount codes yet</div><p style="color:#555;font-size:13px;margin-top:6px">Create codes to offer discounts to specific customers.</p></div>';
    } else {
      html+='<div style="display:flex;flex-direction:column;gap:10px" id="codes-list">';
      codes.forEach(function(code){
        var expired=code.expires_at&&new Date(code.expires_at)<new Date();
        var maxed=code.max_uses>0&&code.uses>=code.max_uses;
        var statusColor=(!code.active||expired||maxed)?'#555':'#22c55e';
        var statusLabel=!code.active?'Inactive':expired?'Expired':maxed?'Max Uses Reached':'Active';
        html+='<div class="panel" style="padding:16px;margin-bottom:0">';
        html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">';
        html+='<div>';
        html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">';
        html+='<span style="font-family:monospace;font-size:18px;font-weight:900;color:#fff;letter-spacing:2px">'+code.code+'</span>';
        html+='<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#1a1a1a;color:'+statusColor+';border:1px solid '+statusColor+'44">'+statusLabel+'</span>';
        html+='</div>';
        html+='<div style="font-size:13px;color:#888">';
        html+=(code.type==='percent'?code.value+'% off':'$'+parseFloat(code.value).toFixed(2)+' off');
        if(code.max_uses>0) html+=' &nbsp;·&nbsp; '+code.uses+'/'+code.max_uses+' uses';
        else html+=' &nbsp;·&nbsp; '+code.uses+' uses (unlimited)';
        if(code.expires_at) html+=' &nbsp;·&nbsp; Expires '+new Date(code.expires_at).toLocaleDateString();
        html+='</div></div>';
        html+='<div style="display:flex;gap:8px">';
        html+='<button class="btn-ghost btn-sm" data-toggle-code="'+code.id+'" data-active="'+code.active+'">'+(code.active?'Deactivate':'Activate')+'</button>';
        html+='<button class="btn-ghost btn-sm btn-red" data-del-code="'+code.id+'">&#x2715;</button>';
        html+='</div></div></div>';
      });
      html+='</div>';
    }
    container.innerHTML=html;

    getEl('btn-new-code').onclick=function(){ showCodeForm(); };

    container.querySelectorAll('[data-toggle-code]').forEach(function(btn){
      btn.onclick=async function(){
        var active=btn.dataset.active!=='true';
        await _supa.from('discount_codes').update({active:active}).eq('id',btn.dataset.toggleCode);
        await DB.logActivity(ev.id,(active?'Activated':'Deactivated')+' discount code','Code ID: '+btn.dataset.toggleCode,session.userId);
        rebuild();
      };
    });
    container.querySelectorAll('[data-del-code]').forEach(function(btn){
      btn.onclick=async function(){
        if(!confirm('Delete this discount code?')) return;
        await DB.deleteDiscountCode(btn.dataset.delCode);
        rebuild(); toast('Code deleted.');
      };
    });
  }

  function showCodeForm(){
    var area=getEl('code-form-area'); if(!area) return;
    var html='<div class="panel" style="margin-bottom:20px"><div class="panel-title">NEW DISCOUNT CODE</div>';
    html+='<div class="form-grid">';
    html+='<label class="form-label">Code <span style="color:#555;font-size:10px">(letters/numbers only)</span><input type="text" class="form-input" id="dc-code" placeholder="e.g. EARLYBIRD20" style="text-transform:uppercase"></label>';
    html+='<label class="form-label">Discount Type<select class="form-input" id="dc-type"><option value="percent">Percentage (%)</option><option value="fixed">Fixed Amount ($)</option></select></label>';
    html+='<label class="form-label">Value<input type="number" class="form-input" id="dc-value" placeholder="e.g. 20" min="0" step="0.01"></label>';
    html+='<label class="form-label">Max Uses <span style="color:#555;font-size:10px">(0 = unlimited)</span><input type="number" class="form-input" id="dc-maxuses" value="0" min="0"></label>';
    html+='<label class="form-label">Expiry Date <span style="color:#555;font-size:10px">(optional)</span><input type="date" class="form-input" id="dc-expires"></label>';
    html+='</div>';
    html+='<div class="form-actions"><button class="btn-ghost" id="dc-cancel">Cancel</button><button class="btn-primary" id="dc-save">Create Code</button></div>';
    html+='</div>';
    area.innerHTML=html;
    getEl('dc-code').oninput=function(){ this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,''); };
    getEl('dc-cancel').onclick=function(){ area.innerHTML=''; };
    getEl('dc-save').onclick=async function(){
      var code=getEl('dc-code').value.trim();
      var val=parseFloat(getEl('dc-value').value)||0;
      if(!code){ toast('Code required.',3000); return; }
      if(!val){ toast('Value required.',3000); return; }
      var btn=getEl('dc-save'); btn.disabled=true; btn.textContent='Saving…';
      try {
        var exp=getEl('dc-expires').value;
        var newCode={id:genUID(),event_id:ev.id,code:code,type:getEl('dc-type').value,value:val,max_uses:parseInt(getEl('dc-maxuses').value)||0,uses:0,expires_at:exp?new Date(exp).toISOString():null,active:true};
        await DB.saveDiscountCode(newCode);
        await DB.logActivity(ev.id,'Created discount code',code+' ('+newCode.type+': '+val+')',session.userId);
        area.innerHTML=''; rebuild(); toast('Code created ✓');
      } catch(err){ toast('Error: '+err.message,5000); btn.disabled=false; btn.textContent='Create Code'; }
    };
  }

  rebuild();
}

// PLATFORM REVENUE DASHBOARD (admin only)
// ═══════════════════════════════════════════════════════════════════════════════
async function renderPlatformRevenue(container){
  if(!AUTH.isAdmin()){ container.innerHTML='<p style="color:#666;padding:40px">Access denied.</p>'; return; }
  container.innerHTML='<div style="color:#888;padding:40px;text-align:center">Loading revenue data…</div>';

  var [allEvents, allProfiles] = await Promise.all([
    DB.getEvents(null),
    DB.getUsers()
  ]);

  // Also get all reservations for revenue calculation
  var {data:allRes}=await _supa.from('reservations').select('*').eq('status','approved');
  allRes=allRes||[];

  var approved=allEvents.filter(function(e){ return e.approval_status==='approved'; });
  var feePaid=approved.filter(function(e){ return e.fee_paid; });
  var feeUnpaid=approved.filter(function(e){ return !e.fee_paid; });
  var pending=allEvents.filter(function(e){ return e.approval_status==='pending'; });

  var totalFeeCollected=feePaid.reduce(function(s,e){ return s+(parseFloat(e.approval_fee)||0); },0);
  var totalFeeOutstanding=feeUnpaid.reduce(function(s,e){ return s+(parseFloat(e.approval_fee)||0); },0);
  var totalTicketRevenue=allRes.reduce(function(s,r){ return s+(parseFloat(r.total_amount)||0); },0);

  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F4B5; Platform Revenue</h2><p class="page-subtitle">All organisers · All time</p></div></div>';

  // Top KPIs
  html+='<div class="stats-row" style="flex-wrap:wrap;margin-bottom:24px">';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--green)">$'+totalFeeCollected.toFixed(2)+'</div><div class="stat-label">Approval Fees Collected</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--amber)">$'+totalFeeOutstanding.toFixed(2)+'</div><div class="stat-label">Fees Outstanding</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--blue)">$'+totalTicketRevenue.toFixed(2)+'</div><div class="stat-label">Total Ticket Revenue</div></div>';
  html+='<div class="stat-card"><div class="stat-value">'+allEvents.length+'</div><div class="stat-label">Total Events</div></div>';
  html+='<div class="stat-card"><div class="stat-value" style="color:var(--amber)">'+pending.length+'</div><div class="stat-label">Pending Approval</div></div>';
  html+='</div>';

  // Per-organiser breakdown
  html+='<div class="panel"><div class="panel-title">&#x1F465; BY ORGANISER</div>';
  html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">';
  html+='<thead><tr style="border-bottom:1px solid #222;color:#555;font-size:11px;letter-spacing:1px">';
  ['ORGANISER','EVENTS','FEE COLLECTED','OUTSTANDING','TICKET REVENUE','STATUS'].forEach(function(h){
    html+='<th style="padding:8px 12px;text-align:left;font-weight:700">'+h+'</th>';
  });
  html+='</tr></thead><tbody>';

  // Group by organiser
  var orgMap={};
  allEvents.forEach(function(ev){
    if(!orgMap[ev.org_id]) orgMap[ev.org_id]={events:[],feeCollected:0,feeOutstanding:0,ticketRevenue:0};
    orgMap[ev.org_id].events.push(ev);
    if(ev.approval_status==='approved'){
      if(ev.fee_paid) orgMap[ev.org_id].feeCollected+=(parseFloat(ev.approval_fee)||0);
      else orgMap[ev.org_id].feeOutstanding+=(parseFloat(ev.approval_fee)||0);
    }
  });
  allRes.forEach(function(r){
    var ev=allEvents.find(function(e){ return e.id===r.event_id; });
    if(ev&&orgMap[ev.org_id]) orgMap[ev.org_id].ticketRevenue+=(parseFloat(r.total_amount)||0);
  });

  Object.keys(orgMap).forEach(function(orgId){
    var profile=allProfiles.find(function(u){ return u.id===orgId; })||{name:'Unknown',username:'?'};
    var org=orgMap[orgId];
    var hasOutstanding=org.feeOutstanding>0;
    html+='<tr style="border-bottom:1px solid #111">';
    html+='<td style="padding:10px 12px"><div style="font-weight:700">'+profile.name+'</div><div style="font-size:11px;color:#555">@'+profile.username+'</div></td>';
    html+='<td style="padding:10px 12px">'+org.events.length+'</td>';
    html+='<td style="padding:10px 12px;color:var(--green)">$'+org.feeCollected.toFixed(2)+'</td>';
    html+='<td style="padding:10px 12px;color:'+(hasOutstanding?'var(--amber)':'#555')+'">$'+org.feeOutstanding.toFixed(2)+'</td>';
    html+='<td style="padding:10px 12px;color:var(--blue)">$'+org.ticketRevenue.toFixed(2)+'</td>';
    html+='<td style="padding:10px 12px"><span style="font-size:11px;padding:2px 8px;border-radius:20px;background:'+(hasOutstanding?'#1a1200':'#0a1a0e')+';color:'+(hasOutstanding?'var(--amber)':'var(--green)')+';">'+(hasOutstanding?'Fee Due':'Clear')+'</span></td>';
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';

  // Per-event breakdown
  html+='<div class="panel"><div class="panel-title">&#x1F4C5; BY EVENT</div>';
  html+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">';
  html+='<thead><tr style="border-bottom:1px solid #222;color:#555;font-size:11px;letter-spacing:1px">';
  ['EVENT','ORGANISER','APPROVAL FEE','FEE PAID','TICKET REVENUE'].forEach(function(h){
    html+='<th style="padding:8px 12px;text-align:left;font-weight:700">'+h+'</th>';
  });
  html+='</tr></thead><tbody>';
  approved.forEach(function(ev){
    var profile=allProfiles.find(function(u){ return u.id===ev.org_id; })||{name:'?'};
    var evRevenue=allRes.filter(function(r){ return r.event_id===ev.id; }).reduce(function(s,r){ return s+(parseFloat(r.total_amount)||0); },0);
    html+='<tr style="border-bottom:1px solid #111">';
    html+='<td style="padding:10px 12px;font-weight:600">'+ev.name+'</td>';
    html+='<td style="padding:10px 12px;color:#888">'+profile.name+'</td>';
    html+='<td style="padding:10px 12px">$'+(parseFloat(ev.approval_fee)||0).toFixed(2)+'</td>';
    html+='<td style="padding:10px 12px"><span style="color:'+(ev.fee_paid?'var(--green)':'var(--amber)')+'">&#x'+(ev.fee_paid?'2714':'23F3')+'; '+(ev.fee_paid?'Paid':'Unpaid')+'</span></td>';
    html+='<td style="padding:10px 12px;color:var(--blue)">$'+evRevenue.toFixed(2)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';

  container.innerHTML=html;
}

// ACTIVITY LOG VIEW (admin — all events; organiser — their events)
// ═══════════════════════════════════════════════════════════════════════════════
async function renderActivityLog(container){
  var session=AUTH.session();
  container.innerHTML='<div style="color:#888;padding:40px;text-align:center">Loading activity log…</div>';

  var log=await DB.getActivityLog(null);
  var allEvents=_cache.events||[];
  var allUsers=_cache.users||[];

  // Filter to organiser's events if not admin
  if(session.role!=='admin'){
    var myEvIds=new Set(allEvents.filter(function(e){ return e.org_id===session.userId; }).map(function(e){ return e.id; }));
    log=log.filter(function(entry){ return myEvIds.has(entry.event_id); });
  }

  var html='<div class="page-header"><div><h2 class="page-title" style="font-size:22px">&#x1F4CB; Activity Log</h2><p class="page-subtitle">'+(session.role==='admin'?'All events':'Your events')+' · Last 200 actions</p></div></div>';

  if(!log.length){
    html+='<div class="empty-state"><div class="empty-icon">&#x1F4CB;</div><div class="empty-title">No activity yet</div></div>';
    container.innerHTML=html; return;
  }

  // Filter bar
  html+='<div class="filter-row" style="margin-bottom:16px">';
  html+='<input type="text" id="log-search" class="form-input" style="max-width:300px" placeholder="Search actions…">';
  html+='</div>';
  html+='<div id="log-list">';

  function renderLogList(entries){
    var list='<div style="display:flex;flex-direction:column;gap:6px">';
    entries.forEach(function(entry){
      var ev=allEvents.find(function(e){ return e.id===entry.event_id; });
      var user=allUsers.find(function(u){ return u.id===entry.user_id; });
      var iconMap={
        'Ticket':'&#x1F3AB;','Reservat':'&#x1F4CB;','Approved':'&#x2714;','Rejected':'&#x274C;',
        'Cancell':'&#x2715;','Created':'&#x2795;','Updated':'&#x270F;','Logged':'&#x1F511;',
        'Activated':'&#x25B6;','Deactiv':'&#x23F8;','Price':'&#x1F4B0;','Payment':'&#x1F4B3;',
        'Booking':'&#x1F4AC;','Checked':'&#x2705;','Deleted':'&#x1F5D1;'
      };
      var icon='&#x1F4CC;';
      Object.keys(iconMap).forEach(function(k){ if(entry.action.indexOf(k)>=0) icon=iconMap[k]; });
      list+='<div style="display:flex;gap:12px;padding:10px 14px;background:#111;border-radius:8px;align-items:flex-start">';
      list+='<div style="font-size:18px;flex-shrink:0;margin-top:1px">'+icon+'</div>';
      list+='<div style="flex:1;min-width:0">';
      list+='<div style="font-size:13px;color:#fff;margin-bottom:2px">'+entry.action+'</div>';
      if(entry.detail) list+='<div style="font-size:12px;color:#666;margin-bottom:3px">'+entry.detail+'</div>';
      list+='<div style="font-size:11px;color:#444;display:flex;gap:12px;flex-wrap:wrap">';
      list+='<span>&#x23F1; '+new Date(entry.created_at).toLocaleString()+'</span>';
      if(ev) list+='<span>&#x1F4C5; '+ev.name+'</span>';
      if(user) list+='<span>&#x1F464; '+user.name+'</span>';
      list+='</div></div></div>';
    });
    list+='</div>';
    var listEl=getEl('log-list'); if(listEl) listEl.innerHTML=list;
  }

  html+='</div>';
  container.innerHTML=html;
  renderLogList(log);

  var searchEl=getEl('log-search');
  if(searchEl) searchEl.oninput=function(){
    var q=searchEl.value.toLowerCase();
    var filtered=q?log.filter(function(e){ return (e.action||'').toLowerCase().includes(q)||(e.detail||'').toLowerCase().includes(q); }):log;
    renderLogList(filtered);
  };
}

  _supa.from('events')
    .select('*')
    .eq('approval_status', 'approved')

    })

function _renderPublicHomeWithEvents(allEvents, now){

  var devBanner=getEl('dev-banner'); if(devBanner) devBanner.style.display='none';
  var main=getEl('main');

  // ── Split events into upcoming and past ──────────────────────────────────────
  var upcoming=[], past=[];
  allEvents.forEach(function(ev){
    if(!ev.date){ upcoming.push(ev); return; }
    if(new Date(ev.date)>=now) upcoming.push(ev); else past.push(ev);
  });
  // Sort upcoming ascending (soonest first), past descending (most recent first)
  upcoming.sort(function(a,b){ return new Date(a.date||0)-new Date(b.date||0); });
  past.sort(function(a,b){ return new Date(b.date||0)-new Date(a.date||0); });

  function eventCard(ev, isPast){
    var isApproved=(ev.approval_status||'draft')==='approved';
    if(!isApproved){
      // Show as Coming Soon — no booking, no seat map
      var d2=ev.design||{}, ac2=d2.accentColor||'#e94560';
      var dateStr2=ev.date?new Date(ev.date).toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}):'';
      var timeStr2=ev.date?new Date(ev.date).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'';
      var html2='<div class="card" style="opacity:.7">';
      html2+='<div class="card-accent-bar" style="background:#333"></div>';
      html2+='<div class="card-body">';
      html2+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">';
      html2+='<div style="font-size:17px;font-weight:800;line-height:1.2">'+ev.name+'</div>';
      html2+='<span style="font-size:10px;padding:2px 9px;border-radius:20px;background:#1a1a1a;color:#555;border:1px solid #333;font-weight:700;white-space:nowrap;flex-shrink:0">COMING SOON</span>';
      html2+='</div>';
      if(dateStr2) html2+='<div style="font-size:12px;color:var(--text3);margin-bottom:3px">&#x1F4C5; '+dateStr2+' &nbsp;&bull;&nbsp; '+timeStr2+'</div>';
      if(ev.venue) html2+='<div style="font-size:12px;color:var(--text4);margin-bottom:10px">&#x1F4CD; '+ev.venue+'</div>';
      if(ev.description) html2+='<p style="font-size:12px;color:var(--text4);margin-bottom:12px;line-height:1.5">'+ev.description+'</p>';
      html2+='<button class="btn-ghost btn-sm" style="width:100%;opacity:.5;cursor:default" disabled>&#x1F512; Not Yet Available</button>';
      html2+='</div></div>';
      return html2;
    }
    var d=ev.design||{}, ac=d.accentColor||'#e94560';
    var allSeats=(_cache.seats||[]).filter(function(s){ return s.event_id===ev.id; });
    var available=allSeats.filter(function(s){ return s.status==='available'; }).length;
    var sold=allSeats.filter(function(s){ return s.status==='sold'||s.status==='held'; }).length;
    var total=allSeats.length;
    var soldOut=(total>0&&available===0)||isPast;
    var almostFull=(!isPast&&total>0&&available>0&&available<total*0.15);
    var statusColor=isPast?'var(--text5)':soldOut?'var(--accent)':almostFull?'var(--amber)':'var(--green)';
    var statusLabel=isPast?'Past Event':soldOut&&!isPast?'Sold Out':almostFull?'Almost Full':'Available';
    var dateStr=ev.date?new Date(ev.date).toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}):'';
    var timeStr=ev.date?new Date(ev.date).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'';
    var html='<div class="card" style="'+(isPast?'opacity:.6':'') +'">';
    html+='<div class="card-accent-bar" style="background:'+(isPast?'#333':ac)+'"></div>';
    html+='<div class="card-body">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">';
    html+='<div style="font-size:17px;font-weight:800;line-height:1.2">'+ev.name+'</div>';
    if(ev.category) html+='<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:'+(isPast?'#22222288':''+ac+'22')+';color:'+(isPast?'#555':ac)+';font-weight:700;white-space:nowrap;flex-shrink:0">'+ev.category.toUpperCase()+'</span>';
    html+='</div>';
    if(dateStr) html+='<div style="font-size:12px;color:var(--text3);margin-bottom:3px">&#x1F4C5; '+dateStr+' &nbsp;&bull;&nbsp; '+timeStr+'</div>';
    if(ev.venue) html+='<div style="font-size:12px;color:var(--text4);margin-bottom:10px">&#x1F4CD; '+ev.venue+'</div>';
    if(ev.description) html+='<p style="font-size:12px;color:var(--text4);margin-bottom:12px;line-height:1.5">'+ev.description+'</p>';
    if(total>0){
      var soldPct=Math.round((isPast?total:sold)/total*100);
      html+='<div style="margin-bottom:14px">';
      html+='<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text4);margin-bottom:4px">';
      html+='<span>Seat Availability</span><span style="color:'+statusColor+';font-weight:700">'+statusLabel+(!isPast&&available>0?' &mdash; '+available+' left':'')+'</span></div>';
      html+='<div style="background:var(--bg3);border-radius:3px;height:6px;overflow:hidden">';
      html+='<div style="width:'+soldPct+'%;height:100%;background:'+(isPast?'#333':ac)+';transition:width .4s"></div></div></div>';
    } else if(!isPast&&ev.seatingMode==='free'&&ev.capacity>0){
      html+='<div style="font-size:12px;color:var(--text4);margin-bottom:14px">&#x1F3B5; Free seating &mdash; '+ev.capacity+' capacity</div>';
    } else if(!isPast){
      html+='<div style="font-size:12px;color:var(--text4);margin-bottom:14px">&#x1F3B5; Open seating</div>';
    }
    html+='<div style="display:flex;gap:8px">';
    if(!isPast){
      if(soldOut&&!isPast){
        html+='<button class="btn-ghost btn-sm" style="flex:1;color:var(--amber);border-color:#f59e0b44" data-pub-waitlist="'+ev.id+'">&#x23F3; Join Waitlist</button>';
      } else {
        html+='<button class="btn-primary btn-sm" style="flex:1" data-pub-open="'+ev.id+'">&#x1F3AB; View &amp; Book</button>';
      }
      html+='<button class="btn-ghost btn-sm" title="Scanner for this event" data-pub-scan="'+ev.id+'">&#x1F4F7;</button>';
    } else {
      html+='<button class="btn-ghost btn-sm" style="flex:1;opacity:.5;cursor:default" disabled>&#x23F1; Event Ended</button>';
    }
    html+='</div>';
    html+='</div></div>';
    return html;
  }

  var html='';

  // ── Hero / login CTA ─────────────────────────────────────────────────────────
  html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px 28px;margin-bottom:32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">';
  html+='<div>';
  html+='<div style="font-family:Impact,sans-serif;font-size:26px;color:var(--accent);letter-spacing:3px;margin-bottom:6px">&#x25C6; TICKR</div>';
  html+='<div style="font-size:15px;font-weight:700;margin-bottom:4px">Book your tickets</div>';
  html+='<div style="font-size:13px;color:var(--text4)">Browse events below and reserve your seats online.</div>';
  html+='</div>';
  html+='<div style="display:flex;gap:10px;flex-wrap:wrap">';
  html+='<button class="btn-ghost" id="pub-home-scanner-btn">&#x1F4F7; Scanner</button>';
  html+='<button class="btn-primary" id="pub-home-login-btn">&#x1F511; Organiser Login</button>';
  html+='</div></div>';

  if(!allEvents.length){
    html+='<div style="text-align:center;padding:60px 0;color:var(--text4)"><div style="font-size:56px;margin-bottom:16px">&#x1F3AB;</div><div style="font-size:18px">No upcoming events</div></div>';
    main.innerHTML=html;
    // Still wire nav buttons even with no events
    if(main._pubClickHandler) main.removeEventListener('click', main._pubClickHandler);
    main._pubClickHandler = function(e){
      var t=e.target.closest('#pub-home-login-btn'); if(t){ e.preventDefault(); renderLogin(); return; }
      t=e.target.closest('#pub-home-scanner-btn'); if(t){ e.preventDefault(); renderPublicScanner(null); return; }
    };
    main.addEventListener('click', main._pubClickHandler);
    return;
  }

  // ── Upcoming events ──────────────────────────────────────────────────────────
  if(upcoming.length>0){
    html+='<div class="page-header" style="margin-bottom:16px"><div><h2 class="page-title" style="font-size:22px">Upcoming Events</h2><p class="page-subtitle">'+upcoming.length+' event'+(upcoming.length!==1?'s':'')+' available</p></div></div>';
    html+='<div class="events-grid" style="margin-bottom:36px">';
    upcoming.forEach(function(ev){ html+=eventCard(ev, false); });
    html+='</div>';
  }

  // ── Past events ──────────────────────────────────────────────────────────────
  if(past.length>0){
    html+='<div style="font-size:13px;color:var(--text4);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:16px;padding-top:8px;border-top:1px solid var(--border)">Past Events</div>';
    html+='<div class="events-grid">';
    past.forEach(function(ev){ html+=eventCard(ev, true); });
    html+='</div>';
  }

  main.innerHTML=html;

  // Single delegated listener — handles all public home button clicks
  if(main._pubClickHandler) main.removeEventListener('click', main._pubClickHandler);
  main._pubClickHandler = function(e){
    var t;
    t = e.target.closest('[data-pub-open]');
    if(t){
      e.preventDefault(); e.stopPropagation();
      var evId = t.getAttribute('data-pub-open');
      console.log('[TICKR] View & Book clicked, eventId=', evId);
      renderPublicEvent(evId).catch(function(err){ console.error('[TICKR] renderPublicEvent failed:', err); alert('Error opening event: ' + err.message); });
      return;
    }
    t = e.target.closest('[data-pub-scan]');
    if(t){ e.preventDefault(); renderPublicScanner(t.getAttribute('data-pub-scan')); return; }
    t = e.target.closest('[data-pub-waitlist]');
    if(t){
      e.preventDefault();
      var wlEvId=t.getAttribute('data-pub-waitlist');
      var wlEv=(_cache.events||[]).find(function(e){ return e.id===wlEvId; });
      if(wlEv) showWaitlistForm(wlEv);
      return;
    }
    t = e.target.closest('#pub-home-login-btn');
    if(t){ e.preventDefault(); renderLogin(); return; }
    t = e.target.closest('#pub-home-scanner-btn');
    if(t){ e.preventDefault(); renderPublicScanner(null); return; }
  };
  main.addEventListener('click', main._pubClickHandler);
  console.log('[TICKR] Public home wired, events count=', allEvents.length);
}  // end _renderPublicHomeWithEvents

// ═══════════════════════════════════════════════════════════════════════════════
// PUBLIC SCANNER PAGE — ?scan=1&event=EVT001
// Anyone with the event's scanner_code can use this to check in tickets
// ═══════════════════════════════════════════════════════════════════════════════
async function renderPublicScanner(eventId){
  var devBanner=getEl('dev-banner'); if(devBanner) devBanner.style.display='none';
  var nav=getEl('nav');
  nav.innerHTML='<span class="nav-logo">&#x25C6; TICKR</span><span style="font-size:13px;color:var(--text4);margin-left:8px">Scanner</span><span class="nav-spacer"></span>';
  var main=getEl('main');

  // If a specific event is requested, validate scanner code first
  if(eventId){
    var ev=(_cache.events||[]).find(function(e){ return e.id===eventId; }) || (await DB.getEvents(null).then(function(evs){ _cache.events=evs; return evs.find(function(e){ return e.id===eventId; }); }).catch(function(){return null;}));
    if(!ev){
      main.innerHTML='<div class="scanner-wrap"><div style="text-align:center;padding:40px;color:#888">Event not found.</div></div>';
      return;
    }
    // Check if scanner is already authorised for this session
    var authKey='tickr_scan_auth_'+eventId;
    if(sessionStorage.getItem(authKey)==='1'){
      // Already authorised — go straight to scanner
      launchScanner(main, ev);
      return;
    }
    // Show code entry form
    var ac=(ev.design||{}).accentColor||'#e94560';
    main.innerHTML=
      '<div class="scanner-wrap">'+
        '<div style="text-align:center;margin-bottom:28px">'+
          '<div style="font-size:40px;margin-bottom:12px">&#x1F4F7;</div>'+
          '<h2 style="font-size:22px;margin-bottom:6px">'+ev.name+'</h2>'+
          '<p style="color:#888;font-size:13px">Enter the scanner code to access the ticket scanner for this event.</p>'+
        '</div>'+
        '<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px">'+
          '<label class="form-label" style="margin-bottom:16px">Scanner Code'+
            '<input type="text" class="form-input" id="scan-code-input" placeholder="e.g. FEST01" style="margin-top:6px;font-family:monospace;font-size:18px;letter-spacing:4px;text-transform:uppercase" autocomplete="off">'+
          '</label>'+
          '<div id="scan-code-err" style="color:var(--accent);font-size:13px;margin-bottom:12px;display:none">&#x2715; Incorrect scanner code. Please try again.</div>'+
          '<button class="btn-primary" id="scan-code-submit" style="width:100%;padding:12px">Unlock Scanner &#8594;</button>'+
        '</div>'+
      '</div>';
    var inp=getEl('scan-code-input');
    var submit=function(){
      var entered=(inp.value||'').trim().toUpperCase();
      var expected=(ev.scanner_code||'').toUpperCase();
      if(entered===expected){
        sessionStorage.setItem(authKey,'1');
        launchScanner(main, ev);
      } else {
        var errEl=getEl('scan-code-err');
        errEl.style.display='block';
        inp.value='';
        inp.focus();
      }
    };
    getEl('scan-code-submit').onclick=submit;
    inp.onkeydown=function(e){ if(e.key==='Enter') submit(); };
    inp.focus();
    return;
  }

  // No specific event — show event picker
  var events=_cache.events.length?_cache.events:await DB.getEvents(null).then(function(e){ _cache.events=e; return e.filter(function(ev){ return ev.approval_status==='approved'; }); }).catch(function(){return[];});
  main.innerHTML=
    '<div class="scanner-wrap">'+
      '<div style="text-align:center;margin-bottom:24px">'+
        '<div style="font-size:40px;margin-bottom:12px">&#x1F4F7;</div>'+
        '<h2 style="font-size:22px;margin-bottom:6px">Ticket Scanner</h2>'+
        '<p style="color:#888;font-size:13px">Select the event you are scanning for.</p>'+
      '</div>'+
      '<div id="scanner-event-list"></div>'+
    '</div>';
  var list=getEl('scanner-event-list');
  if(!events.length){
    list.innerHTML='<p style="text-align:center;color:#555">No events available.</p>';
    return;
  }
  events.forEach(function(ev){
    var ac=(ev.design||{}).accentColor||'#e94560';
    var btn=document.createElement('button');
    btn.className='btn-ghost';
    btn.style.cssText='width:100%;text-align:left;margin-bottom:10px;padding:14px 18px;border-radius:10px;display:flex;align-items:center;gap:12px';
    btn.innerHTML=
      '<div style="width:8px;height:8px;border-radius:50%;background:'+ac+';flex-shrink:0"></div>'+
      '<div>'+
        '<div style="font-size:14px;font-weight:700">'+ev.name+'</div>'+
        '<div style="font-size:11px;color:#555;margin-top:2px">'+(ev.date?new Date(ev.date).toLocaleDateString():'')+' &nbsp;&bull;&nbsp; '+(ev.venue||'')+'</div>'+
      '</div>';
    btn.onclick=function(){
      window.location.href=window.location.href.split('?')[0]+'?scan=1&event='+ev.id;
    };
    list.appendChild(btn);
  });
}

function launchScanner(container, ev){
  var ac=(ev.design||{}).accentColor||'#e94560';
  container.innerHTML=
    '<div class="scanner-wrap">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">'+
        '<div style="width:10px;height:10px;border-radius:50%;background:'+ac+'"></div>'+
        '<div>'+
          '<div style="font-size:16px;font-weight:700">'+ev.name+'</div>'+
          '<div style="font-size:11px;color:#555">Scanner active &mdash; authorised</div>'+
        '</div>'+
      '</div>'+
      '<div id="scan-content"></div>'+
    '</div>';
  showScanInput(getEl('scan-content'));
}

// BOOT
// ═══════════════════════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async function(){
  var params=new URLSearchParams(window.location.search);
  var eventId=params.get('event'), bookingRef=params.get('booking'), isScan=params.get('scan');

  // Public routes — no auth needed
  if(eventId){ renderPublicEvent(eventId); return; }
  if(bookingRef){ renderPublicBooking(bookingRef); return; }
  if(isScan){ renderPublicScanner(params.get('event')||null); return; }

  // Check Supabase session
  try {
    var res = await _supa.auth.getSession();
    var session = res.data && res.data.session;
    if(session){
      await AUTH.loadProfile(session.user.id);
      var profile = AUTH.currentProfile;
      if(profile){
        getEl('banner-user').textContent='Logged in as: '+profile.name+' ('+profile.role+')';
        navigate('events');
        return;
      }
    }
  } catch(e){ console.warn('Session check failed:', e); }
  renderPublicHome();

  // Keep session in sync
  _supa.auth.onAuthStateChange(async function(event, _session){
    if(event==='SIGNED_OUT'){ AUTH.currentProfile=null; STATE.activeEvent=null; renderPublicHome(); }
  });
});


</script>
